<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>言葉のカード — Kotoba Card</title>
<style>
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f4ef;--bg-tertiary:#eceae2;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-tertiary:#908f88;
  --border-tertiary:rgba(0,0,0,0.12);--border-secondary:rgba(0,0,0,0.22);--border-primary:rgba(0,0,0,0.35);
  --radius-md:8px;--radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
  --font-serif:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1f1e1c;--bg-secondary:#2a2926;--bg-tertiary:#151412;
    --text-primary:#f0efe9;--text-secondary:#b4b2a9;--text-tertiary:#888780;
    --border-tertiary:rgba(255,255,255,0.12);--border-secondary:rgba(255,255,255,0.22);--border-primary:rgba(255,255,255,0.35);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-tertiary);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.app{width:100%;max-width:640px}
.app-title{font-size:18px;font-weight:500;margin-bottom:1.25rem;text-align:center}
.genre-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;justify-content:center}
.gbtn{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans)}
.gbtn:hover{background:var(--bg-secondary)}
.gbtn.on{background:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-primary)}
.scene{width:100%;min-height:340px;margin-bottom:0.5rem;touch-action:pan-y;-webkit-tap-highlight-color:transparent;cursor:pointer}
.slider{width:100%;min-height:340px;position:relative}
.slider.slide-anim{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease}
.flipper{width:100%;min-height:340px;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.45,0.05,0.2,1)}
.flipper.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius-lg);border:0.5px solid var(--border-tertiary);background:var(--bg-primary);display:flex;flex-direction:column;padding:2rem 2.5rem}
.front{align-items:center;justify-content:center}
.back{transform:rotateY(180deg);align-items:stretch;justify-content:flex-start;overflow-y:auto}
.genre-badge{font-size:10px;letter-spacing:0.08em;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:1rem}
.quote{font-size:1.2rem;line-height:1.75;text-align:center;color:var(--text-primary);font-family:var(--font-serif)}
.flip-hint{font-size:11px;color:var(--text-tertiary);margin-top:1.25rem}
.b-genre{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.source-title{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
.source-meta{font-size:12px;color:var(--text-secondary);line-height:1.6}
.trans-block,.context-block{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border-tertiary)}
.trans-label,.context-label{font-size:10px;letter-spacing:0.06em;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:5px}
.trans-text{font-size:14px;color:var(--text-primary);line-height:1.7;font-family:var(--font-serif)}
.context-text{font-size:12px;color:var(--text-secondary);line-height:1.7}
.swipe-hint{text-align:center;font-size:10px;color:var(--text-tertiary);margin-bottom:1rem}
.actions{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:0.25rem;flex-wrap:wrap}
.act-left{display:flex;gap:8px;flex-wrap:wrap}
.ibtn{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:5px}
.ibtn:hover{background:var(--bg-secondary)}
.ibtn:disabled{opacity:0.4;cursor:default}
.ibtn.fav-on{color:#D85A30;border-color:#D85A30}
.counter{font-size:11px;color:var(--text-tertiary)}
.favs-section{margin-top:1.5rem;border-top:0.5px solid var(--border-tertiary);padding-top:1.25rem;display:none}
.favs-section.open{display:block}
.favs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.favs-title{font-size:12px;font-weight:500;color:var(--text-secondary)}
.fav-item{padding:10px 0;border-bottom:0.5px solid var(--border-tertiary);cursor:pointer}
.fav-item:last-child{border-bottom:none}
.fav-q{font-size:13px;color:var(--text-primary);line-height:1.5;font-family:var(--font-serif)}
.fav-src{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.empty-fav{font-size:12px;color:var(--text-tertiary);padding:8px 0}
</style>
</head>
<body>
<div class="app">
  <div class="app-title">言葉のカード</div>
  <div class="genre-bar" id="genre-bar"></div>

  <div class="scene" id="scene">
    <div class="slider" id="slider">
      <div class="flipper" id="flipper">
        <div class="face front">
          <div class="genre-badge" id="f-genre"></div>
          <div class="quote" id="f-quote"></div>
          <div class="flip-hint">タップで出典 / 左右スワイプで送る</div>
        </div>
        <div class="face back">
          <div class="b-genre" id="b-genre"></div>
          <div class="source-title" id="b-title"></div>
          <div class="source-meta" id="b-meta"></div>
          <div class="trans-block" id="trans-block" style="display:none">
            <div class="trans-label">邦訳</div>
            <div class="trans-text" id="b-trans"></div>
          </div>
          <div class="context-block">
            <div class="context-label">背景</div>
            <div class="context-text" id="b-context"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="swipe-hint">&larr; 前へ　　次へ &rarr;</div>

  <div class="actions">
    <div class="act-left">
      <button class="ibtn" id="prev-btn" onclick="prevCard()">&larr; 前へ</button>
      <button class="ibtn" onclick="nextCard()">次へ &rarr;</button>
      <button class="ibtn" id="fav-btn" onclick="toggleFav()">お気に入り</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="counter" id="counter"></span>
      <button class="ibtn" onclick="toggleFavList()">一覧 <span id="fav-count">0</span></button>
    </div>
  </div>

  <div class="favs-section" id="favs-section">
    <div class="favs-head">
      <span class="favs-title">お気に入り</span>
      <button class="ibtn" style="font-size:11px;padding:3px 10px" onclick="clearFavs()">すべて削除</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
const CARDS=[
  {genre:'映画',q:'You talking to me?',trans:'おれに話しかけてるのか？',source:'タクシードライバー',meta:'Martin Scorsese, 1976 / Robert De Niro',context:'トラヴィス・ビックルが鏡に向かって独り言を言うシーン。即興で生まれたとされ、アメリカ映画史上最も引用された台詞の一つ。'},
  {genre:'映画',q:'Get busy living, or get busy dying.',trans:'必死に生きるか、必死に死ぬかだ。',source:'ショーシャンクの空に',meta:'Frank Darabont, 1994 / Tim Robbins',context:'アンディがレッドに送った手紙の一節。生きることへの意志を端的に言い表した言葉。'},
  {genre:'映画',q:'I\'m gonna make him an offer he can\'t refuse.',trans:'断れない条件を出してやる。',source:'ゴッドファーザー',meta:'Francis Ford Coppola, 1972 / Marlon Brando',context:'ドン・コルレオーネが静かに、しかし絶対的な力を帯びて語る一言。恐怖と礼節が同居している。'},
  {genre:'映画',q:'We accept the love we think we deserve.',trans:'人は自分が値すると思う愛しか受け入れない。',source:'ウォールフラワー',meta:'Stephen Chbosky, 2012 / Paul Rudd',context:'チャーリーに向けてアンダーソン先生が言う一言。自己価値と愛の関係を鋭くとらえている。'},
  {genre:'映画',q:'Life is like a box of chocolates. You never know what you\'re gonna get.',trans:'人生はチョコレートの箱。開けてみるまで中身はわからない。',source:'フォレスト・ガンプ',meta:'Robert Zemeckis, 1994 / Tom Hanks',context:'母から受け継いだ言葉をフォレストが語るシーン。人生の予測不可能性と受容を語る。'},
  {genre:'映画',q:'To infinity and beyond.',trans:'無限の彼方へ、さあ行くぞ。',source:'トイ・ストーリー',meta:'John Lasseter, 1995 / Tim Allen',context:'バズ・ライトイヤーの口癖。限界を超えようとする意志と夢想の無限性を子供の言葉で表現している。'},
  {genre:'映画',q:'You can\'t handle the truth.',trans:'お前に真実は受け止められん。',source:'ア・フュー・グッドメン',meta:'Rob Reiner, 1992 / Jack Nicholson',context:'真実を問い詰められたジェサップ大佐が法廷で放つ一言。権力と真実の衝突を象徴する。'},
  {genre:'哲学',q:'我思う、ゆえに我あり。',trans:'',source:'デカルト',meta:'ルネ・デカルト『方法序説』1637年',context:'あらゆる疑いを排した後に残る唯一確実な命題。近代哲学の出発点とされる。'},
  {genre:'哲学',q:'神は死んだ。',trans:'',source:'ニーチェ',meta:'フリードリヒ・ニーチェ『悦ばしき知識』1882年',context:'近代における宗教的・道徳的権威の崩壊を宣言した言葉。ニヒリズムの出発点として読まれることが多い。'},
  {genre:'哲学',q:'他者は地獄だ。',trans:'',source:'サルトル',meta:'ジャン＝ポール・サルトル『出口なし』1944年',context:'密室に閉じ込められた登場人物ガルサンが絞り出す言葉。他者の眼差しによる存在の固定化を指す。'},
  {genre:'哲学',q:'汝自身を知れ。',trans:'',source:'ソクラテス',meta:'デルポイの神殿の銘文 / ソクラテスの哲学の核心',context:'無知の知から始まる自己探求を促す言葉。プラトンの対話篇を通じて西洋哲学の根幹となった。'},
  {genre:'哲学',q:'存在するとは知覚されることである。',trans:'原文：Esse est percipi.',source:'バークリー',meta:'ジョージ・バークリー『人知原理論』1710年',context:'物質の独立した存在を否定し、知覚することと存在することを同一視した観念論の核心命題。'},
  {genre:'哲学',q:'無知の知。',trans:'',source:'ソクラテス',meta:'プラトン『ソクラテスの弁明』より',context:'自分が何も知らないことを知っている——その認識こそが知恵の始まりとするソクラテスの立場。'},
  {genre:'現代短歌',q:'校庭の地ならし用のローラーに座れば世界中が夕焼け',trans:'',source:'穂村弘',meta:'『ラインマーカーズ』2003年',context:'何もしない放課後の、あの感覚。ローラーに座るという些細な行為が、世界全体を夕焼けに変える。少年期の孤独と宇宙感覚を同時に詠んだ一首。'},
  {genre:'現代短歌',q:'体温計くわえて窓に額つけ「ゆひら」とさわぐ雪のことかよ',trans:'',source:'穂村弘',meta:'『シンジケート』1990年',context:'病気の日に窓の外を見ている。「ゆひら」という造語が降り積む雪の柔らかさをそのまま音にしている。口語短歌の革新を象徴する恋の歌でもある。'},
  {genre:'現代短歌',q:'「この味がいいね」と君が言ったから七月六日はサラダ記念日',trans:'',source:'俵万智',meta:'『サラダ記念日』1987年',context:'なんでもない日が特別になる感覚をそのまま一首に。元のエピソードは唐揚げだったが、サラダと七夕前日の7月6日に変えることで歌の本質がより鮮明になった。現代短歌を社会現象にした一首。'},
  {genre:'現代短歌',q:'いくつもの手に撫でられて少年はようやく父の死を理解する',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',context:'触覚を通じて死を理解するという発見。言葉ではなく、手に撫でられるという身体感覚によってはじめて喪失が実感される。現代口語短歌の代表作の一つ。'},
  {genre:'現代短歌',q:'コンビニのバックヤードでミサイルを補充しているような感覚',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',context:'コンビニバイトの無機質な反復と、戦争のイメージが重なる。現代の労働と暴力の同質性を一首に圧縮した、木下龍也らしいブラックユーモアの極地。'},
  {genre:'現代短歌',q:'タワーマンションの最上階から見る街は地図のようでありそして街だ',trans:'',source:'岡野大嗣',meta:'『サイレンと犀』2014年',context:'高さから見下ろすと世界は記号になる。でもやっぱり街は街だ——その着地の一言が全てを反転させる。視点と現実のずれを詠んだ、静かな驚きのある一首。'},
  {genre:'ヒップホップ',q:'Reality is wrong. Dreams are for real.',trans:'現実こそが間違っている。夢のほうが本物だ。',source:'2Pac',meta:'Tupac Shakur',context:'現実の不条理さと夢の持つリアリティを逆転させた言葉。2Pacの思想的な深みを示す一節。'},
  {genre:'ヒップホップ',q:'Difficult takes a day, impossible takes a week.',trans:'困難なら一日、不可能なら一週間でやってのける。',source:'Jay-Z',meta:'Jay-Z "Anything" 2001年',context:'自信と努力の哲学を凝縮した一節。どんな壁も時間の問題に変えてしまう気概。'},
  {genre:'ヒップホップ',q:'I\'d rather die enormous than live dormant.',trans:'眠ったように生きるより、大きく散るほうがいい。',source:'Jay-Z',meta:'Jay-Z "Can I Live" 1996年',context:'デビューアルバム『Reasonable Doubt』収録。生のあり方をめぐる強烈な宣言。'},
  {genre:'ヒップホップ',q:'Only God can judge me.',trans:'おれを裁けるのは神だけだ。',source:'2Pac',meta:'Tupac Shakur "Only God Can Judge Me" 1996年',context:'他者の批判を超越し、神のみを審判者とする宣言。2Pacの精神的自立の核心にある言葉。'},
  {genre:'ヒップホップ',q:'The music business is motivated by money. Music is motivated by passion.',trans:'音楽産業を動かすのは金。音楽を動かすのは情熱だ。',source:'KRS-One',meta:'KRS-One (Lawrence Krisna Parker)',context:'音楽産業と音楽そのものを峻別した言葉。ブームバップ時代の精神性を体現する哲学的発言。'},
  {genre:'文学',q:'すべての幸福な家族は似たものだが、不幸な家族はそれぞれ独自の不幸を抱えている。',trans:'',source:'トルストイ',meta:'レフ・トルストイ『アンナ・カレーニナ』1878年 冒頭',context:'文学史上最も有名な書き出しの一つ。幸福の均質性と不幸の多様性を対比させたトルストイの洞察。'},
  {genre:'文学',q:'人間は考える葦である。',trans:'原文：L\'homme n\'est qu\'un roseau, le plus faible de la nature, mais c\'est un roseau pensant.',source:'パスカル',meta:'ブレーズ・パスカル『パンセ』1670年',context:'宇宙の広大さの前では葦のように脆弱な人間が、思考によってその宇宙を包含できるとする逆説。'},
  {genre:'文学',q:'メロスは激怒した。',trans:'',source:'太宰治',meta:'太宰治『走れメロス』1940年',context:'日本文学の中で最も有名な書き出しの一つ。一文でメロスの性格と物語の推進力を伝える。'},
  {genre:'文学',q:'国境の長いトンネルを抜けると雪国であった。',trans:'',source:'川端康成',meta:'川端康成『雪国』1937年',context:'ノーベル賞作家の代表作の冒頭。トンネルを境とした世界の転換が、現実と非現実の境界を暗示する。'},
  {genre:'文学',q:'吾輩は猫である。名前はまだない。',trans:'',source:'夏目漱石',meta:'夏目漱石『吾輩は猫である』1905年',context:'猫の一人称で語られる近代日本文学の傑作の書き出し。漱石の文体と視点の革新性を象徴する。'},
  {genre:'文学',q:'時間は無限の海。私たちはその砂浜に立つ一粒の砂だ。',trans:'',source:'ボルヘス',meta:'ホルヘ・ルイス・ボルヘス『砂の本』1975年',context:'無限と有限の対比をボルヘスらしい詩的な比喩で表現。砂の本という無限の書物の主題と呼応する。'},
];

const GENRE_COLORS={'映画':'#7F77DD','哲学':'#1D9E75','現代短歌':'#C2506A','ヒップホップ':'#BA7517','文学':'#3B8BD4'};
const STORAGE_KEY='kotoba-card-v3';

let used=[],favs=[],showFavs=false,isFlipped=false,activeGenre='all';
let history=[],hIndex=-1,suppressClick=false;

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({favs,activeGenre}));}catch(e){}}
function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const d=JSON.parse(r);favs=d.favs||[];activeGenre=d.activeGenre||'all';}}catch(e){}}

function filteredCards(){return activeGenre==='all'?CARDS:CARDS.filter(c=>c.genre===activeGenre);}
function pickNew(){
  let pool=filteredCards().filter(c=>!used.includes(c));
  if(pool.length===0){used=[];const cur=history[hIndex];if(cur)used.push(cur);pool=filteredCards().filter(c=>!used.includes(c));}
  if(pool.length===0)return null;
  const card=pool[Math.floor(Math.random()*pool.length)];
  used.push(card);
  return card;
}
function current(){return history[hIndex]||null;}

function renderCard(card){
  isFlipped=false;
  document.getElementById('flipper').classList.remove('flipped');
  if(!card){document.getElementById('f-quote').textContent='カードがありません';return;}
  const col=GENRE_COLORS[card.genre]||'var(--text-tertiary)';
  document.getElementById('f-genre').textContent=card.genre;
  document.getElementById('f-genre').style.color=col;
  document.getElementById('f-quote').textContent=card.q;
  document.getElementById('b-genre').textContent=card.genre;
  document.getElementById('b-genre').style.color=col;
  document.getElementById('b-title').textContent=card.source;
  document.getElementById('b-meta').textContent=card.meta;
  const tb=document.getElementById('trans-block');
  if(card.trans&&card.trans.trim()){tb.style.display='block';document.getElementById('b-trans').textContent=card.trans;}
  else{tb.style.display='none';}
  document.getElementById('b-context').textContent=card.context;
  updateFavBtn();updateCounter();updateNav();
}

function flipCard(){
  if(suppressClick){suppressClick=false;return;}
  isFlipped=!isFlipped;
  document.getElementById('flipper').classList.toggle('flipped',isFlipped);
}

function nextCard(){
  if(hIndex<history.length-1){hIndex++;animateSlide(1);}
  else{const c=pickNew();if(!c)return;history.push(c);hIndex=history.length-1;animateSlide(1);}
}
function prevCard(){if(hIndex>0){hIndex--;animateSlide(-1);}}

function animateSlide(dir){
  const slider=document.getElementById('slider');
  slider.classList.add('slide-anim');
  slider.style.transform='translateX('+(dir*45)+'px)';
  slider.style.opacity='0';
  setTimeout(function(){
    slider.classList.remove('slide-anim');
    slider.style.transform='translateX('+(-dir*45)+'px)';
    renderCard(current());
    void slider.offsetWidth;
    slider.classList.add('slide-anim');
    slider.style.transform='translateX(0)';
    slider.style.opacity='1';
  },150);
}

function updateNav(){document.getElementById('prev-btn').disabled=(hIndex<=0);}

function isFaved(card){return card&&favs.some(function(f){return f.q===card.q;});}
function toggleFav(){
  const c=current();if(!c)return;
  if(isFaved(c)){favs=favs.filter(function(f){return f.q!==c.q;});}else{favs.unshift(Object.assign({},c));}
  updateFavBtn();renderFavList();save();
}
function updateFavBtn(){
  const btn=document.getElementById('fav-btn'),on=isFaved(current());
  btn.classList.toggle('fav-on',on);
  btn.textContent=on?'解除':'お気に入り';
}
function updateCounter(){
  document.getElementById('counter').textContent=filteredCards().length+'枚';
  document.getElementById('fav-count').textContent=favs.length;
}
function toggleFavList(){showFavs=!showFavs;document.getElementById('favs-section').classList.toggle('open',showFavs);renderFavList();}
function renderFavList(){
  document.getElementById('fav-count').textContent=favs.length;
  const el=document.getElementById('fav-list');
  if(favs.length===0){el.innerHTML='<div class="empty-fav">まだお気に入りがありません</div>';return;}
  el.innerHTML=favs.map(function(f,i){return '<div class="fav-item" onclick="jumpTo('+i+')"><div class="fav-q">'+f.q+'</div><div class="fav-src">'+f.genre+' — '+f.source+'</div></div>';}).join('');
}
function jumpTo(i){
  history.push(favs[i]);hIndex=history.length-1;
  renderCard(current());
  showFavs=false;document.getElementById('favs-section').classList.remove('open');
}
function clearFavs(){favs=[];renderFavList();updateFavBtn();save();}

function buildGenreBar(){
  const genres=['all'].concat([...new Set(CARDS.map(function(c){return c.genre;}))]);
  document.getElementById('genre-bar').innerHTML=genres.map(function(g){return '<button class="gbtn'+(g===activeGenre?' on':'')+'" data-g="'+g+'" onclick="setGenre(\''+g+'\')">'+(g==='all'?'すべて':g)+'</button>';}).join('');
}
function setGenre(g){
  activeGenre=g;
  document.querySelectorAll('.gbtn').forEach(function(b){b.classList.toggle('on',b.dataset.g===g);});
  used=[];history=[];hIndex=-1;
  const c=pickNew();if(c){history.push(c);hIndex=0;}
  renderCard(current());
  save();
}

function initSwipe(){
  const scene=document.getElementById('scene');
  const slider=document.getElementById('slider');
  let sx=0,sy=0,dx=0,dy=0,active=false,isSwipe=false;
  const SWIPE_DIST=55;

  function resetPos(){slider.classList.add('slide-anim');slider.style.transform='translateX(0)';slider.style.opacity='1';}
  function start(x,y){sx=x;sy=y;dx=0;dy=0;active=true;isSwipe=false;slider.classList.remove('slide-anim');}
  function move(x,y){
    if(!active)return;
    dx=x-sx;dy=y-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      isSwipe=true;
      slider.style.transform='translateX('+dx+'px)';
      slider.style.opacity=Math.max(0.4,1-Math.abs(dx)/300);
    }
  }
  function end(){
    if(!active)return;
    active=false;
    if(isSwipe&&Math.abs(dx)>SWIPE_DIST){
      suppressClick=true;setTimeout(function(){suppressClick=false;},400);
      if(dx>0){nextCard();}else{if(hIndex>0){prevCard();}else{resetPos();}}
    }else if(isSwipe){
      suppressClick=true;setTimeout(function(){suppressClick=false;},400);
      resetPos();
    }else{resetPos();}
  }

  scene.addEventListener('click',function(){flipCard();});
  scene.addEventListener('touchstart',function(e){start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  scene.addEventListener('touchmove',function(e){move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  scene.addEventListener('touchend',end,{passive:true});

  let mdown=false;
  scene.addEventListener('mousedown',function(e){mdown=true;start(e.clientX,e.clientY);});
  window.addEventListener('mousemove',function(e){if(mdown)move(e.clientX,e.clientY);});
  window.addEventListener('mouseup',function(){if(mdown){mdown=false;end();}});
}

function init(){
  load();
  buildGenreBar();
  const c=pickNew();if(c){history.push(c);hIndex=0;}
  renderCard(current());
  renderFavList();
  initSwipe();
}
init();
</script>
</body>
</html>
