<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>言葉のカード — Kotoba Card</title>
<style>
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f4ef;--bg-tertiary:#eceae2;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-tertiary:#908f88;
  --border-tertiary:rgba(0,0,0,0.12);--border-secondary:rgba(0,0,0,0.22);--border-primary:rgba(0,0,0,0.35);
  --radius-md:8px;--radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
  --font-serif:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1f1e1c;--bg-secondary:#2a2926;--bg-tertiary:#151412;
    --text-primary:#f0efe9;--text-secondary:#b4b2a9;--text-tertiary:#888780;
    --border-tertiary:rgba(255,255,255,0.12);--border-secondary:rgba(255,255,255,0.22);--border-primary:rgba(255,255,255,0.35);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-tertiary);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.app{width:100%;max-width:640px}
.app-title{font-size:18px;font-weight:500;margin-bottom:1.25rem;text-align:center}
.genre-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;justify-content:center}
.gbtn{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans)}
.gbtn:hover{background:var(--bg-secondary)}
.gbtn.on{background:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-primary)}
.scene{width:100%;min-height:340px;margin-bottom:0.5rem;touch-action:pan-y;-webkit-tap-highlight-color:transparent;cursor:pointer}
.slider{width:100%;min-height:340px;position:relative}
.slider.slide-anim{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease}
.flipper{width:100%;min-height:340px;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.45,0.05,0.2,1)}
.flipper.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius-lg);border:0.5px solid var(--border-tertiary);background:var(--bg-primary);display:flex;flex-direction:column;padding:2rem 2.5rem}
.front{align-items:center;justify-content:center}
.back{transform:rotateY(180deg);align-items:stretch;justify-content:flex-start;overflow-y:auto}
.genre-badge{font-size:10px;letter-spacing:0.08em;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:1rem}
.quote{font-size:1.2rem;line-height:1.75;text-align:center;color:var(--text-primary);font-family:var(--font-serif)}
.flip-hint{font-size:11px;color:var(--text-tertiary);margin-top:1.25rem}
.b-genre{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.source-title{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
.source-meta{font-size:12px;color:var(--text-secondary);line-height:1.6}
.trans-block,.context-block{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border-tertiary)}
.trans-label,.context-label{font-size:10px;letter-spacing:0.06em;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:5px}
.trans-text{font-size:14px;color:var(--text-primary);line-height:1.7;font-family:var(--font-serif)}
.context-text{font-size:12px;color:var(--text-secondary);line-height:1.7}
.swipe-hint{text-align:center;font-size:10px;color:var(--text-tertiary);margin-bottom:1rem}
.actions{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:0.25rem;flex-wrap:wrap}
.act-left{display:flex;gap:8px;flex-wrap:wrap}
.ibtn{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:5px}
.ibtn:hover{background:var(--bg-secondary)}
.ibtn:disabled{opacity:0.4;cursor:default}
.ibtn.fav-on{color:#D85A30;border-color:#D85A30}
.counter{font-size:11px;color:var(--text-tertiary)}
.favs-section{margin-top:1.5rem;border-top:0.5px solid var(--border-tertiary);padding-top:1.25rem;display:none}
.favs-section.open{display:block}
.favs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.favs-title{font-size:12px;font-weight:500;color:var(--text-secondary)}
.fav-item{padding:10px 0;border-bottom:0.5px solid var(--border-tertiary);cursor:pointer}
.fav-item:last-child{border-bottom:none}
.fav-q{font-size:13px;color:var(--text-primary);line-height:1.5;font-family:var(--font-serif)}
.fav-src{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.empty-fav{font-size:12px;color:var(--text-tertiary);padding:8px 0}
</style>
</head>
<body>
<div class="app">
  <div class="app-title">言葉のカード</div>
  <div class="genre-bar" id="genre-bar"></div>

  <div class="scene" id="scene">
    <div class="slider" id="slider">
      <div class="flipper" id="flipper">
        <div class="face front">
          <div class="genre-badge" id="f-genre"></div>
          <div class="quote" id="f-quote"></div>
          <div class="flip-hint">タップで出典 / 左右スワイプで送る</div>
        </div>
        <div class="face back">
          <div class="b-genre" id="b-genre"></div>
          <div class="source-title" id="b-title"></div>
          <div class="source-meta" id="b-meta"></div>
          <div class="trans-block" id="trans-block" style="display:none">
            <div class="trans-label">邦訳</div>
            <div class="trans-text" id="b-trans"></div>
          </div>
          <div class="context-block">
            <div class="context-label">背景</div>
            <div class="context-text" id="b-context"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="swipe-hint">&larr; 前へ　　次へ &rarr;</div>

  <div class="actions">
    <div class="act-left">
      <button class="ibtn" id="prev-btn" onclick="prevCard()">&larr; 前へ</button>
      <button class="ibtn" onclick="nextCard()">次へ &rarr;</button>
      <button class="ibtn" id="fav-btn" onclick="toggleFav()">お気に入り</button>
      <button class="ibtn" onclick="shareCard()">シェア</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="counter" id="counter"></span>
      <button class="ibtn" onclick="toggleFavList()">一覧 <span id="fav-count">0</span></button>
    </div>
  </div>

  <div class="favs-section" id="favs-section">
    <div class="favs-head">
      <span class="favs-title">お気に入り</span>
      <button class="ibtn" style="font-size:11px;padding:3px 10px" onclick="clearFavs()">すべて削除</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
const CARDS=[
  {genre:'映画',q:'You talking to me?',trans:'おれに話しかけてるのか？',source:'タクシードライバー',meta:'Martin Scorsese, 1976 / トラヴィス・ビックル（Robert De Niro）',context:'トラヴィス・ビックルが鏡に向かって独り言を言うシーン。即興で生まれたとされ、アメリカ映画史上最も引用された台詞の一つ。'},
  {genre:'映画',q:'Get busy living, or get busy dying.',trans:'必死に生きるか、必死に死ぬかだ。',source:'ショーシャンクの空に',meta:'Frank Darabont, 1994 / アンディ・デュフレーン（Tim Robbins）',context:'アンディがレッドに送った手紙の一節。生きることへの意志を端的に言い表した言葉。'},
  {genre:'映画',q:'I\'m gonna make him an offer he can\'t refuse.',trans:'断れない条件を出してやる。',source:'ゴッドファーザー',meta:'Francis Ford Coppola, 1972 / ドン・コルレオーネ（Marlon Brando）',context:'ドン・コルレオーネが静かに、しかし絶対的な力を帯びて語る一言。恐怖と礼節が同居している。'},
  {genre:'映画',q:'We accept the love we think we deserve.',trans:'人は自分が値すると思う愛しか受け入れない。',source:'ウォールフラワー',meta:'Stephen Chbosky, 2012 / アンダーソン先生（Paul Rudd）',context:'チャーリーに向けてアンダーソン先生が言う一言。自己価値と愛の関係を鋭くとらえている。'},
  {genre:'映画',q:'Life is like a box of chocolates. You never know what you\'re gonna get.',trans:'人生はチョコレートの箱。開けてみるまで中身はわからない。',source:'フォレスト・ガンプ',meta:'Robert Zemeckis, 1994 / フォレスト・ガンプ（Tom Hanks）',context:'母から受け継いだ言葉をフォレストが語るシーン。人生の予測不可能性と受容を語る。'},
  {genre:'映画',q:'To infinity and beyond.',trans:'無限の彼方へ、さあ行くぞ。',source:'トイ・ストーリー',meta:'John Lasseter, 1995 / バズ・ライトイヤー（Tim Allen）',context:'バズ・ライトイヤーの口癖。限界を超えようとする意志と夢想の無限性を子供の言葉で表現している。'},
  {genre:'映画',q:'You can\'t handle the truth.',trans:'お前に真実は受け止められん。',source:'ア・フュー・グッドメン',meta:'Rob Reiner, 1992 / ジェサップ大佐（Jack Nicholson）',context:'真実を問い詰められたジェサップ大佐が法廷で放つ一言。権力と真実の衝突を象徴する。'},
  {genre:'映画',q:'The more you know who you are, and what you want, the less you let things upset you.',trans:'自分が何者で、何を求めているかが分かれば分かるほど、周りのことに動揺しなくなる。',source:'ロスト・イン・トランスレーション',meta:'Sofia Coppola, 2003 / ボブ・ハリス（Bill Murray）',context:'異国東京の高級ホテルで眠れぬ夜を過ごす中年の映画スターが、将来やアイデンティティに不安を抱える若い女性に語りかけるシーン。自己認識の成熟がもたらす精神的平穏を説く。'},
  {genre:'映画',q:'If there\'s any kind of magic in this world it must be in the attempt of understanding someone sharing something.',trans:'もしこの世に魔法のようなものがあるとしたら、それは誰かを理解しようとし、何かを分かち合おうとする試みの中にあるはず。',source:'ビフォア・サンライズ',meta:'Richard Linklater, 1995 / セリーヌ（Julie Delpy）',context:'ウィーンの街を夜通し歩きながら、出会ったばかりの二人が互いの人生観を語り合うシーン。他者へ手を伸ばす行為自体に超越的な価値を見出すヒューマニズムの極致。'},
  {genre:'映画',q:'Voilà, ma petite Amélie, vous n\'avez pas des os en verre.',trans:'アメリ、君の骨はガラスじゃない。人生のぶつかり合いにも耐えられる。',source:'アメリ',meta:'Jean-Pierre Jeunet, 2001 / レイモン・デュファイエル（Serge Merlin）',context:'骨が極端にもろい難病を抱え20年間家から出ずに生きる隣人が、恋に臆病になっているアメリの背中を押すシーン。自らの肉体的制約とアメリの心理的制約を対比させ、人生の痛みを恐れずに他者と関わることの尊さを説いている。'},
  {genre:'映画',q:'Without love, what reason is there for anything?',trans:'愛がなければ、何のために存在するっていうんだ？',source:'パターソン',meta:'Jim Jarmusch, 2016 / エヴェレット（William Jackson Harper）',context:'失恋に打ちひしがれたバーの常連客が感情を爆発させる直前に放つセリフ。平穏な日常の反復美を描く本作において、人間のあらゆる営みの根源的動機が「愛」であることを切実に突きつける。'},
  {genre:'映画',q:'Life passes most people by while they\'re still making grand plans for it.',trans:'ほとんどの人間は、人生の壮大な計画を立てている間に、人生そのものを通り過ぎさせてしまう。',source:'ブロウ',meta:'Ted Demme, 2001 / ジョージ・ユング（Johnny Depp）',context:'伝説的なドラッグ・ディーラーの波乱万丈な半生を振り返る述懐。未来への準備にばかり気を取られ、目の前にある「現在」を生きることを忘れてしまう人間の普遍的な愚かさと時間の不可逆性への哀愁。'},
  {genre:'映画',q:'I can\'t relate to 99% of humanity.',trans:'人類の99パーセントには共感できない。',source:'ゴーストワールド',meta:'Terry Zwigoff, 2001 / シーモア（Steve Buscemi）',context:'社会に馴染めないブルース・レコードの収集家である中年男が、極端な孤立感と他者への疎外感を吐露するセリフ。大量消費社会や画一化されたポップカルチャーへの静かな抵抗。'},
  {genre:'映画',q:'The only true currency in this bankrupt world is what you share with someone else when you\'re uncool.',trans:'この破産した世界における唯一の真の通貨とは、君が「クールじゃない」時に、他の誰かと分かち合うもののことだ。',source:'あの頃ペニー・レインと',meta:'Cameron Crowe, 2000 / レスター・バングス（Philip Seymour Hoffman）',context:'ロック業界の幻想と欺瞞に直面し傷ついた15歳の少年ジャーナリストに対し、伝説のロック評論家が電話越しに語りかけるシーン。真の芸術や友情は自らが「クールではない」という脆弱性を共有することから生まれると説く。'},
  {genre:'映画',q:'Finance is a gun. Politics is knowing when to pull the trigger.',trans:'財力は銃だ。政治とは、いつその引き金を引くかを知ることである。',source:'ゴッドファーザー PART III',meta:'Francis Ford Coppola, 1990 / ドン・リシオ・ルケージ（Enzo Robutti）',context:'バチカンや政財界の黒幕が絡む巨大な陰謀の中で、イタリア政界のフィクサーが冷酷に語るセリフ。資本というポテンシャルエネルギーを政治的タイミングで運用することこそが現代の真の支配力であるという冷徹な事実を突いている。'},
  {genre:'映画',q:'Sometimes people deserve to have their faith rewarded.',trans:'時には人々の信念が報われることも必要だ。',source:'ダークナイト',meta:'Christopher Nolan, 2008 / バットマン（Christian Bale）',context:'ゴッサム・シティの希望の星であったハービー・デントが堕落した真実を隠蔽し、自らが全ての罪を被る決断を下す際に語るセリフ。真実よりも「高貴な嘘」が社会を支えるという権力と自己犠牲の政治哲学。'},
  {genre:'映画',q:'Names is for tombstones, baby.',trans:'名前なんてのは墓石のためにあるんだよ、ベイビー。',source:'007／死ぬのは奴らだ',meta:'Guy Hamilton, 1973 / Mr.ビッグ（Yaphet Kotto）',context:'ジェームズ・ボンドが「ボンド、ジェームズ・ボンドだ」という有名な自己紹介を試みた瞬間、麻薬王がそれを冷酷に遮って放つセリフ。スパイ映画のアイコンたる主人公の自己顕示を完全に無化するストリートのリアリズム。'},
  {genre:'映画',q:'Well, as a historian, I must remind you that the world hasn\'t had much trouble from Carthage in the past two thousand years.',trans:'歴史家として指摘しておかなければならないが、過去2000年間、世界はカルタゴから何の面倒もかけられていない。',source:'ストレンジャー',meta:'Orson Welles, 1946 / チャールズ・ランキン（Orson Welles）',context:'アメリカの田舎町で教授として身分を偽るナチスの逃亡戦犯が、ディナーの席で放つセリフ。洗練された知的なウィットの表面下に、人命を軽視し大量虐殺を正当化しようとするファシストの異常な倫理観が垣間見える。'},
  {genre:'映画',q:'All right, fellas, let\'s go and say a prayer for a boy who couldn\'t run as fast as I could.',trans:'よしお前たち、私ほど速く走れなかった一人の少年のために、祈りを捧げに行こう。',source:'汚れた顔の天使',meta:'Michael Curtiz, 1938 / ジェリー・コノリー神父（Pat O\'Brien）',context:'幼少期の万引きで逃げ足が遅かったために犯罪者の道を歩んだロッキーが死刑執行された後、神父が不良少年たちに向けて語る言葉。人間の運命が幼少期の些細な偶然によって決定づけられてしまうことへの哀しさと深い慈愛。'},
  {genre:'映画',q:'Maybe that\'s what hell is, the entire rest of eternity spent in fuckin\' Bruges.',trans:'たぶん、地獄ってのはこういうことなんだ。永遠の残りの時間を、このクソ忌々しいブルージュで過ごすことなんだよ。',source:'ヒットマンズ・レクイエム',meta:'Martin McDonagh, 2008 / レイ（Colin Farrell）',context:'暗殺の仕事で誤って少年を撃ち殺してしまった新米の殺し屋が、美しい中世の街ブルージュで深い罪悪感に苛まれながら呟くセリフ。美しい街並みと取り返しのつかない罪の意識との残酷なコントラスト。'},
  {genre:'映画',q:'Rudeness is merely an expression of fear.',trans:'無礼さというのは、単なる恐怖の表現に過ぎない。',source:'グランド・ブダペスト・ホテル',meta:'Wes Anderson, 2014 / ムッシュ・グスタヴ・H（Ralph Fiennes）',context:'伝説的なコンシェルジュが、人間の粗野な振る舞いの裏にある心理的メカニズムについて語るセリフ。他者の攻撃性を悪意ではなく「欠落への恐怖」として再定義し、醜悪さを愛によって中和するという究極のヒューマニズム。'},
  {genre:'映画',q:'I didn\'t invent the rainy day, man. I just own the best umbrella.',trans:'俺が雨の日を発明したわけじゃない。ただ、最高の傘を持っているだけさ。',source:'あの頃ペニー・レインと',meta:'Cameron Crowe, 2000 / デニス・ホープ（Jimmy Fallon）',context:'純粋な音楽への情熱で結ばれていたバンドに商業主義を持ち込む敏腕マネージャーが、自らのビジネス手法を正当化する際のセリフ。ファンの熱狂がいずれ冷めるという現実を突きつけ、その自然法則を利用するだけだと言い放つ冷徹なプラグマティズム。'},
  {genre:'映画',q:'To look at a thing is quite different from seeing a thing, and one does not see anything until one sees its beauty.',trans:'ものに「目を向ける」ことと、ものを「見る」ことは全く別物です。',source:'理想の結婚',meta:'Oliver Parker, 1999 / メイベル（Minnie Driver）',context:'オスカー・ワイルドの戯曲を原作とする本作において、上流階級の洗練された会話の中で発せられる美的認識論。視覚的情報の処理と、本質的な価値や美学の理解の間に明確な境界線を引く。'},
  {genre:'映画',q:'We want the finest wines available to humanity. We want them here, and we want them now.',trans:'我々に、人類が入手し得る最高級のワインを出してくれ。今すぐ、ここへだ。',source:'ウィズネイルと僕',meta:'Bruce Robinson, 1987 / ウィズネイル（Richard E. Grant）',context:'極度の貧困とアルコール依存に陥っている売れない役者の二人が、田舎の上品なティールームに泥酔状態で現れ傍若無人に要求するセリフ。悲惨な経済状況と特権階級的なエゴイズムの凄まじいギャップが狂気じみたユーモアを生み出している。'},
  {genre:'映画',q:'Hell, I can get you a toe by 3 o\'clock this afternoon... with nail polish.',trans:'今日の午後3時までに足の指くらい手に入れてやるよ……マニキュア付きでな。',source:'ビッグ・リボウスキ',meta:'Joel & Ethan Coen, 1998 / ウォルター（John Goodman）',context:'誘拐された妻の切断された足の指が送られてきてパニックに陥る友人に対し、ベトナム帰還兵のウォルターが事態を全く意に介さず強弁するセリフ。コーエン兄弟特有の不条理なユーモアの極致。'},
  {genre:'映画',q:'Baravelli, you\'ve got the brain of a four-year-old boy, and I bet he was glad to get rid of it.',trans:'君は4歳の少年の脳ミソを持っているな。その少年は、そんな脳ミソを捨てられてさぞ喜んだことだろう。',source:'御冗談でショ',meta:'Norman Z. McLeod, 1932 / クインシー・アダムス・ワグスタッフ教授（Groucho Marx）',context:'大学の新学長が、フットボールチームを強化するために酒場に入り浸る男をスカウトしようとする際の不条理な会話。慣用句を文字通りの意味にすり替えることで言語の約束事を破壊するコメディ・センス。'},
  {genre:'映画',q:'This is no time for Schopenhauer. This is important.',trans:'今はショーペンハウアーなんて持ち出している場合じゃない。これは重要な問題なのよ。',source:'アントニア',meta:'Marleen Gorris, 1995 / アントニア（Willeke van Ammelrooy）',context:'過度に観念的でペシミスティックな哲学者の言説に逃げ込もうとする相手に対し、現実の直視を迫る力強い一言。学問的な抽象論を、生活に根ざした現実的な実践が凌駕する瞬間。'},
  {genre:'哲学',q:'我思う、ゆえに我あり。',trans:'',source:'デカルト',meta:'ルネ・デカルト『方法序説』1637年',context:'あらゆる疑いを排した後に残る唯一確実な命題。近代哲学の出発点とされる。'},
  {genre:'哲学',q:'神は死んだ。',trans:'',source:'ニーチェ',meta:'フリードリヒ・ニーチェ『悦ばしき知識』1882年',context:'近代における宗教的・道徳的権威の崩壊を宣言した言葉。ニヒリズムの出発点として読まれることが多い。'},
  {genre:'哲学',q:'他者は地獄だ。',trans:'',source:'サルトル',meta:'ジャン＝ポール・サルトル『出口なし』1944年',context:'密室に閉じ込められた登場人物ガルサンが絞り出す言葉。他者の眼差しによる存在の固定化を指す。'},
  {genre:'哲学',q:'汝自身を知れ。',trans:'',source:'ソクラテス',meta:'デルポイの神殿の銘文 / ソクラテスの哲学の核心',context:'無知の知から始まる自己探求を促す言葉。プラトンの対話篇を通じて西洋哲学の根幹となった。'},
  {genre:'哲学',q:'存在するとは知覚されることである。',trans:'原文：Esse est percipi.',source:'バークリー',meta:'ジョージ・バークリー『人知原理論』1710年',context:'物質の独立した存在を否定し、知覚することと存在することを同一視した観念論の核心命題。'},
  {genre:'哲学',q:'無知の知。',trans:'',source:'ソクラテス',meta:'プラトン『ソクラテスの弁明』より',context:'自分が何も知らないことを知っている——その認識こそが知恵の始まりとするソクラテスの立場。'},
  {genre:'現代短歌',q:'校庭の地ならし用のローラーに座れば世界中が夕焼け',trans:'',source:'穂村弘',meta:'『ラインマーカーズ』2003年',context:'何もしない放課後の、あの感覚。ローラーに座るという些細な行為が、世界全体を夕焼けに変える。少年期の孤独と宇宙感覚を同時に詠んだ一首。'},
  {genre:'現代短歌',q:'体温計くわえて窓に額つけ「ゆひら」とさわぐ雪のことかよ',trans:'',source:'穂村弘',meta:'『シンジケート』1990年',context:'病気の日に窓の外を見ている。「ゆひら」という造語が降り積む雪の柔らかさをそのまま音にしている。口語短歌の革新を象徴する恋の歌でもある。'},
  {genre:'現代短歌',q:'「この味がいいね」と君が言ったから七月六日はサラダ記念日',trans:'',source:'俵万智',meta:'『サラダ記念日』1987年',context:'なんでもない日が特別になる感覚をそのまま一首に。元のエピソードは唐揚げだったが、サラダと七夕前日の7月6日に変えることで歌の本質がより鮮明になった。現代短歌を社会現象にした一首。'},
  {genre:'現代短歌',q:'いくつもの手に撫でられて少年はようやく父の死を理解する',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',context:'触覚を通じて死を理解するという発見。言葉ではなく、手に撫でられるという身体感覚によってはじめて喪失が実感される。現代口語短歌の代表作の一つ。'},
  {genre:'現代短歌',q:'コンビニのバックヤードでミサイルを補充しているような感覚',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',context:'コンビニバイトの無機質な反復と、戦争のイメージが重なる。現代の労働と暴力の同質性を一首に圧縮した、木下龍也らしいブラックユーモアの極地。'},
  {genre:'現代短歌',q:'タワーマンションの最上階から見る街は地図のようでありそして街だ',trans:'',source:'岡野大嗣',meta:'『サイレンと犀』2014年',context:'高さから見下ろすと世界は記号になる。でもやっぱり街は街だ——その着地の一言が全てを反転させる。視点と現実のずれを詠んだ、静かな驚きのある一首。'},
  {genre:'現代短歌',q:'飛び上がり自殺をきっとするだろう人に翼を与えたならば',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',context:'自らを傷つけようとする衝動を持つ人間に翼を与えたならば——という問いかけ。生と死の境界線上にある人間の本質を一首に圧縮した、木下龍也の代表作の一つ。'},
  {genre:'現代短歌',q:'唇が荒れるくらいの長いキスまでに交わした短い会話',trans:'',source:'木下龍也',meta:'木下龍也',context:'キスの前に交わされた短い会話という、ほんの数秒の記憶を切り取った一首。その些細な瞬間が永遠に残るという感覚が胸に刺さる。'},
  {genre:'現代アート',q:'ニューヨークのマンション群のエレベーターに入る作品でなければアートの世界で成功することはないだろう',trans:'',source:'みんなの現代アート',meta:'みんなの現代アート',context:'現代アートの商業的・地理的な権力構造を皮肉った言葉。ニューヨークという特定の場所と富裕層というコンテクストなしには成立しないアート市場の現実を突いている。'},
  {genre:'ヒップホップ',q:'Reality is wrong. Dreams are for real.',trans:'現実こそが間違っている。夢のほうが本物だ。',source:'2Pac',meta:'Tupac Shakur',context:'現実の不条理さと夢の持つリアリティを逆転させた言葉。2Pacの思想的な深みを示す一節。'},
  {genre:'ヒップホップ',q:'Difficult takes a day, impossible takes a week.',trans:'困難なら一日、不可能なら一週間でやってのける。',source:'Jay-Z',meta:'Jay-Z "Anything" 2001年',context:'自信と努力の哲学を凝縮した一節。どんな壁も時間の問題に変えてしまう気概。'},
  {genre:'ヒップホップ',q:'I\'d rather die enormous than live dormant.',trans:'眠ったように生きるより、大きく散るほうがいい。',source:'Jay-Z',meta:'Jay-Z "Can I Live" 1996年',context:'デビューアルバム『Reasonable Doubt』収録。生のあり方をめぐる強烈な宣言。'},
  {genre:'ヒップホップ',q:'Only God can judge me.',trans:'おれを裁けるのは神だけだ。',source:'2Pac',meta:'Tupac Shakur "Only God Can Judge Me" 1996年',context:'他者の批判を超越し、神のみを審判者とする宣言。2Pacの精神的自立の核心にある言葉。'},
  {genre:'ヒップホップ',q:'The music business is motivated by money. Music is motivated by passion.',trans:'音楽産業を動かすのは金。音楽を動かすのは情熱だ。',source:'KRS-One',meta:'KRS-One (Lawrence Krisna Parker)',context:'音楽産業と音楽そのものを峻別した言葉。ブームバップ時代の精神性を体現する哲学的発言。'},
  {genre:'ヒップホップ',q:'Success is my only option, failure\'s not.',trans:'成功こそが俺の唯一の選択肢であり、失敗はあり得ない。',source:'Eminem',meta:'Eminem "Lose Yourself"',context:'半自伝的映画『8 Mile』の主題歌。貧困から抜け出すためには成功するしか道がないという、切迫したハングリー精神が表現されている。'},
  {genre:'ヒップホップ',q:'Sky\'s the limit and you know that you can have what you want, be what you want.',trans:'限界は空の彼方。望むものを手に入れ、なりたい自分になれる。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G. "Sky\'s the Limit"',context:'ニューヨークの過酷な環境から世界的スターへと上り詰めた自身の経験に基づく究極の自己肯定のメッセージ。周囲の否定的な声や制度的障壁を遮断し、自身の情熱を信じ抜くことの重要性を説いている。'},
  {genre:'ヒップホップ',q:'Started from the bottom, now we\'re here.',trans:'底辺から始まって、今俺たちはここにいる。',source:'Drake',meta:'Drake "Started From The Bottom"',context:'過去の無名時代や苦労の時期を振り返り、現在の圧倒的な成功と対比させた現代ヒップホップの代表的アンセム。「俺たち」という仲間との連帯とともに上昇したことが強調されている。'},
  {genre:'ヒップホップ',q:'Dedication, hard work plus patience. The sum of all my sacrifice, I\'m done waitin\'.',trans:'献身、ハードワーク、そして忍耐。これらすべての犠牲の結晶だ、もう待つのは終わりだ。',source:'Nipsey Hussle',meta:'Nipsey Hussle "Dedication" feat. Kendrick Lamar',context:'長年にわたるインディペンデントでの活動の末にメジャー・デビュー・アルバムをリリースした際の核心的なリリック。一過性の成功ではなく長期的なビジネス構築と自立を宣言している。'},
  {genre:'ヒップホップ',q:'Sunny days wouldn\'t be special if it wasn\'t for rain. Joy wouldn\'t feel so good if it wasn\'t for pain.',trans:'雨が降らなければ、晴れの日も特別には感じない。痛みがなければ、喜びもこれほど素晴らしいものにはならない。',source:'50 Cent',meta:'50 Cent "Many Men (Wish Death)"',context:'銃撃事件で9発の銃弾を受けながらも生還した自身の壮絶な体験を背景に、苦難の受容を歌った一節。人生における対極の要素を対比させ、逆境の経験こそが現在の幸福の価値を決定づけると説いている。'},
  {genre:'ヒップホップ',q:'All my life they been tryin\' to keep me down. All this time, never thought I would make it out.',trans:'これまでの人生ずっと、奴らは俺を押さえつけようとしてきた。ここから抜け出せるとは思っていなかった。',source:'Lil Durk',meta:'Lil Durk feat. J. Cole "All My Life"',context:'シカゴの過酷な環境や司法制度といった構造的な抑圧に対する生々しい証言。絶対に屈しないというレジリエンスと、困難を生き延びたことへの誇りが力強く表現されている。'},
  {genre:'ヒップホップ',q:'They say sleep is the cousin of death, so I don\'t sleep.',trans:'眠りは死の従兄弟だと言われる。だから俺は眠らない。',source:'Nas',meta:'Nas "N.Y. State of Mind"',context:'1990年代のニューヨークの危険なストリート環境において、常に死の危険に晒されているため無防備な状態（睡眠）すら恐怖の対象となる過酷な現実を描写。トラウマ的覚醒状態を詩的に表現した歴史的名文句。'},
  {genre:'ヒップホップ',q:'My mama always used to tell me: \'If you can\'t find somethin\' to live for, you best find somethin\' to die for.\'',trans:'母さんはいつも俺にこう言った。生きる目的を見つけられないなら、死ぬための目的を見つけるのが一番だ、と。',source:'2Pac',meta:'2Pac インタビュー・スピーチ',context:'ブラックパンサー党員であった母親から受け継いだ革命的イデオロギーを反映した言葉。命を懸けるほどの絶対的な信念や大義を持つことの重要性を説く強烈なメッセージ。'},
  {genre:'ヒップホップ',q:'Some people say they want to live forever. That\'s way too long, I\'ll just get through today.',trans:'永遠に生きたいと言う人もいる。だがそれは長すぎる、俺は今日を生き抜くだけだ。',source:'Mac Miller',meta:'Mac Miller "Complicated"',context:'内面的な苦痛と闘っていた彼自身の、終わりのない精神的疲労感を吐露したリリック。不老不死を望むのではなく、複雑な現実の中でただ「今日一日」を無事に乗り越えることの困難さを描写している。'},
  {genre:'ヒップホップ',q:'I just need a way out of my head. I\'ll do anything for a way out of my head.',trans:'ただ自分の頭の中から抜け出す方法が必要なんだ。頭の中から抜け出せるなら、なんだってする。',source:'Mac Miller',meta:'Mac Miller "Come Back to Earth"',context:'アルバム『Swimming』の冒頭を飾る、鬱や不安による絶え間ない思考の反芻からの解放を求める悲痛な叫び。内面的な孤独と平穏を渇望する生々しい人間性が刻み込まれている。'},
  {genre:'ヒップホップ',q:'Somewhere deep down there\'s a decent man in me, he just can\'t be found.',trans:'俺の心の奥底のどこかには、まともな人間が存在するはずなんだ。ただ、それを見つけられないだけで。',source:'Eminem',meta:'Eminem 語録',context:'世間に見せている過激なペルソナと、その内側にある本来の脆い自己との間の乖離に苦悩する姿を描いている。複雑な家庭環境やトラウマがもたらした人格的な葛藤が率直に語られている。'},
  {genre:'ヒップホップ',q:'I\'m not afraid of dying, I\'m afraid of not trying.',trans:'俺は死ぬことは恐れていない。恐れているのは、挑戦しないことだ。',source:'Jay-Z',meta:'Jay-Z "Beach Chair"',context:'リスクの高い決断を下す際の究極的な心構えを示した言葉。死という不可避の運命よりも、行動を起こさずに後悔を抱えたまま生きることのほうが恐ろしいと断言するゼロから帝国を築いた起業家精神の根幹。'},
  {genre:'ヒップホップ',q:'The present is a gift, and I just want to be.',trans:'現在（プレゼント）は贈り物（プレゼント）だ。だから俺はただ、ありのままでいたい。',source:'Common',meta:'Common "Be"',context:'過去の後悔や未来への不安に囚われることなく、今この瞬間を生きることの尊さを「Present（現在・贈り物）」というダブル・ミーニングを用いて表現。精神的な静寂と自己受容の境地を示している。'},
  {genre:'ヒップホップ',q:'A poet\'s mission is to make words do more work than they normally do, to make them work on more than one level.',trans:'詩人の使命とは、言葉に通常以上の仕事をさせること、複数のレベルで機能させることだ。',source:'JAY-Z',meta:'JAY-Z 著書『Decoded』',context:'ヒップホップのリリックが持つ文学的な深さと複雑さを、ラップ界の頂点に立つ彼自身が論理的に定義した言葉。ストリートのスラングがいかにして普遍的な芸術性や社会的批評へと昇華されるかを説明している。'},
  {genre:'ヒップホップ',q:'Nobody built like you, you designed yourself.',trans:'君と同じように作られた人間は誰もいない。君は君自身をデザインしたんだ。',source:'JAY-Z',meta:'JAY-Z "A Dream"',context:'他者の意見や社会の既成概念に流されることなく、独自の道を切り開くことの重要性を説いたアファメーションのメッセージ。自らの主体的な選択の積み重ねが現在の唯一無二の自己を形成していると称賛している。'},
  {genre:'ヒップホップ',q:'Real G\'s move in silence like lasagna.',trans:'本物のギャングスタは静かに動く、ラザニアのようにな。',source:'Lil Wayne',meta:'Lil Wayne "6 Foot 7 Foot"',context:'真の実力者は自己顕示することなく水面下で行動するという信条を言葉遊びで表現した天才的なリリック。「ラザニア（lasagna）」の綴りにおける「g」が発音されないことに掛けている。'},
  {genre:'ヒップホップ',q:'Life is such a f**king roller coaster, then it drops, but what should I scream for? This is my theme park.',trans:'人生はジェットコースターだ。急降下する。だが、なぜ俺が叫ぶ必要がある？ここは俺のテーマパークだぜ。',source:'Lil Wayne',meta:'Lil Wayne "Forever"',context:'人生の激しい浮き沈みをジェットコースターに例えつつ、そのコントロール権は完全に自分にあると宣言。困難な状況すらも自分が所有する「遊園地」の一部として楽しむ自己肯定感を放っている。'},
  {genre:'ヒップホップ',q:'Love me or hate me, I swear it won\'t make or break me.',trans:'俺を愛そうが憎もうが勝手だ。それで俺がどうにかなることも、壊れることもない。',source:'Lil Wayne',meta:'Lil Wayne 語録',context:'世間からの絶大な称賛と同時に浴びせられる激しい批判の両方を完全に無効化する強靭な精神状態を示している。外部の評価によって自己価値が変動することはないという揺るぎないアイデンティティの確立。'},
  {genre:'ヒップホップ',q:'I know I can be what I wanna be.',trans:'俺はなりたい自分になれるって分かってるんだ。',source:'Nas',meta:'Nas "I Can"',context:'特に貧困層や有色人種の子供たちに向けて、教育の重要性と無限の可能性をストレートに伝えた啓蒙的な楽曲のコーラス部分。否定的な環境要因を自己信念で克服できるという未来世代へのエンパワーメント。'},
  {genre:'ヒップホップ',q:'Love yourself and your expression, you can\'t go wrong.',trans:'自分自身と、自らの表現を愛せよ。そうすれば間違えることはない。',source:'KRS-One',meta:'KRS-One 語録',context:'ヒップホップの草創期から哲学的な指導者として機能してきた彼による、カルチャーの核心を突く言葉。技巧や商業的成功以前に、表現の根底には自己受容と本質的な愛が存在しなければならないという真理。'},
  {genre:'ヒップホップ',q:'It ain\'t no fun if the homies can\'t have none.',trans:'仲間たちが分け前をもらえないなら、そんなもの少しも面白くない。',source:'Snoop Dogg',meta:'Snoop Dogg "Ain\'t No Fun"',context:'個人の成功や富を独占するのではなく、苦楽を共にしてきたコミュニティや仲間と分かち合うことこそが真の価値であるという、ヒップホップにおける絶対的な忠誠心と連帯感の規範を示している。'},
  {genre:'ヒップホップ',q:'Always do your best, don\'t let the pressure make you panic.',trans:'常に最善を尽くせ。プレッシャーに負けてパニックになるな。',source:'2Pac',meta:'2Pac "Me Against the World"',context:'不確実で暴力的な世界の中で孤立無援に陥った際の実践的なアドバイス。不条理や重圧に直面しても冷静さを保ち、自分がコントロールできる範囲の努力に集中することの重要性を説いている。'},
  {genre:'ヒップホップ',q:'Without a game plan, and without a strong sense of faith in what you\'re doing, it\'s going to be really hard to accomplish anything.',trans:'ゲームプランがなく、強い信念がなければ、何かを成し遂げることは非常に困難になる。',source:'Nipsey Hussle',meta:'Nipsey Hussle インタビュー',context:'単なるストリートのハッスラーから尊敬を集める起業家へと変貌を遂げた彼が遺した極めて論理的な成功法則。情熱だけでなく綿密な計画と揺るぎない自己信頼の両輪があってこそ目標は達成されると明言。'},
  {genre:'ヒップホップ',q:'You\'ve got to realize that the world\'s a test. You can only do your best and let him do the rest.',trans:'世界は試練だということに気づかなければならない。最善を尽くし、あとは神に委ねるしかない。',source:'OutKast',meta:'OutKast "In Due Time"',context:'人生において理不尽な困難や挫折が連続する理由を、精神的な成長のための「テスト」として再解釈。人間の努力が及ぶ限界を認め、それ以上の結果に対する執着を手放すという宗教的な受容のプロセス。'},
  {genre:'ヒップホップ',q:'If people take anything from my music, it should be motivation to know that anything is possible as long as you keep working at it and don\'t back down.',trans:'努力を続け、決して引き下がらない限り、何事も可能だということを知るためのモチベーションを俺の音楽から受け取ってほしい。',source:'Eminem',meta:'Eminem インタビュー',context:'彼のディスコグラフィの多くが怒りや論争に満ちている一方で、その根本的な原動力は逆境にあるリスナーに対する究極の鼓舞であることを語っている。自身の軌跡を普遍的な励ましへと変換している。'},
  {genre:'ヒップホップ',q:'Enjoy the best things in your life cuz you ain\'t gonna get to live it twice.',trans:'人生における最高の瞬間を楽しめ。人生を二度生きることはできないのだから。',source:'Mac Miller',meta:'Mac Miller 語録',context:'過ぎ去っていく時間に対する後悔や未来への不安を脇に置き、今目の前にある喜びを純粋に享受することの大切さを訴えかけている。26歳という若さでこの世を去った彼の生涯を振り返ると一層の重みを持つ言葉。'},
  {genre:'ヒップホップ',q:'First you gotta find your passion then you stick with it, one thing about this game you gotta stay consistent.',trans:'まず情熱を見つけ、それに固執しなければならない。一貫性を保ち続けることがこのゲームの真理だ。',source:'Larry June',meta:'Larry June 語録',context:'すぐに結果が出ない時期やモチベーションが落ちる日々でも自分が選んだ道を投げ出さないことの絶対性を説いている。才能以上に「継続性」こそが業界を生き残るための最大の武器というビジネス上の教訓。'},
  {genre:'文学',q:'すべての幸福な家族は似たものだが、不幸な家族はそれぞれ独自の不幸を抱えている。',trans:'',source:'トルストイ',meta:'レフ・トルストイ『アンナ・カレーニナ』1878年 冒頭',context:'文学史上最も有名な書き出しの一つ。幸福の均質性と不幸の多様性を対比させたトルストイの洞察。'},
  {genre:'文学',q:'人間は考える葦である。',trans:'原文：L\'homme n\'est qu\'un roseau, le plus faible de la nature, mais c\'est un roseau pensant.',source:'パスカル',meta:'ブレーズ・パスカル『パンセ』1670年',context:'宇宙の広大さの前では葦のように脆弱な人間が、思考によってその宇宙を包含できるとする逆説。'},
  {genre:'文学',q:'メロスは激怒した。',trans:'',source:'太宰治',meta:'太宰治『走れメロス』1940年',context:'日本文学の中で最も有名な書き出しの一つ。一文でメロスの性格と物語の推進力を伝える。'},
  {genre:'文学',q:'国境の長いトンネルを抜けると雪国であった。',trans:'',source:'川端康成',meta:'川端康成『雪国』1937年',context:'ノーベル賞作家の代表作の冒頭。トンネルを境とした世界の転換が、現実と非現実の境界を暗示する。'},
  {genre:'文学',q:'吾輩は猫である。名前はまだない。',trans:'',source:'夏目漱石',meta:'夏目漱石『吾輩は猫である』1905年',context:'猫の一人称で語られる近代日本文学の傑作の書き出し。漱石の文体と視点の革新性を象徴する。'},
  {genre:'文学',q:'時間は無限の海。私たちはその砂浜に立つ一粒の砂だ。',trans:'',source:'ボルヘス',meta:'ホルヘ・ルイス・ボルヘス『砂の本』1975年',context:'無限と有限の対比をボルヘスらしい詩的な比喩で表現。砂の本という無限の書物の主題と呼応する。'},
  {genre:'シェイクスピア',q:'To be, or not to be, that is the question.',trans:'生きるべきか、死ぬべきか、それが問題だ。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'デンマーク王子ハムレットが生と死の狭間で自己の存在意義を問う独白。西洋文学史上最も有名な一節であり、実存主義的な問いの原点ともなっている。'},
  {genre:'シェイクスピア',q:'There is nothing either good or bad, but thinking makes it so.',trans:'良いも悪いもない、考え方次第だ。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'ハムレットがローゼンクランツとギルデンスターンに語る言葉。人間の認識と現実の関係を鋭く突いた相対主義的な洞察で、現代の認知心理学にも通じる。'},
  {genre:'シェイクスピア',q:'Doubt thou the stars are fire, doubt that the sun doth move, but never doubt I love.',trans:'星が燃えることを疑っても、太陽の動きを疑っても、私の愛だけは疑うな。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'ハムレットがオフィーリアに宛てた手紙の一節。宇宙の真理さえ疑いの対象とするハムレットが、ただ一つ揺るぎないものとして愛を挙げる逆説的な純情。'},
  {genre:'シェイクスピア',q:'We know what we are, but know not what we may be.',trans:'今の自分は知っている。だがこれからの自分は誰も知らない。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'狂気に陥ったオフィーリアが放つ言葉。現在の自己認識と未来の可能性の間にある深淵を示し、人間の成長と変容の不確かさを鋭く表現している。'},
  {genre:'シェイクスピア',q:'What\'s done is done.',trans:'済んだことは済んだこと。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'マクベス夫人が夫の後悔を押しとどめようとする場面での言葉。過去を変えることはできないという冷酷な現実認識であり、同時に罪悪感から逃れようとする自己欺瞞の表れでもある。'},
  {genre:'シェイクスピア',q:'Stars, hide your fires; let not light see my black and deep desires.',trans:'星よ、火を隠せ。光に私の暗い欲望を見せるな。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'王位簒奪を企てるマクベスが闇夜に向かって放つ独白。野望と道徳の間で引き裂かれた人間の内面を、宇宙的なスケールで描いた詩的表現。'},
  {genre:'シェイクスピア',q:'Life\'s but a walking shadow.',trans:'人生はただの歩く影に過ぎない。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'全てを失ったマクベスが人生の虚無を独白する「明日、また明日、また明日」の一節から。人生の儚さと無意味さを極限まで圧縮した言葉。'},
  {genre:'シェイクスピア',q:'Fair is foul, and foul is fair.',trans:'美しいものは醜く、醜いものは美しい。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'冒頭で三人の魔女が唱える呪文。外見と実体の乖離、善悪の逆転というマクベス全体を貫くテーマを凝縮した一節。'},
  {genre:'シェイクスピア',q:'What\'s in a name? That which we call a rose by any other name would smell as sweet.',trans:'名前に何の意味がある？薔薇はどんな名で呼ばれても同じ香りを放つ。',source:'ロミオとジュリエット',meta:'ウィリアム・シェイクスピア『ロミオとジュリエット』',context:'ジュリエットがバルコニーで独白する場面。名前という社会的記号と本質的な存在の間の矛盾を問い、モンタギューとキャピュレットの対立の不条理さを訴える。'},
  {genre:'シェイクスピア',q:'Good night, good night! Parting is such sweet sorrow.',trans:'おやすみ、おやすみ。別れはこんなにも甘く切ない。',source:'ロミオとジュリエット',meta:'ウィリアム・シェイクスピア『ロミオとジュリエット』',context:'バルコニーシーンの終わりにジュリエットがロミオに告げる言葉。別れの悲しみの中に次の再会への甘い期待が混ざり合うという感情の複雑さを見事に表現している。'},
  {genre:'シェイクスピア',q:'These violent delights have violent ends.',trans:'激しい喜びは激しい終わりを迎える。',source:'ロミオとジュリエット',meta:'ウィリアム・シェイクスピア『ロミオとジュリエット』',context:'ロレンス神父がロミオの性急な愛に警告を発する場面。過剰な情熱は必ず破滅をもたらすという古典的な教訓で、二人の悲劇を予言する言葉でもある。'},
  {genre:'シェイクスピア',q:'The course of true love never did run smooth.',trans:'真実の愛の道は決して平坦ではない。',source:'真夏の夜の夢',meta:'ウィリアム・シェイクスピア『真夏の夜の夢』',context:'ライサンダーがハーミアに語る言葉。愛には常に障害や試練が伴うという普遍的な真理を詩的に表現し、その後の物語全体の主題を先取りしている。'},
  {genre:'シェイクスピア',q:'Though she be but little, she is fierce.',trans:'小さくとも、彼女は激しい。',source:'真夏の夜の夢',meta:'ウィリアム・シェイクスピア『真夏の夜の夢』',context:'ヘレナがハーミアの激しい気性を評した言葉。外見の小ささと内面の強さの対比が鮮やかで、現代では女性の強さを称える言葉として広く引用されている。'},
  {genre:'シェイクスピア',q:'All that glitters is not gold.',trans:'光るものすべてが金ではない。',source:'ヴェニスの商人',meta:'ウィリアム・シェイクスピア『ヴェニスの商人』',context:'モロッコ王子が金の箱を選んで失敗する場面の教訓。外見や見かけの華やかさに惑わされてはならないという警句で、英語のことわざとして今も広く使われている。'},
  {genre:'シェイクスピア',q:'The quality of mercy is not strained.',trans:'慈悲とは強いられるものではない。',source:'ヴェニスの商人',meta:'ウィリアム・シェイクスピア『ヴェニスの商人』',context:'ポーシャが法廷でシャイロックに慈悲を乞う有名な演説の冒頭。慈悲は天から自然に降り注ぐもので、強制できるものではないという人道主義的な訴え。'},
  {genre:'シェイクスピア',q:'All the world\'s a stage, and all the men and women merely players.',trans:'世界はすべて舞台、男も女もみな役者に過ぎない。',source:'お気に召すまま',meta:'ウィリアム・シェイクスピア『お気に召すまま』',context:'厭世家ジャックスが人生の七段階を語る有名な独白の冒頭。人間の一生を劇に例えることで、存在の儚さと役割演技の本質を鋭く描いている。'},
  {genre:'シェイクスピア',q:'The fool doth think he is wise, but the wise man knows himself to be a fool.',trans:'愚か者は自分を賢いと思い、賢者は自分が愚かだと知っている。',source:'お気に召すまま',meta:'ウィリアム・シェイクスピア『お気に召すまま』',context:'道化師タッチストーンが語る逆説。ソクラテスの「無知の知」に通じる洞察で、真の知恵とは自らの無知を自覚することだという普遍的な教訓。'},
  {genre:'シェイクスピア',q:'We that are true lovers run into strange capers.',trans:'真の恋人たちは奇妙な行動をとるものだ。',source:'お気に召すまま',meta:'ウィリアム・シェイクスピア『お気に召すまま』',context:'道化師タッチストーンが恋愛の不合理さを語る場面。真剣に恋をすると人は常軌を逸した行動をとるという、恋愛の滑稽さと純粋さを同時に捉えた言葉。'},
  {genre:'シェイクスピア',q:'I am not what I am.',trans:'私は私でないものだ。',source:'オセロ',meta:'ウィリアム・シェイクスピア『オセロ』',context:'イアーゴーが自らの二面性を告白する言葉。表向きの忠誠と内なる裏切りの二重性を一言で表した、シェイクスピアの悪役描写の中でも特に鋭い自己認識。'},
  {genre:'シェイクスピア',q:'Jealousy is the green-eyed monster.',trans:'嫉妬は緑色の目をした怪物だ。',source:'オセロ',meta:'ウィリアム・シェイクスピア『オセロ』',context:'イアーゴーがオセロに嫉妬心を植え付けようとする場面での言葉。嫉妬を「緑の目をした怪物」と表現したこの比喩は英語のイディオムとして定着し、今も広く使われている。'},
  {genre:'シェイクスピア',q:'How sharper than a serpent\'s tooth it is to have a thankless child.',trans:'恩知らずの子を持つことは、蛇の牙よりも鋭く刺さる。',source:'リア王',meta:'ウィリアム・シェイクスピア『リア王』',context:'娘たちに裏切られたリア王が嘆く言葉。親子の絆と裏切りの痛みを蛇の毒牙という鮮烈なイメージで表現し、老齢と孤独の苦しみを凝縮している。'},
  {genre:'シェイクスピア',q:'The worst is not, so long as we can say "This is the worst."',trans:'これが最悪だと言える間は、まだ最悪ではない。',source:'リア王',meta:'ウィリアム・シェイクスピア『リア王』',context:'エドガーが極限状態で語る逆説的な希望の言葉。絶望を言語化できる間はまだ生きている証拠であり、真の最悪とは語ることすらできない状態だという深い洞察。'},
  {genre:'シェイクスピア',q:'We are such stuff as dreams are made on.',trans:'我々は夢と同じ素材でできている。',source:'テンペスト',meta:'ウィリアム・シェイクスピア『テンペスト』',context:'魔法使いプロスペローが幻影の宴の後に語る言葉。人間の存在そのものが夢と同じ幻のようなものだという実存的な洞察で、シェイクスピアの晩年の円熟した世界観を象徴する。'},
  {genre:'シェイクスピア',q:'What\'s past is prologue.',trans:'過去はすべて序章に過ぎない。',source:'テンペスト',meta:'ウィリアム・シェイクスピア『テンペスト』',context:'アントーニオが陰謀を語る場面での言葉。過去の出来事はこれから始まる本編への序章に過ぎないという考え方は、歴史の必然性と未来への開かれた可能性を同時に示している。'},
  {genre:'シェイクスピア',q:'Some are born great, some achieve greatness, and some have greatness thrust upon them.',trans:'生まれつき偉大な者、努力で偉大になる者、偉大さを押しつけられる者がいる。',source:'十二夜',meta:'ウィリアム・シェイクスピア『十二夜』',context:'マルヴォーリオが読む偽の手紙の一節。偉大さへの道は一つではなく、生来の才能、後天的な努力、そして運命のいずれかによっても達成されうるという人間観を示している。'},
  {genre:'シェイクスピア',q:'Love is not love which alters when it alteration finds.',trans:'変化に応じて変わる愛は、愛とは言えない。',source:'ソネット116番',meta:'ウィリアム・シェイクスピア『ソネット116番』',context:'シェイクスピアのソネットの中で最も有名な一篇。真の愛は状況や時間に左右されない不変のものだという理想的な愛の定義を宣言している。'},
  {genre:'ゲーテ',q:'瞬間よ、とどまれ、お前はいかにも美しい。',trans:'原文：Verweile doch! du bist so schön.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',context:'ファウストが悪魔メフィストフェレスと交わした契約の核心となる言葉。この瞬間に満足を感じたら魂を渡すという誓い。完全な満足を拒否し続ける人間の永遠の探求を象徴する。'},
  {genre:'ゲーテ',q:'理論は灰色、されど生の黄金の樹は緑に茂る。',trans:'原文：Grau, teurer Freund, ist alle Theorie, und grün des Lebens goldner Baum.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',context:'メフィストフェレスが学生に語る言葉。抽象的な理論よりも、生きた経験こそが真の知恵をもたらすという実践主義的な洞察。ゲーテ自身の経験重視の哲学を体現している。'},
  {genre:'ゲーテ',q:'人間はあくなき努力を続ける限り、迷うものだ。',trans:'原文：Es irrt der Mensch, solang er strebt.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',context:'神がファウストについて語る言葉。迷いや過ちは努力する者の証であり、神はその誠実な探求を見守るという、人間の不完全さへの深い慈愛が込められている。'},
  {genre:'ゲーテ',q:'始めに行為ありき。',trans:'原文：Im Anfang war die Tat.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',context:'ファウストが聖書の「始めに言葉ありき」を翻訳しながら自らの哲学に辿り着く場面。思索よりも行動こそが世界の根源だというゲーテの行動主義的な世界観を示す。'},
  {genre:'ゲーテ',q:'われわれが理解しないことは制御しがたい。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『格言と反省』',context:'知識と支配の関係を端的に示した言葉。理解のないところに真の制御は生まれないというゲーテの認識論的な洞察で、科学や政治にも通じる普遍的な真理。'},
  {genre:'ゲーテ',q:'人間というものは、どんな境遇に置かれても、何かしら不満の種を見つけ出すものだ。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『若きウェルテルの悩み』1774年',context:'人間の不満足な本性を鋭く観察した言葉。どんな恵まれた状況でも人は不満を見出すという人間心理の普遍的な真実を、若き日のゲーテが鋭く捉えている。'},
  {genre:'ゲーテ',q:'われわれの本性は怠惰へ傾いている。だが、われわれは活動へと心をはげます限り、その活動に真の悦びを感ずる。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『若きウェルテルの悩み』1774年',context:'人間の怠惰な本性と行動の喜びの矛盾を鋭く捉えた言葉。努力することへの抵抗感を認めつつも、実際に動き出したときに生まれる充実感の真実を語っている。'},
  {genre:'ゲーテ',q:'焦ることは何の役にも立たない。後悔はなおさら役に立たない。焦りは過ちを増し、後悔は新しい後悔をつくる。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『格言と反省』',context:'焦りと後悔という人間の二大の心理的罠を同時に批判した言葉。どちらも現在の問題を悪化させるだけだという冷静な分析は、現代のマインドフルネスの思想にも通じる。'},
  {genre:'ゲーテ',q:'花を与えるのは自然、編んで花輪にするのは芸術。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『格言と反省』',context:'自然と芸術の関係を端的に示した言葉。素材を提供するのは自然だが、それを意味ある形に変えるのが人間の創造的な行為だというゲーテの芸術観。'},
  {genre:'ゲーテ',q:'まだ日が暮れない、働けよ、あくことなく。そのうちに誰も働くことのできない死が来る。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『西東詩集』1819年',context:'死という不可避の終わりを前にして、今この瞬間に全力で働くことの重要性を説いた言葉。時間の有限性を意識した上での行動の促しで、晩年のゲーテの人生観を凝縮している。'},
  {genre:'ゲーテ',q:'自分自身を信じてみるだけでいい。きっと、生きる道が見えてくる。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'自己不信に悩む人への力強い励ましの言葉。複雑な哲学理論ではなく、ただ自分を信じるという単純な行為から道が開けるというゲーテの実践的な人生哲学。'},
  {genre:'ゲーテ',q:'王様であろうと百姓であろうと、己の家庭で平和を見出す者が一番幸福な人間である。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'社会的地位や富とは無関係に、家庭における平和と安らぎこそが真の幸福の源であるというゲーテの幸福論。外的な成功よりも内的な充足を重視する価値観を示している。'},
  {genre:'ゲーテ',q:'人間の最大の罪は不機嫌である。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'不機嫌を道徳的な問題として捉えた鋭い言葉。自分の感情を周囲に押し付ける不機嫌さは、他者への最大の無礼であるというゲーテの社交的・倫理的な洞察。'},
  {genre:'ゲーテ',q:'涙とともにパンを食べた者でなければ、人生の本当の味はわからない。',trans:'原文：Wer nie sein Brot mit Tränen aß...',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ヴィルヘルム・マイスターの修業時代』1795年',context:'苦難と悲しみを経験した者だけが人生の深みを知ることができるという言葉。涙とパンという日常的なイメージを通じて、苦労の経験が人間を成熟させるという真理を表現。'},
  {genre:'ゲーテ',q:'知ることだけでは十分ではない、それを使わなければならない。望むだけでは十分ではない、それを行わなければならない。',trans:'原文：Knowing is not enough; we must apply. Willing is not enough; we must do.',source:'ゲーテ',meta:'ゲーテ 語録',context:'知識と実践、意志と行動の間にある決定的な差を指摘した言葉。どんな優れた知識も、どんな強い意志も、実際に行動しなければ無意味だというゲーテの行動主義哲学。'},
  {genre:'ゲーテ',q:'人を信頼する者は、裏切られることよりも多くのものを得る。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'信頼することのリスクよりも得られるものの方が大きいというゲーテの人間観。裏切りへの恐怖から信頼を避けることは、より大きな人生の豊かさを失うことだという洞察。'},
  {genre:'ゲーテ',q:'大胆であれ、そして大胆であれ、常に大胆であれ。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'三度繰り返すことで大胆さの重要性を強調した言葉。一時的な勇気ではなく、常に大胆であり続けることが成功の鍵だというゲーテの行動哲学。'},
  {genre:'ゲーテ',q:'若いときは興味が散漫なために忘れっぽく、年をとると、興味の欠乏のために忘れっぽくなる。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'若さと老いのそれぞれの忘れっぽさの原因を鋭く分析した言葉。過剰な刺激と関心の枯渇という人生の両極端を捉えた、ゲーテならではの鋭い人間観察。'},
  {genre:'ゲーテ',q:'喜びには悩みが、悩みには喜びがなくてはならない。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',context:'人生における喜びと悲しみの不可分な関係を示した言葉。どちらか一方だけでは人生は成立せず、両者が交互に訪れることで人間の経験が豊かになるというゲーテの弁証法的な人生観。'},
  {genre:'孔子',q:'学びて思わざれば則ち罔し、思いて学ばざれば則ち殆し。',trans:'学んでも考えなければ無駄、考えても学ばなければ危険だ。',source:'孔子',meta:'『論語』為政篇',context:'学習と思考の相互補完的な関係を説いた言葉。知識の吸収だけでも、思索だけでも不十分であり、両者が結びついて初めて真の学問が成立するという儒教教育の核心。'},
  {genre:'孔子',q:'知るを知るとなし、知らざるを知らずとなす。これ知るなり。',trans:'知っていることは知っている、知らないことは知らない。これが真の知だ。',source:'孔子',meta:'『論語』為政篇',context:'知的誠実さの重要性を説いた言葉。自分の無知を認める謙虚さこそが真の知恵の始まりであるというソクラテスの「無知の知」にも通じる普遍的な認識論。'},
  {genre:'孔子',q:'学びて時にこれを習う、また説ばしからずや。',trans:'学んだことを折に触れて繰り返す、なんと喜ばしいことか。',source:'孔子',meta:'『論語』学而篇',context:'論語の冒頭を飾る言葉。学びを反復することの喜びを説いており、知識の習得だけでなく反復と実践による深化が真の学問であることを示している。'},
  {genre:'孔子',q:'止まりさえしなければ、どんなにゆっくりでも進めばよい。',trans:'',source:'孔子',meta:'『論語』',context:'歩みの速さよりも継続することの重要性を説いた言葉。完璧さや速さへのプレッシャーを手放し、着実に前進し続けることの価値を示す孔子の実践的な教え。'},
  {genre:'孔子',q:'三人行けば必ず我が師あり。',trans:'三人で行けば、必ず自分の師となる人がいる。',source:'孔子',meta:'『論語』述而篇',context:'どんな人間からも学べるという謙虚さと学習への開放的な姿勢を説いた言葉。優れた人からは長所を、そうでない人からは反面教師として学ぶことができるという孔子の学習哲学。'},
  {genre:'孔子',q:'過ちて改めざる、これを過ちという。',trans:'過ちを犯して改めないこと、これが本当の過ちだ。',source:'孔子',meta:'『論語』衛霊公篇',context:'過ちそのものよりも、過ちを認めて改めないことの方が真の問題だという言葉。失敗を恐れることなく、失敗から学んで修正する勇気を持つことの重要性を説いている。'},
  {genre:'孔子',q:'己の欲せざるところを人に施すなかれ。',trans:'自分がされたくないことを、他人にしてはならない。',source:'孔子',meta:'『論語』顔淵篇',context:'儒教の黄金律とも言える言葉。自己中心的な欲求を基準にするのではなく、相手の立場に立って行動することを求める普遍的な道徳原則。キリスト教の黄金律とも共鳴する。'},
  {genre:'孔子',q:'君子は和して同ぜず、小人は同じて和せず。',trans:'君子は他者と調和するが流されない。小人は同調するが調和しない。',source:'孔子',meta:'『論語』子路篇',context:'真の協調と単なる同調の違いを示した言葉。表面的に合わせるのではなく、自分の軸を保ちながら他者と深いレベルで調和することが君子（真の人格者）の在り方だという教え。'},
  {genre:'孔子',q:'君子は人の美を成す、人の悪を成さず。',trans:'君子は人の良いところを伸ばし、悪いところは戒める。小人はその逆をする。',source:'孔子',meta:'『論語』顔淵篇',context:'人格者の他者への向き合い方を示した言葉。他者の長所を見出して伸ばし、短所は慈愛をもって諫めるという姿勢が、真のリーダーシップと人間関係の基本だという儒教の教え。'},
  {genre:'孔子',q:'徳は孤ならず、必ず隣あり。',trans:'徳のある人は孤立しない。必ず理解者が現れる。',source:'孔子',meta:'『論語』里仁篇',context:'徳を積む者は必ず仲間や支持者に恵まれるという言葉。正しい道を歩む孤独を恐れなくていい、なぜなら徳は必ず共鳴する人を引き寄せるという孔子の励ましの言葉。'},
  {genre:'孔子',q:'吾日に三たび吾が身を省みる。',trans:'私は毎日三度、自分の行いを振り返る。',source:'孔子',meta:'『論語』学而篇',context:'孔子の弟子・曾子の言葉。日々の自己反省を習慣にすることで、道徳的な成長を継続的に実現するという儒教の修養の実践。現代の自己啓発にも通じる内省の重要性。'},
  {genre:'孔子',q:'義を見てせざるは勇なきなり。',trans:'正義と知りながら行動しないのは、勇気がないからだ。',source:'孔子',meta:'『論語』為政篇',context:'正義を知ることと実行することの間にある勇気の重要性を説いた言葉。知識や認識だけでは不十分であり、正しいと分かったことを実行する勇気こそが真の徳だというメッセージ。'},
  {genre:'孔子',q:'朝に道を聞かば、夕べに死すとも可なり。',trans:'朝に真理を知ることができれば、夕方に死んでも悔いはない。',source:'孔子',meta:'『論語』里仁篇',context:'真理の探求に人生を捧げることの価値を示した言葉。命よりも真理の方が価値があるという知的・精神的な姿勢を極限まで表現した、孔子の学問への情熱の凝縮。'},
  {genre:'孔子',q:'歳寒くして、然る後に松柏の彫むに後るるを知る。',trans:'寒い季節になって初めて、松や柏が最後まで枯れないとわかる。逆境になって初めて人の真価がわかる。',source:'孔子',meta:'『論語』子罕篇',context:'逆境の中でこそ人の真価が明らかになるという言葉。松や柏が厳冬においても緑を保つように、真の人格者は困難な時期においても本来の姿を失わないという教え。'},
  {genre:'孔子',q:'賢を見ては斉しからんことを思い、不賢を見ては内に自ら省みる。',trans:'優れた人を見たら同じようになろうと思い、劣った人を見たら自分を省みよ。',source:'孔子',meta:'『論語』里仁篇',context:'他者を自己成長の鏡として使う方法を説いた言葉。優れた人からは憧れと目標を、そうでない人からは自己反省の機会を得るという、あらゆる出会いを学びに変える孔子の知恵。'},
  {genre:'孔子',q:'吾十有五にして学に志す。三十にして立つ。四十にして惑わず。',trans:'十五歳で学問を志し、三十で自立し、四十で迷わなくなった。（五十で天命を知り、六十で素直に聞け、七十で思うままに行動しても道を外れなくなった）',source:'孔子',meta:'『論語』為政篇',context:'孔子自身の人生の歩みを年代別に振り返った言葉。学問から始まり、自立、迷いの消滅、天命の認識へと至る精神的成熟の過程を示しており、人生のロードマップとして後世に大きな影響を与えた。'},
  {genre:'孔子',q:'疏食を飯い水を飲み、肱を曲げてこれを枕とす。楽しみ亦た其の中に在り。',trans:'粗末な食事をして水を飲み、腕を曲げて枕にする。その中にも楽しみはある。',source:'孔子',meta:'『論語』述而篇',context:'物質的な豊かさとは無関係に精神的な充足を見出すことができるという言葉。貧しい生活の中にも真の喜びがあるというシンプルな生き方の肯定は、老子の思想にも通じる。'},
  {genre:'孔子',q:'過ぎたるは猶お及ばざるがごとし。',trans:'やり過ぎることは、足りないことと同じくらいよくない。',source:'孔子',meta:'『論語』先進篇',context:'中庸の重要性を説いた言葉。過剰と不足はどちらも理想的な状態ではなく、適切なバランスこそが最善だという儒教の中庸の思想を端的に表現している。'},
  {genre:'孔子',q:'知者は惑わず、仁者は憂えず、勇者は懼れず。',trans:'知恵ある者は迷わず、思いやりある者は憂えず、勇気ある者は恐れない。',source:'孔子',meta:'『論語』子罕篇',context:'儒教の三つの徳（知・仁・勇）それぞれが心の状態に与える影響を示した言葉。真の知恵、慈悲、勇気を持つ者はそれぞれの精神的な解放を得るという孔子の徳論の集約。'},
  {genre:'孔子',q:'名を正さざれば則ち言順わず。',trans:'名が正しくなければ言葉は通じず、言葉が通じなければ何事も成し遂げられない。',source:'孔子',meta:'『論語』子路篇',context:'正名（名分を正すこと）の重要性を説いた言葉。物事に正確な名前をつけることが言語・社会・政治の秩序の基盤であるという孔子の言語哲学と社会思想の核心。'},
];


const GENRE_COLORS={'映画':'#7F77DD','哲学':'#1D9E75','現代短歌':'#C2506A','ヒップホップ':'#BA7517','文学':'#3B8BD4','現代アート':'#2D9B9B','シェイクスピア':'#7B5EA7','ゲーテ':'#B85C38','孔子':'#A0522D'};
const STORAGE_KEY='kotoba-card-v3';

let used=[],favs=[],showFavs=false,isFlipped=false,activeGenre='all';
let history=[],hIndex=-1,suppressClick=false;

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({favs,activeGenre}));}catch(e){}}
function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const d=JSON.parse(r);favs=d.favs||[];activeGenre=d.activeGenre||'all';}}catch(e){}}

function filteredCards(){return activeGenre==='all'?CARDS:CARDS.filter(c=>c.genre===activeGenre);}
function pickNew(){
  let pool=filteredCards().filter(c=>!used.includes(c));
  if(pool.length===0){used=[];const cur=history[hIndex];if(cur)used.push(cur);pool=filteredCards().filter(c=>!used.includes(c));}
  if(pool.length===0)return null;
  const card=pool[Math.floor(Math.random()*pool.length)];
  used.push(card);
  return card;
}
function current(){return history[hIndex]||null;}

function renderCard(card){
  isFlipped=false;
  document.getElementById('flipper').classList.remove('flipped');
  if(!card){document.getElementById('f-quote').textContent='カードがありません';return;}
  const col=GENRE_COLORS[card.genre]||'var(--text-tertiary)';
  document.getElementById('f-genre').textContent=card.genre;
  document.getElementById('f-genre').style.color=col;
  document.getElementById('f-quote').textContent=card.q;
  document.getElementById('b-genre').textContent=card.genre;
  document.getElementById('b-genre').style.color=col;
  document.getElementById('b-title').textContent=card.source;
  document.getElementById('b-meta').textContent=card.meta;
  const tb=document.getElementById('trans-block');
  if(card.trans&&card.trans.trim()){tb.style.display='block';document.getElementById('b-trans').textContent=card.trans;}
  else{tb.style.display='none';}
  document.getElementById('b-context').textContent=card.context;
  updateFavBtn();updateCounter();updateNav();
}

function flipCard(){
  if(suppressClick){suppressClick=false;return;}
  isFlipped=!isFlipped;
  document.getElementById('flipper').classList.toggle('flipped',isFlipped);
}

function nextCard(){
  if(hIndex<history.length-1){hIndex++;animateSlide(1);}
  else{const c=pickNew();if(!c)return;history.push(c);hIndex=history.length-1;animateSlide(1);}
}
function prevCard(){if(hIndex>0){hIndex--;animateSlide(-1);}}

function animateSlide(dir){
  const slider=document.getElementById('slider');
  slider.classList.add('slide-anim');
  slider.style.transform='translateX('+(dir*45)+'px)';
  slider.style.opacity='0';
  setTimeout(function(){
    slider.classList.remove('slide-anim');
    slider.style.transform='translateX('+(-dir*45)+'px)';
    renderCard(current());
    void slider.offsetWidth;
    slider.classList.add('slide-anim');
    slider.style.transform='translateX(0)';
    slider.style.opacity='1';
  },150);
}

function updateNav(){document.getElementById('prev-btn').disabled=(hIndex<=0);}

function isFaved(card){return card&&favs.some(function(f){return f.q===card.q;});}
function toggleFav(){
  const c=current();if(!c)return;
  if(isFaved(c)){favs=favs.filter(function(f){return f.q!==c.q;});}else{favs.unshift(Object.assign({},c));}
  updateFavBtn();renderFavList();save();
}
function updateFavBtn(){
  const btn=document.getElementById('fav-btn'),on=isFaved(current());
  btn.classList.toggle('fav-on',on);
  btn.textContent=on?'解除':'お気に入り';
}
function updateCounter(){
  document.getElementById('counter').textContent=filteredCards().length+'枚';
  document.getElementById('fav-count').textContent=favs.length;
}
function toggleFavList(){showFavs=!showFavs;document.getElementById('favs-section').classList.toggle('open',showFavs);renderFavList();}
function renderFavList(){
  document.getElementById('fav-count').textContent=favs.length;
  const el=document.getElementById('fav-list');
  if(favs.length===0){el.innerHTML='<div class="empty-fav">まだお気に入りがありません</div>';return;}
  el.innerHTML=favs.map(function(f,i){return '<div class="fav-item" onclick="jumpTo('+i+')"><div class="fav-q">'+f.q+'</div><div class="fav-src">'+f.genre+' — '+f.source+'</div></div>';}).join('');
}
function jumpTo(i){
  history.push(favs[i]);hIndex=history.length-1;
  renderCard(current());
  showFavs=false;document.getElementById('favs-section').classList.remove('open');
}
function clearFavs(){favs=[];renderFavList();updateFavBtn();save();}

function buildGenreBar(){
  const genres=['all'].concat([...new Set(CARDS.map(function(c){return c.genre;}))]);
  document.getElementById('genre-bar').innerHTML=genres.map(function(g){return '<button class="gbtn'+(g===activeGenre?' on':'')+'" data-g="'+g+'" onclick="setGenre(\''+g+'\')">'+(g==='all'?'すべて':g)+'</button>';}).join('');
}
function setGenre(g){
  activeGenre=g;
  document.querySelectorAll('.gbtn').forEach(function(b){b.classList.toggle('on',b.dataset.g===g);});
  used=[];history=[];hIndex=-1;
  const c=pickNew();if(c){history.push(c);hIndex=0;}
  renderCard(current());
  save();
}

function initSwipe(){
  const scene=document.getElementById('scene');
  const slider=document.getElementById('slider');
  let sx=0,sy=0,dx=0,dy=0,active=false,isSwipe=false;
  const SWIPE_DIST=55;

  function resetPos(){slider.classList.add('slide-anim');slider.style.transform='translateX(0)';slider.style.opacity='1';}
  function start(x,y){sx=x;sy=y;dx=0;dy=0;active=true;isSwipe=false;slider.classList.remove('slide-anim');}
  function move(x,y){
    if(!active)return;
    dx=x-sx;dy=y-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      isSwipe=true;
      slider.style.transform='translateX('+dx+'px)';
      slider.style.opacity=Math.max(0.4,1-Math.abs(dx)/300);
    }
  }
  function end(){
    if(!active)return;
    active=false;
    if(isSwipe&&Math.abs(dx)>SWIPE_DIST){
      suppressClick=true;setTimeout(function(){suppressClick=false;},400);
      if(dx>0){nextCard();}else{if(hIndex>0){prevCard();}else{resetPos();}}
    }else if(isSwipe){
      suppressClick=true;setTimeout(function(){suppressClick=false;},400);
      resetPos();
    }else{resetPos();}
  }

  scene.addEventListener('click',function(){flipCard();});
  scene.addEventListener('touchstart',function(e){start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  scene.addEventListener('touchmove',function(e){move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  scene.addEventListener('touchend',end,{passive:true});

  let mdown=false;
  scene.addEventListener('mousedown',function(e){mdown=true;start(e.clientX,e.clientY);});
  window.addEventListener('mousemove',function(e){if(mdown)move(e.clientX,e.clientY);});
  window.addEventListener('mouseup',function(){if(mdown){mdown=false;end();}});
}

function shareCard(){
  const card=current();
  if(!card)return;
  const col=GENRE_COLORS[card.genre]||'#908f88';
  const W=640,H=400,DPR=2;
  const canvas=document.createElement('canvas');
  canvas.width=W*DPR;canvas.height=H*DPR;
  const ctx=canvas.getContext('2d');
  ctx.scale(DPR,DPR);

  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  ctx.fillStyle=isDark?'#1f1e1c':'#ffffff';
  ctx.beginPath();
  ctx.roundRect(0,0,W,H,16);
  ctx.fill();

  // ジャンルバッジ
  ctx.font='500 11px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle=col;
  ctx.textAlign='center';
  ctx.fillText(card.genre.toUpperCase(),W/2,56);

  // 引用テキスト（折り返し）
  const fontSize=card.q.length>40?18:22;
  ctx.font=fontSize+'px Georgia,serif';
  ctx.fillStyle=isDark?'#f0efe9':'#1a1a18';
  const maxW=W-120;
  const lineH=fontSize*1.75;
  const chars=card.q.split('');
  const lines=[];
  let line='';
  for(let i=0;i<chars.length;i++){
    const test=line+chars[i];
    if(ctx.measureText(test).width>maxW&&line!==''){lines.push(line);line=chars[i];}
    else{line=test;}
  }
  if(line)lines.push(line);
  const totalH=lines.length*lineH;
  const startY=(H-totalH)/2;
  lines.forEach(function(l,i){ctx.fillText(l,W/2,startY+i*lineH+fontSize*0.8);});

  // 出典
  ctx.font='12px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle=isDark?'#888780':'#908f88';
  ctx.fillText('— '+card.source,W/2,H-44);

  // ブランド
  ctx.font='10px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle=isDark?'#555450':'#c0beb8';
  ctx.fillText('言葉のカード / kotoba-card-six.vercel.app',W/2,H-22);

  canvas.toBlob(function(blob){
    const shareText=card.q+'\n— '+card.source+'\n\nhttps://kotoba-card-six.vercel.app';
    const file=new File([blob],'kotoba-card.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({title:'言葉のカード',text:shareText,files:[file]}).catch(function(){});
    }else if(navigator.share){
      navigator.share({title:'言葉のカード',text:shareText}).catch(function(){});
    }else{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='kotoba-card.png';
      a.click();
    }
  },'image/png');
}

function init(){
  load();
  buildGenreBar();
  const c=pickNew();if(c){history.push(c);hIndex=0;}
  renderCard(current());
  renderFavList();
  initSwipe();
}
init();
</script>
