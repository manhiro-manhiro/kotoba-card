<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOTOBA</title>
<style>
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f4ef;--bg-tertiary:#eceae2;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-tertiary:#908f88;
  --border-tertiary:rgba(0,0,0,0.12);--border-secondary:rgba(0,0,0,0.22);--border-primary:rgba(0,0,0,0.35);
  --radius-md:8px;--radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
  --font-serif:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1f1e1c;--bg-secondary:#2a2926;--bg-tertiary:#151412;
    --text-primary:#f0efe9;--text-secondary:#b4b2a9;--text-tertiary:#888780;
    --border-tertiary:rgba(255,255,255,0.12);--border-secondary:rgba(255,255,255,0.22);--border-primary:rgba(255,255,255,0.35);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-tertiary);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.app{width:100%;max-width:640px}
.app-title{font-size:18px;font-weight:500;margin-bottom:1.25rem;text-align:center}
.genre-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;justify-content:center}
.gbtn{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans)}
.gbtn:hover{background:var(--bg-secondary)}
.gbtn.on{background:var(--bg-secondary);color:var(--text-primary);border-color:var(--border-primary)}
.scene{width:100%;min-height:340px;margin-bottom:0.5rem;touch-action:pan-y;-webkit-tap-highlight-color:transparent;cursor:pointer}
.slider{width:100%;min-height:340px;position:relative}
.slider.slide-anim{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease}
.flipper{width:100%;min-height:340px;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.45,0.05,0.2,1)}
.flipper.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius-lg);border:0.5px solid var(--border-tertiary);background:var(--bg-primary);display:flex;flex-direction:column;padding:2rem 2.5rem}
.front{align-items:center;justify-content:center}
.back{transform:rotateY(180deg);align-items:stretch;justify-content:flex-start;overflow-y:auto}
.genre-badge{font-size:10px;letter-spacing:0.08em;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:1rem}
.quote{font-size:1.2rem;line-height:1.75;text-align:center;color:var(--text-primary);font-family:var(--font-serif)}
.flip-hint{font-size:11px;color:var(--text-tertiary);margin-top:1.25rem}
.b-genre{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.source-title{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:4px}
.source-meta{font-size:12px;color:var(--text-secondary);line-height:1.6}
.trans-block,.context-block{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border-tertiary)}
.trans-label,.context-label{font-size:10px;letter-spacing:0.06em;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:5px}
.trans-text{font-size:14px;color:var(--text-primary);line-height:1.7;font-family:var(--font-serif)}
.context-text{font-size:12px;color:var(--text-secondary);line-height:1.7}
.swipe-hint{text-align:center;font-size:10px;color:var(--text-tertiary);margin-bottom:1rem}
.actions{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:0.25rem;flex-wrap:wrap}
.act-left{display:flex;gap:8px;flex-wrap:wrap}
.ibtn{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:5px}
.ibtn:hover{background:var(--bg-secondary)}
.ibtn:disabled{opacity:0.4;cursor:default}
.ibtn.fav-on{color:#D85A30;border-color:#D85A30}
.counter{font-size:11px;color:var(--text-tertiary)}
.favs-section{margin-top:1.5rem;border-top:0.5px solid var(--border-tertiary);padding-top:1.25rem;display:none}
.favs-section.open{display:block}
.favs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.favs-title{font-size:12px;font-weight:500;color:var(--text-secondary)}
.fav-item{padding:10px 0;border-bottom:0.5px solid var(--border-tertiary);cursor:pointer}
.fav-item:last-child{border-bottom:none}
.fav-q{font-size:13px;color:var(--text-primary);line-height:1.5;font-family:var(--font-serif)}
.fav-src{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.empty-fav{font-size:12px;color:var(--text-tertiary);padding:8px 0}
</style>
</head>
<body>
<div class="app">
  <div class="app-title">KOTOBA</div>
  <div class="genre-bar" id="genre-bar"></div>

  <div class="scene" id="scene">
    <div class="slider" id="slider">
      <div class="flipper" id="flipper">
        <div class="face front">
          <div class="genre-badge" id="f-genre"></div>
          <div class="quote" id="f-quote"></div>
          <div class="flip-hint">タップで出典 / 左右スワイプで送る</div>
        </div>
        <div class="face back">
          <div class="b-genre" id="b-genre"></div>
          <div class="source-title" id="b-title"></div>
          <div class="source-meta" id="b-meta"></div>
          <div class="trans-block" id="trans-block" style="display:none">
            <div class="trans-label">邦訳</div>
            <div class="trans-text" id="b-trans"></div>
          </div>
          <div class="trans-block" id="eng-block" style="display:none">
            <div class="trans-label">English</div>
            <div class="trans-text" id="b-eng"></div>
          </div>
          <div class="context-block">
            <div class="context-label">背景</div>
            <div class="context-text" id="b-context"></div>
          </div>
          <div style="margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border-tertiary)">
            <a id="amazon-link" href="" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-tertiary);text-decoration:none;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border-tertiary)">
              <span>🛒</span><span>Amazonで探す</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="swipe-hint">&larr; 前へ　　次へ &rarr;</div>

  <div class="actions">
    <div class="act-left">
      <button class="ibtn" id="prev-btn" onclick="prevCard()">&larr; 前へ</button>
      <button class="ibtn" onclick="nextCard()">次へ &rarr;</button>
      <button class="ibtn" id="fav-btn" onclick="toggleFav()">お気に入り</button>
      <button class="ibtn" onclick="shareCard('front')">表をシェア</button>
      <button class="ibtn" onclick="shareCard('both')">表裏シェア</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="counter" id="counter"></span>
      <button class="ibtn" onclick="toggleFavList()">一覧 <span id="fav-count">0</span></button>
    </div>
  </div>

  <div class="favs-section" id="favs-section">
    <div class="favs-head">
      <span class="favs-title">お気に入り</span>
      <button class="ibtn" style="font-size:11px;padding:3px 10px" onclick="clearFavs()">すべて削除</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
const CARDS=[
  {genre:'映画',q:'You talking to me?',trans:'おれに話しかけてるのか？',source:'タクシードライバー',meta:'Martin Scorsese, 1976 / トラヴィス・ビックル（Robert De Niro）',context:'トラヴィス・ビックルが鏡に向かって独り言を言うシーン。即興で生まれたとされ、アメリカ映画史上最も引用された台詞の一つ。'},
  {genre:'映画',q:'Get busy living, or get busy dying.',trans:'必死に生きるか、必死に死ぬかだ。',source:'ショーシャンクの空に',meta:'Frank Darabont, 1994 / アンディ・デュフレーン（Tim Robbins）',context:'アンディがレッドに送った手紙の一節。生きることへの意志を端的に言い表した言葉。'},
  {genre:'映画',q:'I\'m gonna make him an offer he can\'t refuse.',trans:'断れない条件を出してやる。',source:'ゴッドファーザー',meta:'Francis Ford Coppola, 1972 / ドン・コルレオーネ（Marlon Brando）',context:'ドン・コルレオーネが静かに、しかし絶対的な力を帯びて語る一言。恐怖と礼節が同居している。'},
  {genre:'映画',q:'We accept the love we think we deserve.',trans:'人は自分が値すると思う愛しか受け入れない。',source:'ウォールフラワー',meta:'Stephen Chbosky, 2012 / アンダーソン先生（Paul Rudd）',context:'チャーリーに向けてアンダーソン先生が言う一言。自己価値と愛の関係を鋭くとらえている。'},
  {genre:'映画',q:'Life is like a box of chocolates. You never know what you\'re gonna get.',trans:'人生はチョコレートの箱。開けてみるまで中身はわからない。',source:'フォレスト・ガンプ',meta:'Robert Zemeckis, 1994 / フォレスト・ガンプ（Tom Hanks）',context:'母から受け継いだ言葉をフォレストが語るシーン。人生の予測不可能性と受容を語る。'},
  {genre:'映画',q:'To infinity and beyond.',trans:'無限の彼方へ、さあ行くぞ。',source:'トイ・ストーリー',meta:'John Lasseter, 1995 / バズ・ライトイヤー（Tim Allen）',context:'バズ・ライトイヤーの口癖。限界を超えようとする意志と夢想の無限性を子供の言葉で表現している。'},
  {genre:'映画',q:'You can\'t handle the truth.',trans:'お前に真実は受け止められん。',source:'ア・フュー・グッドメン',meta:'Rob Reiner, 1992 / ジェサップ大佐（Jack Nicholson）',context:'真実を問い詰められたジェサップ大佐が法廷で放つ一言。権力と真実の衝突を象徴する。'},
  {genre:'映画',q:'The more you know who you are, and what you want, the less you let things upset you.',trans:'自分が何者で、何を求めているかが分かれば分かるほど、周りのことに動揺しなくなる。',source:'ロスト・イン・トランスレーション',meta:'Sofia Coppola, 2003 / ボブ・ハリス（Bill Murray）',context:'異国東京の高級ホテルで眠れぬ夜を過ごす中年の映画スターが、将来やアイデンティティに不安を抱える若い女性に語りかけるシーン。自己認識の成熟がもたらす精神的平穏を説く。'},
  {genre:'映画',q:'If there\'s any kind of magic in this world it must be in the attempt of understanding someone sharing something.',trans:'もしこの世に魔法のようなものがあるとしたら、それは誰かを理解しようとし、何かを分かち合おうとする試みの中にあるはず。',source:'ビフォア・サンライズ',meta:'Richard Linklater, 1995 / セリーヌ（Julie Delpy）',context:'ウィーンの街を夜通し歩きながら、出会ったばかりの二人が互いの人生観を語り合うシーン。他者へ手を伸ばす行為自体に超越的な価値を見出すヒューマニズムの極致。'},
  {genre:'映画',q:'Voilà, ma petite Amélie, vous n\'avez pas des os en verre.',trans:'アメリ、君の骨はガラスじゃない。人生のぶつかり合いにも耐えられる。',source:'アメリ',meta:'Jean-Pierre Jeunet, 2001 / レイモン・デュファイエル（Serge Merlin）',context:'骨が極端にもろい難病を抱え20年間家から出ずに生きる隣人が、恋に臆病になっているアメリの背中を押すシーン。自らの肉体的制約とアメリの心理的制約を対比させ、人生の痛みを恐れずに他者と関わることの尊さを説いている。'},
  {genre:'映画',q:'Without love, what reason is there for anything?',trans:'愛がなければ、何のために存在するっていうんだ？',source:'パターソン',meta:'Jim Jarmusch, 2016 / エヴェレット（William Jackson Harper）',context:'失恋に打ちひしがれたバーの常連客が感情を爆発させる直前に放つセリフ。平穏な日常の反復美を描く本作において、人間のあらゆる営みの根源的動機が「愛」であることを切実に突きつける。'},
  {genre:'映画',q:'Life passes most people by while they\'re still making grand plans for it.',trans:'ほとんどの人間は、人生の壮大な計画を立てている間に、人生そのものを通り過ぎさせてしまう。',source:'ブロウ',meta:'Ted Demme, 2001 / ジョージ・ユング（Johnny Depp）',context:'伝説的なドラッグ・ディーラーの波乱万丈な半生を振り返る述懐。未来への準備にばかり気を取られ、目の前にある「現在」を生きることを忘れてしまう人間の普遍的な愚かさと時間の不可逆性への哀愁。'},
  {genre:'映画',q:'I can\'t relate to 99% of humanity.',trans:'人類の99パーセントには共感できない。',source:'ゴーストワールド',meta:'Terry Zwigoff, 2001 / シーモア（Steve Buscemi）',context:'社会に馴染めないブルース・レコードの収集家である中年男が、極端な孤立感と他者への疎外感を吐露するセリフ。大量消費社会や画一化されたポップカルチャーへの静かな抵抗。'},
  {genre:'映画',q:'The only true currency in this bankrupt world is what you share with someone else when you\'re uncool.',trans:'この破産した世界における唯一の真の通貨とは、君が「クールじゃない」時に、他の誰かと分かち合うもののことだ。',source:'あの頃ペニー・レインと',meta:'Cameron Crowe, 2000 / レスター・バングス（Philip Seymour Hoffman）',context:'ロック業界の幻想と欺瞞に直面し傷ついた15歳の少年ジャーナリストに対し、伝説のロック評論家が電話越しに語りかけるシーン。真の芸術や友情は自らが「クールではない」という脆弱性を共有することから生まれると説く。'},
  {genre:'映画',q:'Finance is a gun. Politics is knowing when to pull the trigger.',trans:'財力は銃だ。政治とは、いつその引き金を引くかを知ることである。',source:'ゴッドファーザー PART III',meta:'Francis Ford Coppola, 1990 / ドン・リシオ・ルケージ（Enzo Robutti）',context:'バチカンや政財界の黒幕が絡む巨大な陰謀の中で、イタリア政界のフィクサーが冷酷に語るセリフ。資本というポテンシャルエネルギーを政治的タイミングで運用することこそが現代の真の支配力であるという冷徹な事実を突いている。'},
  {genre:'映画',q:'Sometimes people deserve to have their faith rewarded.',trans:'時には人々の信念が報われることも必要だ。',source:'ダークナイト',meta:'Christopher Nolan, 2008 / バットマン（Christian Bale）',context:'ゴッサム・シティの希望の星であったハービー・デントが堕落した真実を隠蔽し、自らが全ての罪を被る決断を下す際に語るセリフ。真実よりも「高貴な嘘」が社会を支えるという権力と自己犠牲の政治哲学。'},
  {genre:'映画',q:'Names is for tombstones, baby.',trans:'名前なんてのは墓石のためにあるんだよ、ベイビー。',source:'007／死ぬのは奴らだ',meta:'Guy Hamilton, 1973 / Mr.ビッグ（Yaphet Kotto）',context:'ジェームズ・ボンドが「ボンド、ジェームズ・ボンドだ」という有名な自己紹介を試みた瞬間、麻薬王がそれを冷酷に遮って放つセリフ。スパイ映画のアイコンたる主人公の自己顕示を完全に無化するストリートのリアリズム。'},
  {genre:'映画',q:'Well, as a historian, I must remind you that the world hasn\'t had much trouble from Carthage in the past two thousand years.',trans:'歴史家として指摘しておかなければならないが、過去2000年間、世界はカルタゴから何の面倒もかけられていない。',source:'ストレンジャー',meta:'Orson Welles, 1946 / チャールズ・ランキン（Orson Welles）',context:'アメリカの田舎町で教授として身分を偽るナチスの逃亡戦犯が、ディナーの席で放つセリフ。洗練された知的なウィットの表面下に、人命を軽視し大量虐殺を正当化しようとするファシストの異常な倫理観が垣間見える。'},
  {genre:'映画',q:'All right, fellas, let\'s go and say a prayer for a boy who couldn\'t run as fast as I could.',trans:'よしお前たち、私ほど速く走れなかった一人の少年のために、祈りを捧げに行こう。',source:'汚れた顔の天使',meta:'Michael Curtiz, 1938 / ジェリー・コノリー神父（Pat O\'Brien）',context:'幼少期の万引きで逃げ足が遅かったために犯罪者の道を歩んだロッキーが死刑執行された後、神父が不良少年たちに向けて語る言葉。人間の運命が幼少期の些細な偶然によって決定づけられてしまうことへの哀しさと深い慈愛。'},
  {genre:'映画',q:'Maybe that\'s what hell is, the entire rest of eternity spent in fuckin\' Bruges.',trans:'たぶん、地獄ってのはこういうことなんだ。永遠の残りの時間を、このクソ忌々しいブルージュで過ごすことなんだよ。',source:'ヒットマンズ・レクイエム',meta:'Martin McDonagh, 2008 / レイ（Colin Farrell）',context:'暗殺の仕事で誤って少年を撃ち殺してしまった新米の殺し屋が、美しい中世の街ブルージュで深い罪悪感に苛まれながら呟くセリフ。美しい街並みと取り返しのつかない罪の意識との残酷なコントラスト。'},
  {genre:'映画',q:'Rudeness is merely an expression of fear.',trans:'無礼さというのは、単なる恐怖の表現に過ぎない。',source:'グランド・ブダペスト・ホテル',meta:'Wes Anderson, 2014 / ムッシュ・グスタヴ・H（Ralph Fiennes）',context:'伝説的なコンシェルジュが、人間の粗野な振る舞いの裏にある心理的メカニズムについて語るセリフ。他者の攻撃性を悪意ではなく「欠落への恐怖」として再定義し、醜悪さを愛によって中和するという究極のヒューマニズム。'},
  {genre:'映画',q:'I didn\'t invent the rainy day, man. I just own the best umbrella.',trans:'俺が雨の日を発明したわけじゃない。ただ、最高の傘を持っているだけさ。',source:'あの頃ペニー・レインと',meta:'Cameron Crowe, 2000 / デニス・ホープ（Jimmy Fallon）',context:'純粋な音楽への情熱で結ばれていたバンドに商業主義を持ち込む敏腕マネージャーが、自らのビジネス手法を正当化する際のセリフ。ファンの熱狂がいずれ冷めるという現実を突きつけ、その自然法則を利用するだけだと言い放つ冷徹なプラグマティズム。'},
  {genre:'映画',q:'To look at a thing is quite different from seeing a thing, and one does not see anything until one sees its beauty.',trans:'ものに「目を向ける」ことと、ものを「見る」ことは全く別物です。',source:'理想の結婚',meta:'Oliver Parker, 1999 / メイベル（Minnie Driver）',context:'オスカー・ワイルドの戯曲を原作とする本作において、上流階級の洗練された会話の中で発せられる美的認識論。視覚的情報の処理と、本質的な価値や美学の理解の間に明確な境界線を引く。'},
  {genre:'映画',q:'We want the finest wines available to humanity. We want them here, and we want them now.',trans:'我々に、人類が入手し得る最高級のワインを出してくれ。今すぐ、ここへだ。',source:'ウィズネイルと僕',meta:'Bruce Robinson, 1987 / ウィズネイル（Richard E. Grant）',context:'極度の貧困とアルコール依存に陥っている売れない役者の二人が、田舎の上品なティールームに泥酔状態で現れ傍若無人に要求するセリフ。悲惨な経済状況と特権階級的なエゴイズムの凄まじいギャップが狂気じみたユーモアを生み出している。'},
  {genre:'映画',q:'Hell, I can get you a toe by 3 o\'clock this afternoon... with nail polish.',trans:'今日の午後3時までに足の指くらい手に入れてやるよ……マニキュア付きでな。',source:'ビッグ・リボウスキ',meta:'Joel & Ethan Coen, 1998 / ウォルター（John Goodman）',context:'誘拐された妻の切断された足の指が送られてきてパニックに陥る友人に対し、ベトナム帰還兵のウォルターが事態を全く意に介さず強弁するセリフ。コーエン兄弟特有の不条理なユーモアの極致。'},
  {genre:'映画',q:'Baravelli, you\'ve got the brain of a four-year-old boy, and I bet he was glad to get rid of it.',trans:'君は4歳の少年の脳ミソを持っているな。その少年は、そんな脳ミソを捨てられてさぞ喜んだことだろう。',source:'御冗談でショ',meta:'Norman Z. McLeod, 1932 / クインシー・アダムス・ワグスタッフ教授（Groucho Marx）',context:'大学の新学長が、フットボールチームを強化するために酒場に入り浸る男をスカウトしようとする際の不条理な会話。慣用句を文字通りの意味にすり替えることで言語の約束事を破壊するコメディ・センス。'},
  {genre:'映画',q:'This is no time for Schopenhauer. This is important.',trans:'今はショーペンハウアーなんて持ち出している場合じゃない。これは重要な問題なのよ。',source:'アントニア',meta:'Marleen Gorris, 1995 / アントニア（Willeke van Ammelrooy）',context:'過度に観念的でペシミスティックな哲学者の言説に逃げ込もうとする相手に対し、現実の直視を迫る力強い一言。学問的な抽象論を、生活に根ざした現実的な実践が凌駕する瞬間。'},
  {genre:'哲学',q:'我思う、ゆえに我あり。',trans:'',source:'デカルト',meta:'ルネ・デカルト『方法序説』1637年',eng:'I think, therefore I am.',context:'あらゆる疑いを排した後に残る唯一確実な命題。近代哲学の出発点とされる。'},
  {genre:'哲学',q:'神は死んだ。',trans:'',source:'ニーチェ',meta:'フリードリヒ・ニーチェ『悦ばしき知識』1882年',eng:'God is dead.',context:'近代における宗教的・道徳的権威の崩壊を宣言した言葉。ニヒリズムの出発点として読まれることが多い。'},
  {genre:'哲学',q:'他者は地獄だ。',trans:'',source:'サルトル',meta:'ジャン＝ポール・サルトル『出口なし』1944年',eng:'Hell is other people.',context:'密室に閉じ込められた登場人物ガルサンが絞り出す言葉。他者の眼差しによる存在の固定化を指す。'},
  {genre:'哲学',q:'汝自身を知れ。',trans:'',source:'ソクラテス',meta:'デルポイの神殿の銘文 / ソクラテスの哲学の核心',eng:'Know thyself.',context:'無知の知から始まる自己探求を促す言葉。プラトンの対話篇を通じて西洋哲学の根幹となった。'},
  {genre:'哲学',q:'存在するとは知覚されることである。',trans:'原文：Esse est percipi.',source:'バークリー',meta:'ジョージ・バークリー『人知原理論』1710年',eng:'To be is to be perceived.',context:'物質の独立した存在を否定し、知覚することと存在することを同一視した観念論の核心命題。'},
  {genre:'哲学',q:'無知の知。',trans:'',source:'ソクラテス',meta:'プラトン『ソクラテスの弁明』より',eng:'I know that I know nothing.',context:'自分が何も知らないことを知っている——その認識こそが知恵の始まりとするソクラテスの立場。'},
  {genre:'現代短歌',q:'校庭の地ならし用のローラーに座れば世界中が夕焼け',trans:'',source:'穂村弘',meta:'『ラインマーカーズ』2003年',eng:'Sitting on the schoolyard roller, the whole world turns to sunset.',context:'何もしない放課後の、あの感覚。ローラーに座るという些細な行為が、世界全体を夕焼けに変える。少年期の孤独と宇宙感覚を同時に詠んだ一首。'},
  {genre:'現代短歌',q:'体温計くわえて窓に額つけ「ゆひら」とさわぐ雪のことかよ',trans:'',source:'穂村弘',meta:'『シンジケート』1990年',eng:'Thermometer in mouth, forehead pressed to glass — is that what snow sounds like, softly tumbling?',context:'病気の日に窓の外を見ている。「ゆひら」という造語が降り積む雪の柔らかさをそのまま音にしている。口語短歌の革新を象徴する恋の歌でもある。'},
  {genre:'現代短歌',q:'「この味がいいね」と君が言ったから七月六日はサラダ記念日',trans:'',source:'俵万智',meta:'『サラダ記念日』1987年',eng:'"This tastes good," you said — and so July sixth became the day I celebrate salad.',context:'なんでもない日が特別になる感覚をそのまま一首に。元のエピソードは唐揚げだったが、サラダと七夕前日の7月6日に変えることで歌の本質がより鮮明になった。現代短歌を社会現象にした一首。'},
  {genre:'現代短歌',q:'いくつもの手に撫でられて少年はようやく父の死を理解する',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',eng:'Stroked by many hands, the boy finally understands his father\'s death.',context:'触覚を通じて死を理解するという発見。言葉ではなく、手に撫でられるという身体感覚によってはじめて喪失が実感される。現代口語短歌の代表作の一つ。'},
  {genre:'現代短歌',q:'コンビニのバックヤードでミサイルを補充しているような感覚',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',eng:'A feeling like restocking missiles in the backroom of a convenience store.',context:'コンビニバイトの無機質な反復と、戦争のイメージが重なる。現代の労働と暴力の同質性を一首に圧縮した、木下龍也らしいブラックユーモアの極地。'},
  {genre:'現代短歌',q:'タワーマンションの最上階から見る街は地図のようでありそして街だ',trans:'',source:'岡野大嗣',meta:'『サイレンと犀』2014年',eng:'From the top floor of the tower, the city looks like a map — and yet it is still a city.',context:'高さから見下ろすと世界は記号になる。でもやっぱり街は街だ——その着地の一言が全てを反転させる。視点と現実のずれを詠んだ、静かな驚きのある一首。'},
  {genre:'現代短歌',q:'飛び上がり自殺をきっとするだろう人に翼を与えたならば',trans:'',source:'木下龍也',meta:'『つむじ風、ここにあります』2013年',eng:'If I gave wings to someone who would surely leap to their death.',context:'自らを傷つけようとする衝動を持つ人間に翼を与えたならば——という問いかけ。生と死の境界線上にある人間の本質を一首に圧縮した、木下龍也の代表作の一つ。'},
  {genre:'現代短歌',q:'唇が荒れるくらいの長いキスまでに交わした短い会話',trans:'',source:'木下龍也',meta:'木下龍也',eng:'The brief words exchanged before a kiss long enough to chap our lips.',context:'キスの前に交わされた短い会話という、ほんの数秒の記憶を切り取った一首。その些細な瞬間が永遠に残るという感覚が胸に刺さる。'},
  {genre:'現代アート',q:'ニューヨークのマンション群のエレベーターに入る作品でなければアートの世界で成功することはないだろう',trans:'',source:'みんなの現代アート',meta:'みんなの現代アート',context:'現代アートの商業的・地理的な権力構造を皮肉った言葉。ニューヨークという特定の場所と富裕層というコンテクストなしには成立しないアート市場の現実を突いている。'},
  {genre:'HIPHOP',q:'Reality is wrong. Dreams are for real.',trans:'現実こそが間違っている。夢のほうが本物だ。',source:'2Pac',meta:'Tupac Shakur',context:'現実の不条理さと夢の持つリアリティを逆転させた言葉。2Pacの思想的な深みを示す一節。'},
  {genre:'HIPHOP',q:'Difficult takes a day, impossible takes a week.',trans:'困難なら一日、不可能なら一週間でやってのける。',source:'Jay-Z',meta:'Jay-Z Anything 2001年',context:'自信と努力の哲学を凝縮した一節。どんな壁も時間の問題に変えてしまう気概。'},
  {genre:'HIPHOP',q:'I\'d rather die enormous than live dormant.',trans:'眠ったように生きるより、大きく散るほうがいい。',source:'Jay-Z',meta:'Jay-Z Can I Live 1996年',context:'デビューアルバム『Reasonable Doubt』収録。生のあり方をめぐる強烈な宣言。'},
  {genre:'HIPHOP',q:'Only God can judge me.',trans:'おれを裁けるのは神だけだ。',source:'2Pac',meta:'Tupac Shakur Only God Can Judge Me 1996年',context:'他者の批判を超越し、神のみを審判者とする宣言。2Pacの精神的自立の核心にある言葉。'},
  {genre:'HIPHOP',q:'The music business is motivated by money. Music is motivated by passion.',trans:'音楽産業を動かすのは金。音楽を動かすのは情熱だ。',source:'KRS-One',meta:'KRS-One (Lawrence Krisna Parker)',context:'音楽産業と音楽そのものを峻別した言葉。ブームバップ時代の精神性を体現する哲学的発言。'},
  {genre:'HIPHOP',q:'Success is my only option, failure\'s not.',trans:'成功こそが俺の唯一の選択肢であり、失敗はあり得ない。',source:'Eminem',meta:'Eminem Lose Yourself',context:'半自伝的映画『8 Mile』の主題歌。貧困から抜け出すためには成功するしか道がないという、切迫したハングリー精神が表現されている。'},
  {genre:'HIPHOP',q:'Sky\'s the limit and you know that you can have what you want, be what you want.',trans:'限界は空の彼方。望むものを手に入れ、なりたい自分になれる。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G. Sky\'s the Limit"',context:'ニューヨークの過酷な環境から世界的スターへと上り詰めた自身の経験に基づく究極の自己肯定のメッセージ。周囲の否定的な声や制度的障壁を遮断し、自身の情熱を信じ抜くことの重要性を説いている。'},
  {genre:'HIPHOP',q:'Started from the bottom, now we\'re here.',trans:'底辺から始まって、今俺たちはここにいる。',source:'Drake',meta:'Drake Started From The Bottom',context:'過去の無名時代や苦労の時期を振り返り、現在の圧倒的な成功と対比させた現代ヒップホップの代表的アンセム。「俺たち」という仲間との連帯とともに上昇したことが強調されている。'},
  {genre:'HIPHOP',q:'Dedication, hard work plus patience. The sum of all my sacrifice, I\'m done waitin\'.',trans:'献身、ハードワーク、そして忍耐。これらすべての犠牲の結晶だ、もう待つのは終わりだ。',source:'Nipsey Hussle',meta:'Nipsey Hussle Dedication feat. Kendrick Lamar',context:'長年にわたるインディペンデントでの活動の末にメジャー・デビュー・アルバムをリリースした際の核心的なリリック。一過性の成功ではなく長期的なビジネス構築と自立を宣言している。'},
  {genre:'HIPHOP',q:'Sunny days wouldn\'t be special if it wasn\'t for rain. Joy wouldn\'t feel so good if it wasn\'t for pain.',trans:'雨が降らなければ、晴れの日も特別には感じない。痛みがなければ、喜びもこれほど素晴らしいものにはならない。',source:'50 Cent',meta:'50 Cent Many Men (Wish Death)',context:'銃撃事件で9発の銃弾を受けながらも生還した自身の壮絶な体験を背景に、苦難の受容を歌った一節。人生における対極の要素を対比させ、逆境の経験こそが現在の幸福の価値を決定づけると説いている。'},
  {genre:'HIPHOP',q:'All my life they been tryin\' to keep me down. All this time, never thought I would make it out.',trans:'これまでの人生ずっと、奴らは俺を押さえつけようとしてきた。ここから抜け出せるとは思っていなかった。',source:'Lil Durk',meta:'Lil Durk feat. J. Cole All My Life',context:'シカゴの過酷な環境や司法制度といった構造的な抑圧に対する生々しい証言。絶対に屈しないというレジリエンスと、困難を生き延びたことへの誇りが力強く表現されている。'},
  {genre:'HIPHOP',q:'They say sleep is the cousin of death, so I don\'t sleep.',trans:'眠りは死の従兄弟だと言われる。だから俺は眠らない。',source:'Nas',meta:'Nas N.Y. State of Mind',context:'1990年代のニューヨークの危険なストリート環境において、常に死の危険に晒されているため無防備な状態（睡眠）すら恐怖の対象となる過酷な現実を描写。トラウマ的覚醒状態を詩的に表現した歴史的名文句。'},
  {genre:'HIPHOP',q:'My mama always used to tell me: \'If you can\'t find somethin\' to live for, you best find somethin\' to die for.\'',trans:'母さんはいつも俺にこう言った。生きる目的を見つけられないなら、死ぬための目的を見つけるのが一番だ、と。',source:'2Pac',meta:'2Pac インタビュー・スピーチ',context:'ブラックパンサー党員であった母親から受け継いだ革命的イデオロギーを反映した言葉。命を懸けるほどの絶対的な信念や大義を持つことの重要性を説く強烈なメッセージ。'},
  {genre:'HIPHOP',q:'Some people say they want to live forever. That\'s way too long, I\'ll just get through today.',trans:'永遠に生きたいと言う人もいる。だがそれは長すぎる、俺は今日を生き抜くだけだ。',source:'Mac Miller',meta:'Mac Miller Complicated',context:'内面的な苦痛と闘っていた彼自身の、終わりのない精神的疲労感を吐露したリリック。不老不死を望むのではなく、複雑な現実の中でただ「今日一日」を無事に乗り越えることの困難さを描写している。'},
  {genre:'HIPHOP',q:'I just need a way out of my head. I\'ll do anything for a way out of my head.',trans:'ただ自分の頭の中から抜け出す方法が必要なんだ。頭の中から抜け出せるなら、なんだってする。',source:'Mac Miller',meta:'Mac Miller Come Back to Earth',context:'アルバム『Swimming』の冒頭を飾る、鬱や不安による絶え間ない思考の反芻からの解放を求める悲痛な叫び。内面的な孤独と平穏を渇望する生々しい人間性が刻み込まれている。'},
  {genre:'HIPHOP',q:'Somewhere deep down there\'s a decent man in me, he just can\'t be found.',trans:'俺の心の奥底のどこかには、まともな人間が存在するはずなんだ。ただ、それを見つけられないだけで。',source:'Eminem',meta:'Eminem 語録',context:'世間に見せている過激なペルソナと、その内側にある本来の脆い自己との間の乖離に苦悩する姿を描いている。複雑な家庭環境やトラウマがもたらした人格的な葛藤が率直に語られている。'},
  {genre:'HIPHOP',q:'I\'m not afraid of dying, I\'m afraid of not trying.',trans:'俺は死ぬことは恐れていない。恐れているのは、挑戦しないことだ。',source:'Jay-Z',meta:'Jay-Z Beach Chair',context:'リスクの高い決断を下す際の究極的な心構えを示した言葉。死という不可避の運命よりも、行動を起こさずに後悔を抱えたまま生きることのほうが恐ろしいと断言するゼロから帝国を築いた起業家精神の根幹。'},
  {genre:'HIPHOP',q:'The present is a gift, and I just want to be.',trans:'現在（プレゼント）は贈り物（プレゼント）だ。だから俺はただ、ありのままでいたい。',source:'Common',meta:'Common Be',context:'過去の後悔や未来への不安に囚われることなく、今この瞬間を生きることの尊さを「Present（現在・贈り物）」というダブル・ミーニングを用いて表現。精神的な静寂と自己受容の境地を示している。'},
  {genre:'HIPHOP',q:'A poet\'s mission is to make words do more work than they normally do, to make them work on more than one level.',trans:'詩人の使命とは、言葉に通常以上の仕事をさせること、複数のレベルで機能させることだ。',source:'JAY-Z',meta:'JAY-Z 著書『Decoded』',context:'ヒップホップのリリックが持つ文学的な深さと複雑さを、ラップ界の頂点に立つ彼自身が論理的に定義した言葉。ストリートのスラングがいかにして普遍的な芸術性や社会的批評へと昇華されるかを説明している。'},
  {genre:'HIPHOP',q:'Nobody built like you, you designed yourself.',trans:'君と同じように作られた人間は誰もいない。君は君自身をデザインしたんだ。',source:'JAY-Z',meta:'JAY-Z A Dream',context:'他者の意見や社会の既成概念に流されることなく、独自の道を切り開くことの重要性を説いたアファメーションのメッセージ。自らの主体的な選択の積み重ねが現在の唯一無二の自己を形成していると称賛している。'},
  {genre:'HIPHOP',q:'Real G\'s move in silence like lasagna.',trans:'本物のギャングスタは静かに動く、ラザニアのようにな。',source:'Lil Wayne',meta:'Lil Wayne 6 Foot 7 Foot',context:'真の実力者は自己顕示することなく水面下で行動するという信条を言葉遊びで表現した天才的なリリック。「ラザニア（lasagna）」の綴りにおける「g」が発音されないことに掛けている。'},
  {genre:'HIPHOP',q:'Life is such a f**king roller coaster, then it drops, but what should I scream for? This is my theme park.',trans:'人生はジェットコースターだ。急降下する。だが、なぜ俺が叫ぶ必要がある？ここは俺のテーマパークだぜ。',source:'Lil Wayne',meta:'Lil Wayne Forever',context:'人生の激しい浮き沈みをジェットコースターに例えつつ、そのコントロール権は完全に自分にあると宣言。困難な状況すらも自分が所有する「遊園地」の一部として楽しむ自己肯定感を放っている。'},
  {genre:'HIPHOP',q:'Love me or hate me, I swear it won\'t make or break me.',trans:'俺を愛そうが憎もうが勝手だ。それで俺がどうにかなることも、壊れることもない。',source:'Lil Wayne',meta:'Lil Wayne 語録',context:'世間からの絶大な称賛と同時に浴びせられる激しい批判の両方を完全に無効化する強靭な精神状態を示している。外部の評価によって自己価値が変動することはないという揺るぎないアイデンティティの確立。'},
  {genre:'HIPHOP',q:'I know I can be what I wanna be.',trans:'俺はなりたい自分になれるって分かってるんだ。',source:'Nas',meta:'Nas I Can',context:'特に貧困層や有色人種の子供たちに向けて、教育の重要性と無限の可能性をストレートに伝えた啓蒙的な楽曲のコーラス部分。否定的な環境要因を自己信念で克服できるという未来世代へのエンパワーメント。'},
  {genre:'HIPHOP',q:'Love yourself and your expression, you can\'t go wrong.',trans:'自分自身と、自らの表現を愛せよ。そうすれば間違えることはない。',source:'KRS-One',meta:'KRS-One 語録',context:'ヒップホップの草創期から哲学的な指導者として機能してきた彼による、カルチャーの核心を突く言葉。技巧や商業的成功以前に、表現の根底には自己受容と本質的な愛が存在しなければならないという真理。'},
  {genre:'HIPHOP',q:'It ain\'t no fun if the homies can\'t have none.',trans:'仲間たちが分け前をもらえないなら、そんなもの少しも面白くない。',source:'Snoop Dogg',meta:'Snoop Dogg Ain\'t No Fun"',context:'個人の成功や富を独占するのではなく、苦楽を共にしてきたコミュニティや仲間と分かち合うことこそが真の価値であるという、ヒップホップにおける絶対的な忠誠心と連帯感の規範を示している。'},
  {genre:'HIPHOP',q:'Always do your best, don\'t let the pressure make you panic.',trans:'常に最善を尽くせ。プレッシャーに負けてパニックになるな。',source:'2Pac',meta:'2Pac Me Against the World',context:'不確実で暴力的な世界の中で孤立無援に陥った際の実践的なアドバイス。不条理や重圧に直面しても冷静さを保ち、自分がコントロールできる範囲の努力に集中することの重要性を説いている。'},
  {genre:'HIPHOP',q:'Without a game plan, and without a strong sense of faith in what you\'re doing, it\'s going to be really hard to accomplish anything.',trans:'ゲームプランがなく、強い信念がなければ、何かを成し遂げることは非常に困難になる。',source:'Nipsey Hussle',meta:'Nipsey Hussle インタビュー',context:'単なるストリートのハッスラーから尊敬を集める起業家へと変貌を遂げた彼が遺した極めて論理的な成功法則。情熱だけでなく綿密な計画と揺るぎない自己信頼の両輪があってこそ目標は達成されると明言。'},
  {genre:'HIPHOP',q:'You\'ve got to realize that the world\'s a test. You can only do your best and let him do the rest.',trans:'世界は試練だということに気づかなければならない。最善を尽くし、あとは神に委ねるしかない。',source:'OutKast',meta:'OutKast In Due Time',context:'人生において理不尽な困難や挫折が連続する理由を、精神的な成長のための「テスト」として再解釈。人間の努力が及ぶ限界を認め、それ以上の結果に対する執着を手放すという宗教的な受容のプロセス。'},
  {genre:'HIPHOP',q:'If people take anything from my music, it should be motivation to know that anything is possible as long as you keep working at it and don\'t back down.',trans:'努力を続け、決して引き下がらない限り、何事も可能だということを知るためのモチベーションを俺の音楽から受け取ってほしい。',source:'Eminem',meta:'Eminem インタビュー',context:'彼のディスコグラフィの多くが怒りや論争に満ちている一方で、その根本的な原動力は逆境にあるリスナーに対する究極の鼓舞であることを語っている。自身の軌跡を普遍的な励ましへと変換している。'},
  {genre:'HIPHOP',q:'Enjoy the best things in your life cuz you ain\'t gonna get to live it twice.',trans:'人生における最高の瞬間を楽しめ。人生を二度生きることはできないのだから。',source:'Mac Miller',meta:'Mac Miller 語録',context:'過ぎ去っていく時間に対する後悔や未来への不安を脇に置き、今目の前にある喜びを純粋に享受することの大切さを訴えかけている。26歳という若さでこの世を去った彼の生涯を振り返ると一層の重みを持つ言葉。'},
  {genre:'HIPHOP',q:'First you gotta find your passion then you stick with it, one thing about this game you gotta stay consistent.',trans:'まず情熱を見つけ、それに固執しなければならない。一貫性を保ち続けることがこのゲームの真理だ。',source:'Larry June',meta:'Larry June 語録',context:'すぐに結果が出ない時期やモチベーションが落ちる日々でも自分が選んだ道を投げ出さないことの絶対性を説いている。才能以上に「継続性」こそが業界を生き残るための最大の武器というビジネス上の教訓。'},
  {genre:'文学',q:'すべての幸福な家族は似たものだが、不幸な家族はそれぞれ独自の不幸を抱えている。',trans:'',source:'トルストイ',meta:'レフ・トルストイ『アンナ・カレーニナ』1878年 冒頭',eng:'All happy families are alike; each unhappy family is unhappy in its own way.',context:'文学史上最も有名な書き出しの一つ。幸福の均質性と不幸の多様性を対比させたトルストイの洞察。'},
  {genre:'文学',q:'人間は考える葦である。',trans:'原文：L\'homme n\'est qu\'un roseau, le plus faible de la nature, mais c\'est un roseau pensant.',source:'パスカル',meta:'ブレーズ・パスカル『パンセ』1670年',eng:'Man is but a reed, the most feeble thing in nature — but he is a thinking reed.',context:'宇宙の広大さの前では葦のように脆弱な人間が、思考によってその宇宙を包含できるとする逆説。'},
  {genre:'文学',q:'メロスは激怒した。',trans:'',source:'太宰治',meta:'太宰治『走れメロス』1940年',eng:'Melos was furious.',context:'日本文学の中で最も有名な書き出しの一つ。一文でメロスの性格と物語の推進力を伝える。'},
  {genre:'文学',q:'国境の長いトンネルを抜けると雪国であった。',trans:'',source:'川端康成',meta:'川端康成『雪国』1937年',eng:'The train came out of the long tunnel into the snow country.',context:'ノーベル賞作家の代表作の冒頭。トンネルを境とした世界の転換が、現実と非現実の境界を暗示する。'},
  {genre:'文学',q:'吾輩は猫である。名前はまだない。',trans:'',source:'夏目漱石',meta:'夏目漱石『吾輩は猫である』1905年',eng:'I am a cat. As yet I have no name.',context:'猫の一人称で語られる近代日本文学の傑作の書き出し。漱石の文体と視点の革新性を象徴する。'},
  {genre:'文学',q:'時間は無限の海。私たちはその砂浜に立つ一粒の砂だ。',trans:'',source:'ボルヘス',meta:'ホルヘ・ルイス・ボルヘス『砂の本』1975年',eng:'Time is an infinite sea. We are but a single grain of sand standing on its shore.',context:'無限と有限の対比をボルヘスらしい詩的な比喩で表現。砂の本という無限の書物の主題と呼応する。'},
  {genre:'シェイクスピア',q:'To be, or not to be, that is the question.',trans:'生きるべきか、死ぬべきか、それが問題だ。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'デンマーク王子ハムレットが生と死の狭間で自己の存在意義を問う独白。西洋文学史上最も有名な一節であり、実存主義的な問いの原点ともなっている。'},
  {genre:'シェイクスピア',q:'There is nothing either good or bad, but thinking makes it so.',trans:'良いも悪いもない、考え方次第だ。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'ハムレットがローゼンクランツとギルデンスターンに語る言葉。人間の認識と現実の関係を鋭く突いた相対主義的な洞察で、現代の認知心理学にも通じる。'},
  {genre:'シェイクスピア',q:'Doubt thou the stars are fire, doubt that the sun doth move, but never doubt I love.',trans:'星が燃えることを疑っても、太陽の動きを疑っても、私の愛だけは疑うな。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'ハムレットがオフィーリアに宛てた手紙の一節。宇宙の真理さえ疑いの対象とするハムレットが、ただ一つ揺るぎないものとして愛を挙げる逆説的な純情。'},
  {genre:'シェイクスピア',q:'We know what we are, but know not what we may be.',trans:'今の自分は知っている。だがこれからの自分は誰も知らない。',source:'ハムレット',meta:'ウィリアム・シェイクスピア『ハムレット』',context:'狂気に陥ったオフィーリアが放つ言葉。現在の自己認識と未来の可能性の間にある深淵を示し、人間の成長と変容の不確かさを鋭く表現している。'},
  {genre:'シェイクスピア',q:'What\'s done is done.',trans:'済んだことは済んだこと。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'マクベス夫人が夫の後悔を押しとどめようとする場面での言葉。過去を変えることはできないという冷酷な現実認識であり、同時に罪悪感から逃れようとする自己欺瞞の表れでもある。'},
  {genre:'シェイクスピア',q:'Stars, hide your fires; let not light see my black and deep desires.',trans:'星よ、火を隠せ。光に私の暗い欲望を見せるな。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'王位簒奪を企てるマクベスが闇夜に向かって放つ独白。野望と道徳の間で引き裂かれた人間の内面を、宇宙的なスケールで描いた詩的表現。'},
  {genre:'シェイクスピア',q:'Life\'s but a walking shadow.',trans:'人生はただの歩く影に過ぎない。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'全てを失ったマクベスが人生の虚無を独白する「明日、また明日、また明日」の一節から。人生の儚さと無意味さを極限まで圧縮した言葉。'},
  {genre:'シェイクスピア',q:'Fair is foul, and foul is fair.',trans:'美しいものは醜く、醜いものは美しい。',source:'マクベス',meta:'ウィリアム・シェイクスピア『マクベス』',context:'冒頭で三人の魔女が唱える呪文。外見と実体の乖離、善悪の逆転というマクベス全体を貫くテーマを凝縮した一節。'},
  {genre:'シェイクスピア',q:'What\'s in a name? That which we call a rose by any other name would smell as sweet.',trans:'名前に何の意味がある？薔薇はどんな名で呼ばれても同じ香りを放つ。',source:'ロミオとジュリエット',meta:'ウィリアム・シェイクスピア『ロミオとジュリエット』',context:'ジュリエットがバルコニーで独白する場面。名前という社会的記号と本質的な存在の間の矛盾を問い、モンタギューとキャピュレットの対立の不条理さを訴える。'},
  {genre:'シェイクスピア',q:'Good night, good night! Parting is such sweet sorrow.',trans:'おやすみ、おやすみ。別れはこんなにも甘く切ない。',source:'ロミオとジュリエット',meta:'ウィリアム・シェイクスピア『ロミオとジュリエット』',context:'バルコニーシーンの終わりにジュリエットがロミオに告げる言葉。別れの悲しみの中に次の再会への甘い期待が混ざり合うという感情の複雑さを見事に表現している。'},
  {genre:'シェイクスピア',q:'These violent delights have violent ends.',trans:'激しい喜びは激しい終わりを迎える。',source:'ロミオとジュリエット',meta:'ウィリアム・シェイクスピア『ロミオとジュリエット』',context:'ロレンス神父がロミオの性急な愛に警告を発する場面。過剰な情熱は必ず破滅をもたらすという古典的な教訓で、二人の悲劇を予言する言葉でもある。'},
  {genre:'シェイクスピア',q:'The course of true love never did run smooth.',trans:'真実の愛の道は決して平坦ではない。',source:'真夏の夜の夢',meta:'ウィリアム・シェイクスピア『真夏の夜の夢』',context:'ライサンダーがハーミアに語る言葉。愛には常に障害や試練が伴うという普遍的な真理を詩的に表現し、その後の物語全体の主題を先取りしている。'},
  {genre:'シェイクスピア',q:'Though she be but little, she is fierce.',trans:'小さくとも、彼女は激しい。',source:'真夏の夜の夢',meta:'ウィリアム・シェイクスピア『真夏の夜の夢』',context:'ヘレナがハーミアの激しい気性を評した言葉。外見の小ささと内面の強さの対比が鮮やかで、現代では女性の強さを称える言葉として広く引用されている。'},
  {genre:'シェイクスピア',q:'All that glitters is not gold.',trans:'光るものすべてが金ではない。',source:'ヴェニスの商人',meta:'ウィリアム・シェイクスピア『ヴェニスの商人』',context:'モロッコ王子が金の箱を選んで失敗する場面の教訓。外見や見かけの華やかさに惑わされてはならないという警句で、英語のことわざとして今も広く使われている。'},
  {genre:'シェイクスピア',q:'The quality of mercy is not strained.',trans:'慈悲とは強いられるものではない。',source:'ヴェニスの商人',meta:'ウィリアム・シェイクスピア『ヴェニスの商人』',context:'ポーシャが法廷でシャイロックに慈悲を乞う有名な演説の冒頭。慈悲は天から自然に降り注ぐもので、強制できるものではないという人道主義的な訴え。'},
  {genre:'シェイクスピア',q:'All the world\'s a stage, and all the men and women merely players.',trans:'世界はすべて舞台、男も女もみな役者に過ぎない。',source:'お気に召すまま',meta:'ウィリアム・シェイクスピア『お気に召すまま』',context:'厭世家ジャックスが人生の七段階を語る有名な独白の冒頭。人間の一生を劇に例えることで、存在の儚さと役割演技の本質を鋭く描いている。'},
  {genre:'シェイクスピア',q:'The fool doth think he is wise, but the wise man knows himself to be a fool.',trans:'愚か者は自分を賢いと思い、賢者は自分が愚かだと知っている。',source:'お気に召すまま',meta:'ウィリアム・シェイクスピア『お気に召すまま』',context:'道化師タッチストーンが語る逆説。ソクラテスの「無知の知」に通じる洞察で、真の知恵とは自らの無知を自覚することだという普遍的な教訓。'},
  {genre:'シェイクスピア',q:'We that are true lovers run into strange capers.',trans:'真の恋人たちは奇妙な行動をとるものだ。',source:'お気に召すまま',meta:'ウィリアム・シェイクスピア『お気に召すまま』',context:'道化師タッチストーンが恋愛の不合理さを語る場面。真剣に恋をすると人は常軌を逸した行動をとるという、恋愛の滑稽さと純粋さを同時に捉えた言葉。'},
  {genre:'シェイクスピア',q:'I am not what I am.',trans:'私は私でないものだ。',source:'オセロ',meta:'ウィリアム・シェイクスピア『オセロ』',context:'イアーゴーが自らの二面性を告白する言葉。表向きの忠誠と内なる裏切りの二重性を一言で表した、シェイクスピアの悪役描写の中でも特に鋭い自己認識。'},
  {genre:'シェイクスピア',q:'Jealousy is the green-eyed monster.',trans:'嫉妬は緑色の目をした怪物だ。',source:'オセロ',meta:'ウィリアム・シェイクスピア『オセロ』',context:'イアーゴーがオセロに嫉妬心を植え付けようとする場面での言葉。嫉妬を「緑の目をした怪物」と表現したこの比喩は英語のイディオムとして定着し、今も広く使われている。'},
  {genre:'シェイクスピア',q:'How sharper than a serpent\'s tooth it is to have a thankless child.',trans:'恩知らずの子を持つことは、蛇の牙よりも鋭く刺さる。',source:'リア王',meta:'ウィリアム・シェイクスピア『リア王』',context:'娘たちに裏切られたリア王が嘆く言葉。親子の絆と裏切りの痛みを蛇の毒牙という鮮烈なイメージで表現し、老齢と孤独の苦しみを凝縮している。'},
  {genre:'シェイクスピア',q:'The worst is not, so long as we can say "This is the worst."',trans:'これが最悪だと言える間は、まだ最悪ではない。',source:'リア王',meta:'ウィリアム・シェイクスピア『リア王』',context:'エドガーが極限状態で語る逆説的な希望の言葉。絶望を言語化できる間はまだ生きている証拠であり、真の最悪とは語ることすらできない状態だという深い洞察。'},
  {genre:'シェイクスピア',q:'We are such stuff as dreams are made on.',trans:'我々は夢と同じ素材でできている。',source:'テンペスト',meta:'ウィリアム・シェイクスピア『テンペスト』',context:'魔法使いプロスペローが幻影の宴の後に語る言葉。人間の存在そのものが夢と同じ幻のようなものだという実存的な洞察で、シェイクスピアの晩年の円熟した世界観を象徴する。'},
  {genre:'シェイクスピア',q:'What\'s past is prologue.',trans:'過去はすべて序章に過ぎない。',source:'テンペスト',meta:'ウィリアム・シェイクスピア『テンペスト』',context:'アントーニオが陰謀を語る場面での言葉。過去の出来事はこれから始まる本編への序章に過ぎないという考え方は、歴史の必然性と未来への開かれた可能性を同時に示している。'},
  {genre:'シェイクスピア',q:'Some are born great, some achieve greatness, and some have greatness thrust upon them.',trans:'生まれつき偉大な者、努力で偉大になる者、偉大さを押しつけられる者がいる。',source:'十二夜',meta:'ウィリアム・シェイクスピア『十二夜』',context:'マルヴォーリオが読む偽の手紙の一節。偉大さへの道は一つではなく、生来の才能、後天的な努力、そして運命のいずれかによっても達成されうるという人間観を示している。'},
  {genre:'シェイクスピア',q:'Love is not love which alters when it alteration finds.',trans:'変化に応じて変わる愛は、愛とは言えない。',source:'ソネット116番',meta:'ウィリアム・シェイクスピア『ソネット116番』',context:'シェイクスピアのソネットの中で最も有名な一篇。真の愛は状況や時間に左右されない不変のものだという理想的な愛の定義を宣言している。'},
  {genre:'ゲーテ',q:'瞬間よ、とどまれ、お前はいかにも美しい。',trans:'原文：Verweile doch! du bist so schön.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',eng:'Stay a while! You are so beautiful.',context:'ファウストが悪魔メフィストフェレスと交わした契約の核心となる言葉。この瞬間に満足を感じたら魂を渡すという誓い。完全な満足を拒否し続ける人間の永遠の探求を象徴する。'},
  {genre:'ゲーテ',q:'理論は灰色、されど生の黄金の樹は緑に茂る。',trans:'原文：Grau, teurer Freund, ist alle Theorie, und grün des Lebens goldner Baum.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',eng:'All theory is grey, my friend. But forever green is the tree of life.',context:'メフィストフェレスが学生に語る言葉。抽象的な理論よりも、生きた経験こそが真の知恵をもたらすという実践主義的な洞察。ゲーテ自身の経験重視の哲学を体現している。'},
  {genre:'ゲーテ',q:'人間はあくなき努力を続ける限り、迷うものだ。',trans:'原文：Es irrt der Mensch, solang er strebt.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',eng:'Man errs as long as he strives.',context:'神がファウストについて語る言葉。迷いや過ちは努力する者の証であり、神はその誠実な探求を見守るという、人間の不完全さへの深い慈愛が込められている。'},
  {genre:'ゲーテ',q:'始めに行為ありき。',trans:'原文：Im Anfang war die Tat.',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ファウスト』第一部 1808年',eng:'In the beginning was the deed.',context:'ファウストが聖書の「始めに言葉ありき」を翻訳しながら自らの哲学に辿り着く場面。思索よりも行動こそが世界の根源だというゲーテの行動主義的な世界観を示す。'},
  {genre:'ゲーテ',q:'われわれが理解しないことは制御しがたい。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『格言と反省』',eng:'What we do not understand we cannot control.',context:'知識と支配の関係を端的に示した言葉。理解のないところに真の制御は生まれないというゲーテの認識論的な洞察で、科学や政治にも通じる普遍的な真理。'},
  {genre:'ゲーテ',q:'人間というものは、どんな境遇に置かれても、何かしら不満の種を見つけ出すものだ。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『若きウェルテルの悩み』1774年',eng:'Human beings, no matter what their circumstances, will always find some seed of discontent.',context:'人間の不満足な本性を鋭く観察した言葉。どんな恵まれた状況でも人は不満を見出すという人間心理の普遍的な真実を、若き日のゲーテが鋭く捉えている。'},
  {genre:'ゲーテ',q:'われわれの本性は怠惰へ傾いている。だが、われわれは活動へと心をはげます限り、その活動に真の悦びを感ずる。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『若きウェルテルの悩み』1774年',eng:'Our nature inclines toward idleness, yet so long as we spur ourselves to action, we feel true joy in that activity.',context:'人間の怠惰な本性と行動の喜びの矛盾を鋭く捉えた言葉。努力することへの抵抗感を認めつつも、実際に動き出したときに生まれる充実感の真実を語っている。'},
  {genre:'ゲーテ',q:'焦ることは何の役にも立たない。後悔はなおさら役に立たない。焦りは過ちを増し、後悔は新しい後悔をつくる。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『格言と反省』',eng:'Haste serves no purpose, and regret even less. Haste multiplies errors, and regret breeds new regret.',context:'焦りと後悔という人間の二大の心理的罠を同時に批判した言葉。どちらも現在の問題を悪化させるだけだという冷静な分析は、現代のマインドフルネスの思想にも通じる。'},
  {genre:'ゲーテ',q:'花を与えるのは自然、編んで花輪にするのは芸術。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『格言と反省』',eng:'Nature gives us flowers; art weaves them into a garland.',context:'自然と芸術の関係を端的に示した言葉。素材を提供するのは自然だが、それを意味ある形に変えるのが人間の創造的な行為だというゲーテの芸術観。'},
  {genre:'ゲーテ',q:'まだ日が暮れない、働けよ、あくことなく。そのうちに誰も働くことのできない死が来る。',trans:'',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『西東詩集』1819年',eng:'The day is not yet done, so work tirelessly. Soon comes death, when none can work.',context:'死という不可避の終わりを前にして、今この瞬間に全力で働くことの重要性を説いた言葉。時間の有限性を意識した上での行動の促しで、晩年のゲーテの人生観を凝縮している。'},
  {genre:'ゲーテ',q:'自分自身を信じてみるだけでいい。きっと、生きる道が見えてくる。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'As soon as you trust yourself, you will know how to live.',context:'自己不信に悩む人への力強い励ましの言葉。複雑な哲学理論ではなく、ただ自分を信じるという単純な行為から道が開けるというゲーテの実践的な人生哲学。'},
  {genre:'ゲーテ',q:'王様であろうと百姓であろうと、己の家庭で平和を見出す者が一番幸福な人間である。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'Whether king or peasant, the happiest is the one who finds peace in his own home.',context:'社会的地位や富とは無関係に、家庭における平和と安らぎこそが真の幸福の源であるというゲーテの幸福論。外的な成功よりも内的な充足を重視する価値観を示している。'},
  {genre:'ゲーテ',q:'人間の最大の罪は不機嫌である。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'The greatest sin of mankind is ill humor.',context:'不機嫌を道徳的な問題として捉えた鋭い言葉。自分の感情を周囲に押し付ける不機嫌さは、他者への最大の無礼であるというゲーテの社交的・倫理的な洞察。'},
  {genre:'ゲーテ',q:'涙とともにパンを食べた者でなければ、人生の本当の味はわからない。',trans:'原文：Wer nie sein Brot mit Tränen aß...',source:'ゲーテ',meta:'ヨハン・ヴォルフガング・フォン・ゲーテ『ヴィルヘルム・マイスターの修業時代』1795年',eng:'Who never ate his bread with tears knows not the true taste of life.',context:'苦難と悲しみを経験した者だけが人生の深みを知ることができるという言葉。涙とパンという日常的なイメージを通じて、苦労の経験が人間を成熟させるという真理を表現。'},
  {genre:'ゲーテ',q:'知ることだけでは十分ではない、それを使わなければならない。望むだけでは十分ではない、それを行わなければならない。',trans:'原文：Knowing is not enough; we must apply. Willing is not enough; we must do.',source:'ゲーテ',meta:'ゲーテ 語録',eng:'Knowing is not enough; we must apply. Willing is not enough; we must do.',context:'知識と実践、意志と行動の間にある決定的な差を指摘した言葉。どんな優れた知識も、どんな強い意志も、実際に行動しなければ無意味だというゲーテの行動主義哲学。'},
  {genre:'ゲーテ',q:'人を信頼する者は、裏切られることよりも多くのものを得る。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'One who trusts others gains more than he loses to betrayal.',context:'信頼することのリスクよりも得られるものの方が大きいというゲーテの人間観。裏切りへの恐怖から信頼を避けることは、より大きな人生の豊かさを失うことだという洞察。'},
  {genre:'ゲーテ',q:'大胆であれ、そして大胆であれ、常に大胆であれ。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'Be bold, and bold again, and forever bold.',context:'三度繰り返すことで大胆さの重要性を強調した言葉。一時的な勇気ではなく、常に大胆であり続けることが成功の鍵だというゲーテの行動哲学。'},
  {genre:'ゲーテ',q:'若いときは興味が散漫なために忘れっぽく、年をとると、興味の欠乏のために忘れっぽくなる。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'In youth we forget through scattered interest; in age, through lack of it.',context:'若さと老いのそれぞれの忘れっぽさの原因を鋭く分析した言葉。過剰な刺激と関心の枯渇という人生の両極端を捉えた、ゲーテならではの鋭い人間観察。'},
  {genre:'ゲーテ',q:'喜びには悩みが、悩みには喜びがなくてはならない。',trans:'',source:'ゲーテ',meta:'ゲーテ 語録',eng:'Joy must have its sorrow, and sorrow its joy.',context:'人生における喜びと悲しみの不可分な関係を示した言葉。どちらか一方だけでは人生は成立せず、両者が交互に訪れることで人間の経験が豊かになるというゲーテの弁証法的な人生観。'},
  {genre:'孔子',q:'学びて思わざれば則ち罔し、思いて学ばざれば則ち殆し。',trans:'学んでも考えなければ無駄、考えても学ばなければ危険だ。',source:'孔子',meta:'『論語』為政篇',eng:'Learning without thought is labor lost; thought without learning is perilous.',context:'学習と思考の相互補完的な関係を説いた言葉。知識の吸収だけでも、思索だけでも不十分であり、両者が結びついて初めて真の学問が成立するという儒教教育の核心。'},
  {genre:'孔子',q:'知るを知るとなし、知らざるを知らずとなす。これ知るなり。',trans:'知っていることは知っている、知らないことは知らない。これが真の知だ。',source:'孔子',meta:'『論語』為政篇',eng:'To know what you know and know what you do not know — that is true knowledge.',context:'知的誠実さの重要性を説いた言葉。自分の無知を認める謙虚さこそが真の知恵の始まりであるというソクラテスの「無知の知」にも通じる普遍的な認識論。'},
  {genre:'孔子',q:'学びて時にこれを習う、また説ばしからずや。',trans:'学んだことを折に触れて繰り返す、なんと喜ばしいことか。',source:'孔子',meta:'『論語』学而篇',eng:'Is it not a joy to learn and to practice what you have learned in due time?',context:'論語の冒頭を飾る言葉。学びを反復することの喜びを説いており、知識の習得だけでなく反復と実践による深化が真の学問であることを示している。'},
  {genre:'孔子',q:'止まりさえしなければ、どんなにゆっくりでも進めばよい。',trans:'',source:'孔子',meta:'『論語』',eng:'It does not matter how slowly you go as long as you do not stop.',context:'歩みの速さよりも継続することの重要性を説いた言葉。完璧さや速さへのプレッシャーを手放し、着実に前進し続けることの価値を示す孔子の実践的な教え。'},
  {genre:'孔子',q:'三人行けば必ず我が師あり。',trans:'三人で行けば、必ず自分の師となる人がいる。',source:'孔子',meta:'『論語』述而篇',eng:'When three walk together, one of them is surely my teacher.',context:'どんな人間からも学べるという謙虚さと学習への開放的な姿勢を説いた言葉。優れた人からは長所を、そうでない人からは反面教師として学ぶことができるという孔子の学習哲学。'},
  {genre:'孔子',q:'過ちて改めざる、これを過ちという。',trans:'過ちを犯して改めないこと、これが本当の過ちだ。',source:'孔子',meta:'『論語』衛霊公篇',eng:'To err and not to correct it — that is the real error.',context:'過ちそのものよりも、過ちを認めて改めないことの方が真の問題だという言葉。失敗を恐れることなく、失敗から学んで修正する勇気を持つことの重要性を説いている。'},
  {genre:'孔子',q:'己の欲せざるところを人に施すなかれ。',trans:'自分がされたくないことを、他人にしてはならない。',source:'孔子',meta:'『論語』顔淵篇',eng:'Do not impose on others what you do not wish for yourself.',context:'儒教の黄金律とも言える言葉。自己中心的な欲求を基準にするのではなく、相手の立場に立って行動することを求める普遍的な道徳原則。キリスト教の黄金律とも共鳴する。'},
  {genre:'孔子',q:'君子は和して同ぜず、小人は同じて和せず。',trans:'君子は他者と調和するが流されない。小人は同調するが調和しない。',source:'孔子',meta:'『論語』子路篇',eng:'The noble harmonize without conforming; the small conform without harmony.',context:'真の協調と単なる同調の違いを示した言葉。表面的に合わせるのではなく、自分の軸を保ちながら他者と深いレベルで調和することが君子（真の人格者）の在り方だという教え。'},
  {genre:'孔子',q:'君子は人の美を成す、人の悪を成さず。',trans:'君子は人の良いところを伸ばし、悪いところは戒める。小人はその逆をする。',source:'孔子',meta:'『論語』顔淵篇',eng:'The noble bring out the good in others, not the bad; the small do the opposite.',context:'人格者の他者への向き合い方を示した言葉。他者の長所を見出して伸ばし、短所は慈愛をもって諫めるという姿勢が、真のリーダーシップと人間関係の基本だという儒教の教え。'},
  {genre:'孔子',q:'徳は孤ならず、必ず隣あり。',trans:'徳のある人は孤立しない。必ず理解者が現れる。',source:'孔子',meta:'『論語』里仁篇',eng:'Virtue is never alone; it always has neighbors.',context:'徳を積む者は必ず仲間や支持者に恵まれるという言葉。正しい道を歩む孤独を恐れなくていい、なぜなら徳は必ず共鳴する人を引き寄せるという孔子の励ましの言葉。'},
  {genre:'孔子',q:'吾日に三たび吾が身を省みる。',trans:'私は毎日三度、自分の行いを振り返る。',source:'孔子',meta:'『論語』学而篇',eng:'Each day I examine myself on three points.',context:'孔子の弟子・曾子の言葉。日々の自己反省を習慣にすることで、道徳的な成長を継続的に実現するという儒教の修養の実践。現代の自己啓発にも通じる内省の重要性。'},
  {genre:'孔子',q:'義を見てせざるは勇なきなり。',trans:'正義と知りながら行動しないのは、勇気がないからだ。',source:'孔子',meta:'『論語』為政篇',eng:'To see what is right and not do it is want of courage.',context:'正義を知ることと実行することの間にある勇気の重要性を説いた言葉。知識や認識だけでは不十分であり、正しいと分かったことを実行する勇気こそが真の徳だというメッセージ。'},
  {genre:'孔子',q:'朝に道を聞かば、夕べに死すとも可なり。',trans:'朝に真理を知ることができれば、夕方に死んでも悔いはない。',source:'孔子',meta:'『論語』里仁篇',eng:'If a man hears the Way in the morning, he may die content in the evening.',context:'真理の探求に人生を捧げることの価値を示した言葉。命よりも真理の方が価値があるという知的・精神的な姿勢を極限まで表現した、孔子の学問への情熱の凝縮。'},
  {genre:'孔子',q:'歳寒くして、然る後に松柏の彫むに後るるを知る。',trans:'寒い季節になって初めて、松や柏が最後まで枯れないとわかる。逆境になって初めて人の真価がわかる。',source:'孔子',meta:'『論語』子罕篇',eng:'Only when the year grows cold do we see that the pine and cypress are the last to fade.',context:'逆境の中でこそ人の真価が明らかになるという言葉。松や柏が厳冬においても緑を保つように、真の人格者は困難な時期においても本来の姿を失わないという教え。'},
  {genre:'孔子',q:'賢を見ては斉しからんことを思い、不賢を見ては内に自ら省みる。',trans:'優れた人を見たら同じようになろうと思い、劣った人を見たら自分を省みよ。',source:'孔子',meta:'『論語』里仁篇',eng:'When you see a worthy person, seek to equal them; when you see an unworthy one, look within yourself.',context:'他者を自己成長の鏡として使う方法を説いた言葉。優れた人からは憧れと目標を、そうでない人からは自己反省の機会を得るという、あらゆる出会いを学びに変える孔子の知恵。'},
  {genre:'孔子',q:'吾十有五にして学に志す。三十にして立つ。四十にして惑わず。',trans:'十五歳で学問を志し、三十で自立し、四十で迷わなくなった。（五十で天命を知り、六十で素直に聞け、七十で思うままに行動しても道を外れなくなった）',source:'孔子',meta:'『論語』為政篇',eng:'At fifteen I set my heart on learning; at thirty I stood firm; at forty I had no doubts.',context:'孔子自身の人生の歩みを年代別に振り返った言葉。学問から始まり、自立、迷いの消滅、天命の認識へと至る精神的成熟の過程を示しており、人生のロードマップとして後世に大きな影響を与えた。'},
  {genre:'孔子',q:'疏食を飯い水を飲み、肱を曲げてこれを枕とす。楽しみ亦た其の中に在り。',trans:'粗末な食事をして水を飲み、腕を曲げて枕にする。その中にも楽しみはある。',source:'孔子',meta:'『論語』述而篇',eng:'With coarse rice to eat, water to drink, and my bent arm for a pillow — joy is found even here.',context:'物質的な豊かさとは無関係に精神的な充足を見出すことができるという言葉。貧しい生活の中にも真の喜びがあるというシンプルな生き方の肯定は、老子の思想にも通じる。'},
  {genre:'孔子',q:'過ぎたるは猶お及ばざるがごとし。',trans:'やり過ぎることは、足りないことと同じくらいよくない。',source:'孔子',meta:'『論語』先進篇',eng:'To go too far is as bad as to fall short.',context:'中庸の重要性を説いた言葉。過剰と不足はどちらも理想的な状態ではなく、適切なバランスこそが最善だという儒教の中庸の思想を端的に表現している。'},
  {genre:'孔子',q:'知者は惑わず、仁者は憂えず、勇者は懼れず。',trans:'知恵ある者は迷わず、思いやりある者は憂えず、勇気ある者は恐れない。',source:'孔子',meta:'『論語』子罕篇',eng:'The wise are free from doubt, the benevolent from worry, the brave from fear.',context:'儒教の三つの徳（知・仁・勇）それぞれが心の状態に与える影響を示した言葉。真の知恵、慈悲、勇気を持つ者はそれぞれの精神的な解放を得るという孔子の徳論の集約。'},
  {genre:'孔子',q:'名を正さざれば則ち言順わず。',trans:'名が正しくなければ言葉は通じず、言葉が通じなければ何事も成し遂げられない。',source:'孔子',meta:'『論語』子路篇',eng:'If names are not correct, words do not accord with things.',context:'正名（名分を正すこと）の重要性を説いた言葉。物事に正確な名前をつけることが言語・社会・政治の秩序の基盤であるという孔子の言語哲学と社会思想の核心。'},
  {genre:'三国志',q:'山は高きを厭わず、海は深きを厭わず。',trans:'',source:'曹操',meta:'曹操／楽府詩「歩出夏門行」',eng:'A mountain does not tire of its height; a sea does not tire of its depth.',context:'どんな優秀な人材でも受け入れるという曹操の器の大きさを示した言葉。山が高くなることを嫌わず、海が深くなることを嫌わないように、優れた人材を際限なく集めるという人材登用の哲学。'},
  {genre:'三国志',q:'戦に負けてみるがいい。敗れて初めて覚り得るものがある。',trans:'',source:'曹操',meta:'曹操／三国志',eng:'Try losing a battle. There are things one can only learn through defeat.',context:'敗戦の痛みの中にこそ真の学びがあるという言葉。勝ち続けたリーダーは気づけないことを、敗者は身をもって知るという曹操の冷徹な自己省察。'},
  {genre:'三国志',q:'機の熟さぬうちにことを行えばかえって害を招く。時機を待て。',trans:'',source:'曹操',meta:'曹操／三国志',eng:'To act before the moment is ripe brings harm. Wait for the right time.',context:'焦って動くことの危険性を説いた戦略的な教え。準備が整わないうちの行動は失敗の元であり、好機を見極めて動くことこそが勝利への道だという曹操の兵法哲学。'},
  {genre:'三国志',q:'われ天下の人に背くとも、天下の人にわれに背かせじ。',trans:'',source:'曹操',meta:'曹操／三国志',eng:'I would rather betray the world than let the world betray me.',context:'自分が悪者になっても先手を打つという曹操の非情な覚悟を示した言葉。冷酷なまでの現実主義者として知られる曹操の本質を凝縮した一言。'},
  {genre:'三国志',q:'志なくんば、以て学問を成すなし。',trans:'志がなければ、学問を完成させることはできない。',source:'諸葛亮',meta:'諸葛亮（孔明）／「誡子書」',eng:'Without aspiration, one cannot achieve learning.',context:'息子への手紙「誡子書」に書かれた言葉。目的なき努力の空虚さへの警告であり、学ぶことの前提として明確な志を持つことの重要性を説いた孔明の教育哲学。'},
  {genre:'三国志',q:'優れた人は静かに身を修め、徳を養う。',trans:'',source:'諸葛亮',meta:'諸葛亮（孔明）／「誡子書」',eng:'The person of excellence quietly cultivates the self and nurtures virtue.',context:'真に優れた人間は静かに自己を磨くという教え。誇示せず内側を鍛え続けることの重要性を説いた言葉で、孔明自身が生涯体現し続けた謙虚さの哲学。'},
  {genre:'三国志',q:'才に傲りて人に驕らず、寵をもって威を作さず。',trans:'才能に傲慢にならず、寵愛を受けても威張らない。',source:'諸葛亮',meta:'諸葛亮（孔明）／三国志',eng:'Do not be arrogant about your talent, nor use favor to intimidate others.',context:'才能に驕らず、寵愛を受けても威張らないという戒め。孔明自身が生涯体現し続けた謙虚さの哲学であり、真のリーダーが持つべき徳の姿を示している。'},
  {genre:'三国志',q:'鞠躬尽瘁、死して後已む。',trans:'身を屈めて全力を尽くし、死ぬまで止まない。',source:'諸葛亮',meta:'諸葛亮（孔明）／「後出師表」',eng:'I will devote myself body and soul until death.',context:'孔明が劉禅への北伐の決意を示した「後出師表」の言葉。主君への忠義と使命への献身を極限まで表現した一節で、孔明の生涯そのものを象徴する言葉として後世に語り継がれている。'},
  {genre:'三国志',q:'勿以悪小而為之、勿以善小而不為。',trans:'悪は小さくとも行うなかれ、善は小さくとも行わざるなかれ。',source:'劉備',meta:'劉備／「遺詔」',eng:'Do not do evil because it seems small; do not neglect good because it seems small.',context:'息子・劉禅への遺言として残した言葉。小さな悪も積み重なれば大きくなり、小さな善も積み重なれば徳になるという教え。仁義を重んじた劉備の人生哲学の集約。'},
  {genre:'三国志',q:'兄弟は手足のごとく、妻子は衣服のごとし。',trans:'',source:'劉備',meta:'劉備／三国志',eng:'Brothers are like hands and feet; wives and children are like clothing.',context:'仲間との絆を何よりも大切にした劉備の言葉。衣服は替えられるが手足は替えられないという比喩で、義兄弟への絶対的な忠義を示した。関羽・張飛との桃園の誓いの精神を体現する。'},
  {genre:'三国志',q:'玉砕するとも瓦全せず。',trans:'美しく砕けることを選び、汚く生き延びることを拒む。',source:'関羽',meta:'関羽／三国志',eng:'Better to die with honor than to live in disgrace.',context:'義のために命を賭けた関羽の誇り高き生き様を示す言葉。どんな状況でも誇りを失わず、名誉ある死を不名誉な生より選ぶという武将としての覚悟。'},
  {genre:'三国志',q:'勝負は急がず。ただ耐えよ。',trans:'',source:'司馬懿',meta:'司馬懿／三国志',eng:'Do not rush to victory. Simply endure.',context:'諸葛亮の度重なる挑発にも動じず待ち続けた司馬懿の戦略を示す言葉。焦りこそが最大の敵であり、耐え抜くことで機会を待つという冷静な洞察。'},
  {genre:'三国志',q:'鷹は爪を隠す。',trans:'',source:'司馬懿',meta:'司馬懿／三国志',eng:'The hawk hides its talons.',context:'真の実力者は力を誇示しないという言葉。好機が来るまで静かに力を蓄え、決して手の内を見せないという司馬懿の処世術。魏の実権を静かに握っていった彼の生き方そのものを示す。'},
  {genre:'三国志',q:'既に周瑜を生めり、何ぞさらに諸葛亮を生めるや。',trans:'',source:'周瑜',meta:'周瑜／三国志',eng:'Heaven gave us Zhou Yu — why then also Zhuge Liang?',context:'自分がいるのになぜ孔明まで生まれてきたのかという嫉妬と嘆きの言葉。才能ある者同士の宿命的な対立を象徴し、どれほどの天才でも上には上がいるという人間の業を示している。'},
  {genre:'三国志',q:'土地や財産は失っても取り返せる。しかし人の心は一度失えば二度と戻らない。',trans:'',source:'孫権',meta:'孫権／三国志',eng:'Land and wealth, once lost, can be recovered. But a person\'s heart, once lost, never returns.',context:'物より人を重んじた孫権の統治哲学。人材と民心を最大の財産と考え、長年にわたって江東を守り続けた孫権のリーダーシップの根幹をなす言葉。'},
  {genre:'三国志',q:'我は張翼徳なり。死を恐れぬ者は前へ出よ。',trans:'',source:'張飛',meta:'張飛／三国志',eng:'I am Zhang Yide. Let those who do not fear death step forward.',context:'長坂橋で単騎で曹操軍を喝破した場面の言葉。圧倒的な胆力と気迫で大軍を退けた豪傑の一喝。名乗りを上げることで敵を震え上がらせた、三国志屈指の名場面。'},
  {genre:'映画',q:'人はそれぞれ従うべき星がある。',trans:'',source:'ニュー・シネマ・パラダイス',meta:'Giuseppe Tornatore, 1988 / アルフレード（Philippe Noiret）',eng:'Each person has a star they must follow.',context:'映写技師のアルフレードが青年トトに語る言葉。それぞれの人生には進むべき方向があるという示唆。シチリアの小さな映画館を舞台に描かれた師弟の絆の象徴的な一節。'},
  {genre:'映画',q:'誠実な人はいつも孤独なものなのよ。',trans:'',source:'ニュー・シネマ・パラダイス',meta:'Giuseppe Tornatore, 1988',eng:'Sincere people are always lonely.',context:'真摯に生きることの代償としての孤独を静かに肯定する言葉。シチリアの村で語られるこの一節は、純粋に生きることの美しさと哀しさを同時に表現している。'},
  {genre:'映画',q:'映画が終わっても、人生は続く。',trans:'',source:'8½',meta:'Federico Fellini, 1963 / グイド（Marcello Mastroianni）',eng:'Even when the film ends, life goes on.',context:'創作の行き詰まりに悩む映画監督が語る言葉。虚構が終わっても現実は続くというフェリーニの人生観。映画という幻想と現実の境界を問い続けた巨匠の代表的な一節。'},
  {genre:'映画',q:'生きることは美しい。',trans:'La vita è bella.',source:'ライフ・イズ・ビューティフル',meta:'Roberto Benigni, 1997 / グイド（Roberto Benigni）',eng:'Life is beautiful.',context:'ナチスの収容所の中でも息子に希望を与え続けた父親の言葉。極限状態においても生への肯定を失わないというベニーニの人間賛歌を象徴する一節。アカデミー賞外国語映画賞受賞作。'},
  {genre:'映画',q:'映画とは、1秒間に24回の真実である。',trans:'Le cinéma, c\'est 24 fois la vérité par seconde.',source:'ジャン＝リュック・ゴダール',meta:'Jean-Luc Godard（映画監督）',eng:'Cinema is truth twenty-four times a second.',context:'映画という媒体の本質を端的に表現した、映画史上最も引用された映画論の一節。1秒間24コマのフィルムに真実が宿るというゴダールの映画哲学。'},
  {genre:'映画',q:'善い行為のためなら、人は何でもできる。',trans:'',source:'善き人のためのソナタ',meta:'Florian Henckel von Donnersmarck, 2006 / ヴィースラー大尉（Ulrich Mühe）',eng:'For the sake of a good deed, a person can do anything.',context:'東ドイツの秘密警察員が芸術家を監視する中で変容していく物語。人間の良心の可能性を示した言葉。アカデミー賞外国語映画賞受賞作。'},
  {genre:'映画',q:'空は今日も青い。それだけで十分だ。',trans:'',source:'ベルリン・天使の詩',meta:'Wim Wenders, 1987 / ダミエル（Bruno Ganz）',eng:'The sky is blue today too. That is enough.',context:'天使ダミエルが人間として生きることを選ぶ物語。目に見えるものすべてが奇跡だという、人間として生きることへの驚きと感謝を示した言葉。'},
  {genre:'映画',q:'壁は人の心の中にある。',trans:'',source:'グッバイ、レーニン！',meta:'Wolfgang Becker, 2003',eng:'The wall exists in the hearts of people.',context:'ベルリンの壁崩壊を描いたドイツ映画から。物理的な壁が崩れても人の心の中の壁はなかなか崩れないという洞察。統一後のドイツ社会への鋭い問いかけ。'},
  {genre:'映画',q:'私は何も後悔しない。',trans:'Non, je ne regrette rien.',source:'エディット・ピアフ〜愛の讃歌〜',meta:'Olivier Dahan, 2007 / エディット・ピアフ（Marion Cotillard）',eng:'No, I regret nothing.',context:'波乱万丈の生涯を送ったシャンソン歌手ピアフの生き様を象徴する言葉。マリオン・コティヤールがアカデミー賞主演女優賞を受賞した作品。'},
  {genre:'映画',q:'Carpe diem. Seize the day, boys. Make your lives extraordinary.',trans:'今を生きろ。その日を掴め、少年たちよ。人生を特別なものにするんだ。',source:'いまを生きる',meta:'Peter Weir, 1989 / キーティング先生（Robin Williams）',context:'全寮制学校でキーティング先生が生徒たちに語りかける言葉。ラテン語の格言「カルペ・ディエム」を体現した名場面。ロビン・ウィリアムズの代表作の一つ。'},
  {genre:'映画',q:'It\'s not who I am underneath, but what I do that defines me.',trans:'自分の内面ではなく、行動が自分を定義する。',source:'バットマン ビギンズ',meta:'Christopher Nolan, 2005 / ブルース・ウェイン（Christian Bale）',context:'レイチェルへの言葉。内面の善意よりも実際の行動こそが人間の本質を決めるという宣言。ノーランのバットマン三部作を貫く哲学的な核心。'},
  {genre:'映画',q:'Why so serious?',trans:'なぜそんなに深刻なんだ？',source:'ダークナイト',meta:'Christopher Nolan, 2008 / ジョーカー（Heath Ledger）',context:'混沌を体現するジョーカーの口癖。社会規範や道徳への根源的な問いかけ。ヒース・レジャーが死後アカデミー助演男優賞を受賞した伝説的な演技から生まれた一言。'},
  {genre:'映画',q:'After all, tomorrow is another day.',trans:'結局のところ、明日はまた別の日だ。',source:'風と共に去りぬ',meta:'Victor Fleming, 1939 / スカーレット・オハラ（Vivien Leigh）',context:'すべてを失った後でも前を向くスカーレットの強さを象徴するラストの言葉。AFI映画名言ベスト100第31位。逆境の中でも明日への希望を失わない人間の強靭さを示す。'},
  {genre:'映画',q:'Do, or do not. There is no try.',trans:'やるか、やらないかだ。やってみるなどない。',source:'スター・ウォーズ エピソード5',meta:'Irvin Kershner, 1980 / ヨーダ（Frank Oz）',context:'ヨーダがルークに修行中に語った言葉。中途半端な覚悟を戒め、完全なコミットメントを求める哲学。AFI映画名言ベスト100第8位。'},
  {genre:'映画',q:'Every passing minute is another chance to turn it all around.',trans:'過ぎていく一分一分が、すべてを変えるチャンスだ。',source:'バニラ・スカイ',meta:'Cameron Crowe, 2001 / ソフィア（Penélope Cruz）',context:'現実と夢の境界が曖昧になっていく中でソフィアが語る言葉。どんな瞬間にも可能性が宿るという希望のメッセージ。'},
  {genre:'映画',q:'You had me at hello.',trans:'「こんにちは」と言った瞬間からもう虜だった。',source:'ザ・エージェント',meta:'Cameron Crowe, 1996 / ドロシー（Renée Zellweger）',context:'愛の告白の場面での言葉。シンプルな一言が持つ力を示す。AFI映画名言ベスト100第52位に選ばれた恋愛映画史上最も有名な告白の一つ。'},
  {genre:'映画',q:'I would rather have had one breath of her hair, one kiss from her mouth, one touch of her hand, than eternity without it.',trans:'彼女の髪のひとかおりでも、唇へのひとつのキスでも、手のひとふれでも、それなしの永遠よりずっといい。',source:'シティ・オブ・エンジェル',meta:'Brad Silberling, 1998 / セス（Nicolas Cage）',context:'天使が人間の女性を愛するために永遠の命を捨てる物語。愛のために不死を手放す決意を示した、映画史上最も詩的なラブストーリーの名言の一つ。'},
  {genre:'映画',q:'Love means never having to say you\'re sorry.',trans:'愛するとは、決して謝らなくていいということ。',source:'ある愛の詩',meta:'Arthur Hiller, 1970 / オリバー（Ryan O\'Neal）',context:'白血病で死を迎える妻との愛を描いた作品から。AFI映画名言ベスト100第13位。愛し合う者の間には謝罪すら必要ないという純粋な愛の哲学を示す言葉。'},
  {genre:'映画',q:'Here\'s looking at you, kid.',trans:'君の瞳に乾杯。',source:'カサブランカ',meta:'Michael Curtiz, 1942 / リック（Humphrey Bogart）',context:'リックがイルザに語りかける別れの場面。AFI映画名言ベスト100第5位。映画史上最も有名なロマンティックな別れの言葉。'},
  {genre:'映画',q:'Go ahead, make my day.',trans:'さあ、やってみろ。やりがいのある一日にしてやるぜ。',source:'ダーティハリー4',meta:'Clint Eastwood, 1983 / ハリー・キャラハン（Clint Eastwood）',context:'挑発に対して微動だにしないイーストウッドの代名詞的セリフ。AFI映画名言ベスト100第6位。後にレーガン大統領がスピーチで引用したことでも知られる。'},
  {genre:'映画',q:'I\'ll be back.',trans:'また来る。',source:'ターミネーター',meta:'James Cameron, 1984 / ターミネーター（Arnold Schwarzenegger）',context:'無機質な宣言が持つ絶対的な威圧感。AFI映画名言ベスト100第37位。映画史上最も有名な一言の一つとして世界中で引用され続けている。'},
  {genre:'映画',q:'Life is a banquet, and most poor suckers are starving to death!',trans:'人生は宴だ。なのに哀れな連中のほとんどは飢え死にしている！',source:'オーンティ・メーム',meta:'Morton DaCosta, 1958 / モーム・オハニハン（Rosalind Russell）',context:'人生を謳歌することへの痛快な宣言。AFI映画名言ベスト100第93位。人生という宴に参加することを拒む者への痛烈な皮肉。'},
  {genre:'映画',q:'Nobody puts Baby in a corner.',trans:'誰もベイビーを隅に追いやることはできない。',source:'ダーティ・ダンシング',meta:'Emile Ardolino, 1987 / ジョニー（Patrick Swayze）',context:'愛する人を守るための宣言として映画史に残るセリフ。社会的な偏見や抑圧に対して立ち向かう姿勢を象徴し、フェミニズム的な文脈でも広く引用される。'},
  {genre:'映画',q:'I feel the need — the need for speed!',trans:'スピードへの欲求を感じる！',source:'トップガン',meta:'Tony Scott, 1986 / マーヴェリック＆グース（Tom Cruise & Anthony Edwards）',context:'マーヴェリックが「I feel the need...」と言い始め、グースが「...the need for speed!」と続けて二人で完成させるセリフ。AFI映画名言ベスト100第94位。'},
  {genre:'映画',q:'You is kind, you is smart, you is important.',trans:'あなたは優しい、あなたは賢い、あなたは大切な存在だ。',source:'ヘルプ〜心がつなぐストーリー〜',meta:'Tate Taylor, 2011 / エイビリーン（Viola Davis）',context:'黒人メイドが白人の子供に毎日語りかけた言葉。自己肯定の力を示す名場面。ヴィオラ・デイヴィスがアカデミー賞助演女優賞にノミネートされた演技から生まれた言葉。'},
  {genre:'映画',q:'You either die a hero, or you live long enough to see yourself become the villain.',trans:'英雄として死ぬか、生き延びて悪役になるか。',source:'ダークナイト',meta:'Christopher Nolan, 2008 / ハービー・デント（Aaron Eckhart）',context:'正義の検事ハービー・デントが語る言葉。英雄と悪役の境界の曖昧さを示し、権力と時間が人間をどう変えるかを問う深いテーマを持つ。'},
  {genre:'映画',q:'Frankly, my dear, I don\'t give a damn.',trans:'率直に言おう、どうでもいい。',source:'風と共に去りぬ',meta:'Victor Fleming, 1939 / レット・バトラー（Clark Gable）',context:'スカーレットへの最後の言葉。AFI映画名言ベスト100第1位。映画史上最も有名なセリフ。スカーレットへの長年の愛が尽きた瞬間を冷酷に表現した。'},
  {genre:'映画',q:'Toto, I\'ve a feeling we\'re not in Kansas anymore.',trans:'トト、ここはもうカンザスじゃない気がする。',source:'オズの魔法使い',meta:'Victor Fleming, 1939 / ドロシー（Judy Garland）',context:'竜巻で異世界に飛ばされたドロシーが愛犬トトに語りかける言葉。AFI映画名言ベスト100第4位。日常から非日常への転換を象徴する言葉として広く引用される。'},
  {genre:'映画',q:'May the Force be with you.',trans:'フォースとともにあらんことを。',source:'スター・ウォーズ エピソード5',meta:'Irvin Kershner, 1980 / ハン・ソロ（Harrison Ford）',context:'銀河を救う戦いに向かう仲間への激励の言葉。AFI映画名言ベスト100第8位。宗教的な祝福の言葉のように世界中で使われるようになった映画史上最も有名な別れの言葉。'},
  {genre:'映画',q:'What we\'ve got here is a failure to communicate.',trans:'ここで起きているのは、コミュニケーションの失敗だ。',source:'暴力脱獄',meta:'Stuart Rosenberg, 1967 / キャプテン（Strother Martin）',context:'脱走を繰り返す囚人ルークに対し、刑務所長が冷酷に語る言葉。AFI映画名言ベスト100第11位。権力者による言葉の暴力的な使用を象徴する。'},
  {genre:'映画',q:'I love the smell of napalm in the morning.',trans:'朝のナパーム弾の臭いが好きだ。',source:'地獄の黙示録',meta:'Francis Ford Coppola, 1979 / キルゴア大佐（Robert Duvall）',context:'ベトナム戦争の狂気を体現するキルゴア大佐の言葉。AFI映画名言ベスト100第12位。戦争の残酷さと人間の狂気を凝縮した映画史に残る名場面。'},
  {genre:'映画',q:'The stuff that dreams are made of.',trans:'それが夢の素材さ。',source:'マルタの鷹',meta:'John Huston, 1941 / サム・スペード（Humphrey Bogart）',context:'謎の黒い鳥像をめぐる争いの末、スペードが語る言葉。AFI映画名言ベスト100第14位。欲望や夢の虚しさを詩的に表現したフィルム・ノワールの傑作から。'},
  {genre:'映画',q:'E.T. phone home.',trans:'E.T.、うちに電話する。',source:'E.T.',meta:'Steven Spielberg, 1982 / E.T.（Pat Welsh）',context:'地球に取り残された宇宙人が故郷に帰りたいと訴える言葉。AFI映画名言ベスト100第15位。子供の純粋な友情と異星人の望郷の念を象徴する映画史上最も感動的な一節。'},
  {genre:'映画',q:'Made it, Ma! Top of the world!',trans:'やったぞ、母さん！世界の頂点だ！',source:'白熱',meta:'Raoul Walsh, 1949 / コーディ（James Cagney）',context:'ギャングのコーディが最後に叫ぶ言葉。AFI映画名言ベスト100第18位。炎上するガスタンクの上で叫ぶこの場面はフィルム・ノワールの象徴的なラストシーンとして知られる。'},
  {genre:'映画',q:'Oh, Jerry, don\'t let\'s ask for the moon. We have the stars.',trans:'ジェリー、月なんか求めないで。星があるじゃない。',source:'情熱の航路',meta:'Irving Rapper, 1942 / シャーロット（Bette Davis）',context:'AFI映画名言ベスト100第53位。持てるものへの感謝と、ないものを求めることの虚しさを示した言葉。ベティ・デイヴィスの演技とともに映画史に刻まれた一節。'},
  {genre:'映画',q:'Well, nobody\'s perfect.',trans:'まあ、完璧な人間はいないからね。',source:'お熱いのがお好き',meta:'Billy Wilder, 1959 / オスグッド（Joe E. Brown）',context:'AFI映画名言ベスト100第48位。男性と知りながら「彼女」に求婚し続けたオスグッドが真実を告げられた後に放つ言葉。コメディの歴史上最高のラストラインとして知られる。'},
  {genre:'映画',q:'It\'s alive! It\'s alive!',trans:'生きている！生きているぞ！',source:'フランケンシュタイン',meta:'James Whale, 1931 / フランケンシュタイン博士（Colin Clive）',context:'AFI映画名言ベスト100第49位。死体から命を生み出した瞬間の狂気に満ちた叫び。科学の暴走と神への挑戦を象徴するホラー映画史上最も有名な場面。'},
  {genre:'映画',q:'You\'ve got to ask yourself one question: Do I feel lucky? Well, do ya, punk?',trans:'自問自答してみろ。「俺は運がいいか？」さあ、どうだ、このチンピラ？',source:'ダーティハリー',meta:'Don Siegel, 1971 / ハリー（Clint Eastwood）',context:'AFI映画名言ベスト100第51位。銃弾が残っているか分からない状況で犯人を追い詰めるハリーの心理戦。イーストウッドのタフさを象徴する映画史上最もかっこいい脅しの言葉。'},
  {genre:'映画',q:'生きるんだ。生きることは苦しいことだ。だがそれが生きることだ。',trans:'',source:'生きる',meta:'黒澤明, 1952 / 渡辺勘治（志村喬）',eng:'Live. Living is suffering. But that is what it means to live.',context:'末期がんを宣告された市役所職員が、残りの命で何かを成し遂げようとする物語。生の重みと覚悟を静かに語る言葉。黒澤明の最高傑作の一つとして世界中で称賛される。'},
  {genre:'映画',q:'百姓というのはな、けちんぼで、ずるくて、泣き虫で、意地悪で、間抜けで、人殺しだ。だがそれでいい。侍とはそういうものをまもるものだ。',trans:'',source:'七人の侍',meta:'黒澤明, 1954 / 菊千代（三船敏郎）',eng:'Farmers are miserly, cunning, crybabies, spiteful, stupid, and murderers. But that\'s fine. That\'s what samurai protect.',context:'農民出身の菊千代が怒りをぶつけながら叫ぶ場面。農民の本質を語りながら、同時に自分自身への言葉でもある。黒澤映画の中でも最も感情的な名場面の一つ。'},
  {genre:'映画',q:'バカな奴ほどよく吠える。賢い犬は吠えない。',trans:'',source:'椿三十郎',meta:'黒澤明, 1961 / 椿三十郎（三船敏郎）',eng:'The foolish bark the loudest. A wise dog does not bark.',context:'腕利きの浪人・三十郎が若侍たちに語る言葉。真の実力者は自らを誇示しないという処世術。黒澤明とクロサワ作品の軽妙なユーモアを代表する一節。'},
  {genre:'映画',q:'人間、正直に生きるのが一番だが、正直に生きていると損なことが多い。',trans:'',source:'生きる',meta:'黒澤明, 1952 / 渡辺勘治（志村喬）',eng:'Honesty is the best way to live — but living honestly often puts you at a disadvantage.',context:'長年役所で働き続けた男が人生の終わりに気づいた皮肉な真実。正直さと世間の論理のギャップを静かに指摘した黒澤明らしい人間観察。'},
  {genre:'映画',q:'幸せは、待っているもんじゃなくって、自分たちでつくりだすものだよ。',trans:'',source:'晩春',meta:'小津安二郎, 1949 / 周吉（笠智衆）',eng:'Happiness is not something you wait for — it is something you create yourself.',context:'娘の結婚を前に父親が語る言葉。幸福は与えられるものではなく、自ら作るものだという小津の人生哲学。日本映画史に残る父と娘の静かな会話の名場面。'},
  {genre:'映画',q:'いいもんだな、人間というのは。',trans:'',source:'東京物語',meta:'小津安二郎, 1953 / 平山周平（笠智衆）',eng:'People are really something, aren\'t they.',context:'老夫婦が子供たちとの再会を経て感じる言葉。人間への静かな肯定と諦念が共存する小津の代表的な一節。世界の映画監督が選ぶ史上最高の映画の一つに選ばれた作品から。'},
  {genre:'映画',q:'まだ終わってないよな。',trans:'',source:'キッズ・リターン',meta:'北野武, 1996 / マサル（金子賢）',eng:'It\'s not over yet, is it.',context:'ボクサーの夢に敗れた二人の若者が自転車を漕ぎながら交わす最後の言葉。終わりの中にある始まりを示す。北野武がバイク事故から復帰後初めて撮った作品の感動的なラスト。'},
  {genre:'映画',q:'人間て、あんまり幸せそうだと憎らしくなっちまうんですよね。',trans:'',source:'男はつらいよ',meta:'山田洋次, 1969〜 / 車寅次郎（渥美清）',eng:'When people look too happy, it makes you want to hate them, doesn\'t it.',context:'寅さんの人間観察の鋭さを示す言葉。人間の小さな嫉妬心を笑いとともに肯定する。渥美清が全48作にわたって演じた国民的キャラクターの本質を示す一節。'},
  {genre:'映画',q:'学がねえっていうのは、自分のことを言葉で言えないってことなんだよな。',trans:'',source:'男はつらいよ',meta:'山田洋次, 1969〜 / 車寅次郎（渥美清）',eng:'Having no education means not being able to put yourself into words.',context:'教育を受けられなかった自分への哀しみと、言葉の力への憧れを語った寅さんの名言。言葉を持てない者の痛みを静かに語る、男はつらいよシリーズの中でも特に深い一節。'},
  {genre:'映画',q:'生まれてきてよかった。',trans:'',source:'おくりびと',meta:'滝田洋二郎, 2008 / 大悟（本木雅弘）',eng:'I\'m glad to have been born.',context:'納棺師として死者を送る仕事を通じて生の意味を見出した主人公の言葉。アカデミー賞外国語映画賞受賞作。死と向き合うことで生の喜びを再発見するという作品のテーマを凝縮した言葉。'},
  {genre:'映画',q:'正しいことをしたければ偉くなれ。',trans:'',source:'学校',meta:'山田洋次, 1993 / 黒井先生（西田敏行）',eng:'If you want to do what is right, become powerful.',context:'学校の先生が生徒に語る言葉。正義を実現するためには力が必要だという現実的な教え。理想だけでは世界は変えられないという山田洋次の鋭い社会観察。'},
  {genre:'映画',q:'人間は、死ぬまで人間だ。',trans:'',source:'生きる',meta:'黒澤明, 1952 / 渡辺勘治（志村喬）',eng:'A person remains a person until the moment of death.',context:'死を前にしても尊厳を失わずに生きることへの宣言。黒澤の人間讃歌を象徴する言葉。末期がんを告知された男が残りの命を燃やして生きようとする姿を描いた傑作から。'},
  {genre:'HIPHOP',q:'別の道があるガキじゃない 三十過ぎが守ってちゃ先は短い',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／LIFE STORY「Motivation」',eng:'I\'m no kid with another path to take. Past thirty, playing it safe leaves you with little time ahead.',context:'30代を過ぎてもなお守りに入らず挑戦し続けることの重要性を説いた言葉。若者への言い訳を許さない厳しさと、自らも前進し続けるTHA BLUE HERBの姿勢が凝縮されている。'},
  {genre:'HIPHOP',q:'振り返ると今日は一瞬の出来事 一生も多分一瞬の出来事',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／ONLY FOR THE MINDSTRONG「智慧の輪」',eng:'Looking back, today was over in a flash. A lifetime is probably a flash too.',context:'時間の感覚を圧縮して捉えた言葉。一日が振り返れば一瞬であるように、一生もまた一瞬に過ぎないという無常観と、だからこそ今を生きることの重みを示している。'},
  {genre:'HIPHOP',q:'その程度でインタビューアー相手に何を語るか クツの底に入り込んだ小石程の奴が',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／SELL OUR SOUL「アンダーグラウンドVSアマチュア」',eng:'What do you have to say to an interviewer with that little to show? You\'re nothing but a pebble stuck in the sole of a shoe.',context:'実力も経験も伴わないまま語ろうとする者への痛烈な一撃。ヒップホップの世界における本物と偽物の差を、クツの底の小石という卑近な比喩で鋭く切り捨てた言葉。'},
  {genre:'HIPHOP',q:'寂しさと寄り添い合えば寂しくない',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／THE NEW BORN「野良犬」',eng:'If you walk alongside loneliness, you are no longer alone.',context:'孤独を否定するのでも誰かに依存するのでもなく、寂しさそのものと向き合い共存することで孤独を超える。孤高を貫くTHA BLUE HERBらしい精神的自立の哲学。'},
  {genre:'HIPHOP',q:'古ぼけた馴れ合いには風穴をあけろ オマエの力はオマエ自身で確かめろ オマエのための時代ならオマエが変えろ',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／only for mindstrong「時代は変わる part 1」',eng:'Blast a hole through stale comfort. Prove your own strength yourself. If this era is yours, be the one to change it.',context:'惰性的な人間関係や環境に甘えることを拒絶し、自分の力で時代を切り開くことを促す言葉。他者への依存を断ち切り、自らの手で現実を変えていくことへの強烈な鼓舞。'},
  {genre:'HIPHOP',q:'必ず時代は変わる いつだって追う者は追われるものに勝る',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／only for mindstrong「時代は変わる part 1」',eng:'The times will always change. The one who chases always has the edge over the one being chased.',context:'現状に満足して守りに入った者は必ず追い抜かれるという時代の法則を示した言葉。チャレンジャーの精神こそが時代を動かすという、THA BLUE HERBの変わらぬ信念。'},
  {genre:'HIPHOP',q:'言葉が意味を持ってるって説は 俺のリリックだけに常につきまとう番犬だ',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／SELL OUR SOUL「サイの角のようにただ独り歩め」',eng:'The idea that words carry meaning — that watchdog follows only my lyrics, always.',context:'自分の言葉が持つ重みと責任を自覚した言葉。言葉の意味を問われ続けることをむしろ誇りとして受け入れる姿勢に、言葉に対するTHA BLUE HERBの真剣な向き合い方が表れている。'},
  {genre:'HIPHOP',q:'東京にでて音楽なんて古いんだ、地元も仕切れずになに歌う気だ？',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／SELL OUR SOUL「天下二分の計」',eng:'Go to Tokyo and music is already old news — you can\'t even hold down your hometown, so what do you think you\'re singing about?',context:'東京志向の音楽シーンへの批判と、地元・札幌への誇りを示した言葉。地元を守れない者が全国に出ても何も語れないという、THA BLUE HERBの地に足のついた哲学。'},
  {genre:'HIPHOP',q:'北の本物は、言い訳や、負け惜しみを堪えてやるべきことをやるんだよ',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／STILLING,STILL DREAMING「孤憤」',eng:'The real ones from the north hold back their excuses and their sore-loser talk, and do what needs to be done.',context:'北海道という地方から全国に挑んだTHA BLUE HERBの矜持を示す言葉。どんな状況でも言い訳をせず、やるべきことをやり続ける姿勢こそが本物の証明だという信念。'},
  {genre:'HIPHOP',q:'雨にも負けず、さがし続ける、オレなりの解釈の結論を信じうぬぼれず',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／STILLING,STILL DREAMING「AME NI MO MAKEZU」',eng:'Unbowed by rain, I keep searching — trusting my own conclusions, without arrogance.',context:'宮沢賢治の「雨ニモマケズ」を引用しながら、自分なりの解釈と結論を追い求める姿勢を示した言葉。謙虚さを保ちつつも自分の信念を貫くという二律背反を体現している。'},
  {genre:'HIPHOP',q:'金で買えないものならとっくにオレの手の内にあるとうの昔から',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／STILLING,STILL DREAMING「￥」',eng:'If it can\'t be bought, I\'ve had it in my hands for a long time already.',context:'金銭的な成功よりも精神的な豊かさを優先するTHA BLUE HERBの価値観を示した言葉。お金で買えない友情・誇り・信念はすでに持っているという、物質主義への静かな反抗。'},
  {genre:'HIPHOP',q:'音楽は商品でしかないというのはもっともだ 売れればいいという説もある意味本当だ だがモノ造りはどんなにつらく苦しかろうが 俺らにとっては神聖な信仰のようなものだ',trans:'',source:'THA BLUE HERB',meta:'THA BLUE HERB／SELL OUR SOUL「STILL STANDING IN THE BOG」',eng:'It\'s fair to say music is just a product. It\'s also true in a sense that selling is enough. But making something — no matter how hard, no matter how painful — is to us like a sacred act of faith.',context:'音楽産業の商業的な論理を認めつつも、創作行為そのものを信仰と位置づける言葉。どんなに苦しくても作り続けるTHA BLUE HERBの覚悟と、アーティストとしての絶対的な誇りを示している。'},
  {genre:'HIPHOP',q:'We gonna be alright.',trans:'俺たちはきっと大丈夫だ。',source:'Kendrick Lamar',meta:'Kendrick Lamar / Alright（To Pimp a Butterfly, 2015）',eng:'We gonna be alright.',context:'ブラック・ライブズ・マター運動のアンセムとなった言葉。絶望的な状況の中でも希望を失わないという強いメッセージ。シンプルな一言が持つ力で、世界中で抵抗と希望の象徴として引用された。'},
  {genre:'HIPHOP',q:'My rights, my wrongs, I write till I am right with God.',trans:'俺の正しさと過ちを、神と和解するまで書き続ける。',source:'Kendrick Lamar',meta:'Kendrick Lamar / Sing About Me（good kid, m.A.A.d city, 2012）',eng:'My rights, my wrongs, I write till I am right with God.',context:'死と向き合いながら書き続けることへの誓いを込めた一節。ケンドリックが最も深く自分の内面と格闘した曲の核心にある言葉。創作行為そのものが自己救済であるという哲学。'},
  {genre:'HIPHOP',q:'Loyalty, got royalty inside my DNA.',trans:'忠誠心、俺のDNAには王者の血が流れている。',source:'Kendrick Lamar',meta:'Kendrick Lamar / DNA.（DAMN., 2017）',eng:'Loyalty, got royalty inside my DNA.',context:'自分のアイデンティティと出自への誇りを宣言した言葉。プリツァー賞を受賞したDAMN.の冒頭を飾る曲から。DNAに刻まれた忠誠心と王者性というコンセプトはケンドリックの哲学を凝縮している。'},
  {genre:'HIPHOP',q:'Sit down, be humble.',trans:'座れ、謙虚になれ。',source:'Kendrick Lamar',meta:'Kendrick Lamar / HUMBLE.（DAMN., 2017）',eng:'Sit down, be humble.',context:'傲慢さへの警告と謙虚さの重要性を説いた言葉。ヒップホップ界で最も影響力のある曲の一つとなり、自己主張の強い現代文化への痛烈な批評として機能している。'},
  {genre:'HIPHOP',q:'It was all a dream.',trans:'それはすべて夢だった。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G. / Juicy（Ready to Die, 1994）',eng:'It was all a dream.',context:'貧困から成功へと上り詰めたビギーの物語の始まりの一節。夢と現実の境界を問いかけながら、アメリカンドリームの本質を語る言葉として世界中で引用される。ヒップホップ史上最も有名な書き出しの一つ。'},
  {genre:'HIPHOP',q:'If you don\'t know, now you know.',trans:'知らなかったなら、今知れ。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G. / Juicy（Ready to Die, 1994）',eng:'If you don\'t know, now you know.',context:'Juicyのリフレインとして繰り返される言葉。自分の存在と実績を世界に宣言するビギーの自信の表れ。シンプルながら圧倒的な存在感を持ち、達成の宣言として広く使われる。'},
  {genre:'HIPHOP',q:'Mo\' money, mo\' problems.',trans:'金が増えるほど、問題も増える。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G. / Mo Money Mo Problems（Life After Death, 1997）',eng:'Mo\' money, mo\' problems.',context:'成功の逆説を語った言葉。富と名声を手に入れることで生まれる新たな問題を指摘した一節。ビギーが成功の絶頂にありながら直面した現実を反映し、現代においても経済的成功の複雑さを語る際に引用される。'},
  {genre:'HIPHOP',q:'Stay far from timid, only make moves when your heart\'s in it.',trans:'臆病とは距離を置け。心が動くときだけ行動しろ。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G. / Ten Crack Commandments（Life After Death, 1997）',eng:'Stay far from timid, only make moves when your heart\'s in it.',context:'ビギーが語る人生の鉄則。恐れを捨て、真に情熱を感じるときだけ動くという哲学は、ビジネスや人生全般の指針として広く引用される。Ten Crack Commandmentsに込められた処世術の核心。'},
  {genre:'HIPHOP',q:'The world is yours.',trans:'世界はお前のものだ。',source:'Nas',meta:'Nas / The World Is Yours（Illmatic, 1994）',eng:'The world is yours.',context:'スカーフェイスへのオマージュでもあるNasの宣言。Illmaticを象徴する言葉で、どんな境遇にあっても可能性は無限だという信念を示す。飛行船に書かれたThe World Is Yoursのイメージとともに、希望と野心の象徴として語り継がれる。'},
  {genre:'HIPHOP',q:'Love yourz.',trans:'自分のものを愛せ。',source:'J. Cole',meta:'J. Cole / Love Yourz（2014 Forest Hills Drive, 2014）',eng:'Love yourz.',context:'他人の人生を羨むのではなく、自分が持つものを愛することを説いた言葉。J. Coleが生家を買い戻して録音した個人的なアルバムから生まれた哲学。比較と嫉妬が支配する現代社会への静かな抵抗。'},
  {genre:'HIPHOP',q:'There\'s beauty in the struggle.',trans:'苦しみの中に美しさがある。',source:'J. Cole',meta:'J. Cole / Love Yourz（2014 Forest Hills Drive, 2014）',eng:'There\'s beauty in the struggle.',context:'困難な過程そのものに価値があるという逆説的な真実を語った言葉。J. Coleが成功した後も苦しみの時代を振り返り、その意味を見出した哲学。苦労なしに成長はないというメッセージを詩的に表現している。'},
  {genre:'HIPHOP',q:'No such thing as a life that\'s better than yours.',trans:'あなたの人生より良い人生などない。',source:'J. Cole',meta:'J. Cole / Love Yourz（2014 Forest Hills Drive, 2014）',eng:'No such thing as a life that\'s better than yours.',context:'他人の人生と比較することの無意味さを説いた言葉。SNS時代において他者の生活を羨む現代人への強いメッセージ。自分の人生こそが唯一無二であるという自己受容の哲学。'},
  {genre:'HIPHOP',q:'I\'m not afraid to take a stand.',trans:'立ち上がることを恐れない。',source:'Eminem',meta:'Eminem / Not Afraid（Recovery, 2010）',eng:'I\'m not afraid to take a stand.',context:'薬物依存から回復したエミネムが宣言した言葉。自分の弱さと向き合い、それを乗り越えた先にある強さを示す。Not Afraidはエミネムのカムバックを象徴する曲として、困難に立ち向かうすべての人のアンセムとなった。'},
  {genre:'HIPHOP',q:'You only get one shot, do not miss your chance to blow.',trans:'チャンスは一度きり、逃すな。',source:'Eminem',meta:'Eminem / Lose Yourself（8 Mile OST, 2002）',eng:'You only get one shot, do not miss your chance to blow.',context:'映画8 Mileのサウンドトラックとして制作され、アカデミー賞主題歌賞を受賞した曲の核心的な一節。人生においてチャンスは一度しか来ないという切迫感と、それを掴む決意を語った言葉。'},
  {genre:'HIPHOP',q:'Know yourself, know your worth.',trans:'自分を知れ、自分の価値を知れ。',source:'Drake',meta:'Drake / 0 to 100（2014）',eng:'Know yourself, know your worth.',context:'自己認識と自己価値の重要性を語った言葉。自分が何者であるかを理解することと、自分の価値を正しく評価することが成功の基盤だというドレイクの哲学。現代のHIPHOPで最も引用される言葉の一つ。'},
  {genre:'HIPHOP',q:'I am not a human being.',trans:'俺は人間ではない。',source:'Lil Wayne',meta:'Lil Wayne / I Am Not a Human Being（2010）',eng:'I am not a human being.',context:'リル・ウェインが自らの異次元の才能を宣言した言葉。人間の域を超えた存在としての自己規定は、HIPHOPにおける誇張表現の極致。収監中にリリースされたアルバムのタイトルトラックから。'},
  {genre:'HIPHOP',q:'If the game shakes me or breaks me, I hope it makes me a better man.',trans:'ゲームが俺を揺さぶっても、壊しても、より良い人間にしてくれることを願う。',source:'The Notorious B.I.G.',meta:'The Notorious B.I.G.／語録',eng:'If the game shakes me or breaks me, I hope it makes me a better man.',context:'どんな試練も自分を成長させる糧にするという哲学。成功と暴力が隣り合わせだったビギーの人生観を反映した言葉。結果より過程の中での成長を重視するという、彼の知性と深みを示す一節。'},
  {genre:'HIPHOP',q:'Life is a movie, pick your own role.',trans:'人生は映画だ。自分の役を選べ。',source:'J. Cole',meta:'J. Cole / Let Nas Down（Born Sinner, 2013）',eng:'Life is a movie, pick your own role.',context:'自分の人生の主役は自分だという宣言。J. Coleが敬愛するNasへの思いを込めて作ったトラックの一節。人生という物語で自らがどんな役を演じるかは自分次第だという、自己決定の哲学を示す。'},
  {genre:'HIPHOP',q:'Wu-Tang is for the children.',trans:'ウータンは子供たちのためにある。',source:'Ol\' Dirty Bastard',meta:'Ol\' Dirty Bastard／1998年グラミー賞授賞式スピーチ',eng:'Wu-Tang is for the children.',context:'1998年のグラミー賞授賞式でOl Dirty Bastardが乱入して叫んだ伝説的な言葉。ウータン・クランが音楽賞を逃したことへの抗議として放たれたこの一言は、HIPHOPの反骨精神を象徴する歴史的な瞬間として語り継がれる。'},
  {genre:'HIPHOP',q:'Life is a chess game, and I\'m the king.',trans:'人生はチェスだ。そして俺がキングだ。',source:'Raekwon',meta:'Raekwon（Wu-Tang Clan）／語録',eng:'Life is a chess game, and I\'m the king.',context:'ウータン・クランが好んで使うチェスの比喩を用いた言葉。人生を戦略的なゲームとして捉え、自分がその中心にいるという自信と哲学を示す。RZAをはじめウータンのメンバーは実際にチェスをライフスタイルの一部としていた。'},
  {genre:'HIPHOP',q:'Can I kick it? Yes, you can.',trans:'かましていいか？ああ、いいぞ。',source:'A Tribe Called Quest',meta:'A Tribe Called Quest / Can I Kick It?（People\'s Instinctive Travels, 1990）',eng:'Can I kick it? Yes, you can.',context:'Q-TipとPhife Dawgが掛け合いで繰り広げるネイティブタンの象徴的な一節。ルー・リードのWalk On the Wild Sideをサンプリングしたこの曲は、HIPHOPがジャズとソウルを融合させた瞬間を象徴する。参加することへの純粋な喜びと開放感を示す。'},
  {genre:'HIPHOP',q:'Three is the magic number.',trans:'3は魔法の数字だ。',source:'De La Soul',meta:'De La Soul / The Magic Number（3 Feet High and Rising, 1989）',eng:'Three is the magic number.',context:'ボブ・ドロウのジャズ曲をサンプリングしたデ・ラ・ソウルの代表曲の一節。Native Tongues集団の中核をなす3人組として、3という数字に特別な意味を込めた。シンプルな言葉の中に、音楽・友情・創造性の三位一体が宿る。'},
  {genre:'HIPHOP',q:'Life comes when you have knowledge, wisdom, and understanding. Then you are truly living.',trans:'知識と知恵と理解を持ったとき、初めて人生が始まる。そのとき、真に生きていると言える。',source:'RZA',meta:'RZA（Wu-Tang Clan）／The Tao of Wu（2009）',eng:'Life comes when you have knowledge, wisdom, and understanding. Then you are truly living.',context:'ウータン・クランのリーダーRZAが著書で語った哲学。五パーセンターズの教えに基づく知識・知恵・理解の三段階を人生の本質として語った言葉。'},
  {genre:'HIPHOP',q:'The first person you have to resurrect is yourself.',trans:'最初に救い出さなければならないのは、自分自身だ。',source:'RZA',meta:'RZA（Wu-Tang Clan）／語録',eng:'The first person you have to resurrect is yourself.',context:'自己変革と自己救済の重要性を語ったRZAの言葉。他者や社会を変える前に、まず自分自身を変えなければならないという哲学。ウータン・クランが体現する自己啓発と精神的成長のテーマを凝縮している。'},
  {genre:'HIPHOP',q:'Confusion is a gift from God. Those times when you feel most desperate for a solution, sit. Wait. The information will become clear.',trans:'混乱は神からの贈り物だ。解決策を最も切望しているとき、座って待て。情報はやがて明確になる。',source:'RZA',meta:'RZA（Wu-Tang Clan）／The Tao of Wu（2009）',eng:'Confusion is a gift from God. Those times when you feel most desperate for a solution, sit. Wait. The information will become clear.',context:'混乱や不確かさを否定的に見るのではなく、成長のための贈り物として捉えるRZAの哲学。道教の思想に影響を受けた彼の精神的な探求が反映された言葉。'},
  {genre:'HIPHOP',q:'Don\'t start your day with broken pieces of yesterday.',trans:'昨日の壊れた欠片で今日を始めるな。',source:'RZA',meta:'RZA（Wu-Tang Clan）／語録',eng:'Don\'t start your day with broken pieces of yesterday.',context:'過去の失敗や後悔を引きずらず、毎日を新しく始めることの重要性を語った言葉。RZAの哲学の中でも特に実践的で普遍的なアドバイスとして、世界中で引用される名言。'},
  {genre:'HIPHOP',q:'I got mouths to feed, unnecessary beef is more cows to breed.',trans:'養うべき口がある。無駄な争いは、さらに問題を増やすだけだ。',source:'GZA',meta:'GZA（Wu-Tang Clan）／語録',eng:'I got mouths to feed, unnecessary beef is more cows to breed.',context:'責任と無駄な争いの愚かさを語ったGZAの言葉。ウータン・クランの中で最も知的な存在として知られるGZAらしい、ウィットに富んだ比喩表現。家族を養う責任がある者が無駄な争いに時間を費やすことへの戒め。'},
  {genre:'HIPHOP',q:'Thinking for yourself is still the highest form of intelligence.',trans:'自分自身で考えることが、依然として最も高い知性の形だ。',source:'GZA',meta:'GZA（Wu-Tang Clan）／インタビュー',eng:'Thinking for yourself is still the highest form of intelligence.',context:'他者の意見や流行に流されず、独立した思考を持つことの重要性を語ったGZAの言葉。Liquid Swordsで示した知的なリリシズムを体現する哲学。情報が溢れる現代においてより切実な意味を持つ言葉。'},
  {genre:'HIPHOP',q:'I bomb atomically, Socrates\' philosophies and hypotheses can\'t define how I be dropping these mockeries.',trans:'俺は原子爆弾のように炸裂する。ソクラテスの哲学と仮説でさえ、俺のライムを定義できない。',source:'Inspectah Deck',meta:'Inspectah Deck（Wu-Tang Clan）/ Triumph（Wu-Tang Forever, 1997）',eng:'I bomb atomically, Socrates\' philosophies and hypotheses can\'t define how I be dropping these mockeries.',context:'ウータン・クランが最もリリカルなメンバーと評するInspectah DeckがTriumphで放った伝説的な一節。ソクラテスを引き合いに出しながら自分のラップの次元の高さを語る、HIPHOPの複雑な知性を象徴するライン。'},
  {genre:'HIPHOP',q:'Industry rule number four thousand and eighty: record company people are shady.',trans:'業界ルール第4080条——レコード会社の連中は信用できない。',source:'Q-Tip',meta:'Q-Tip（A Tribe Called Quest）/ Check the Rhime（The Low End Theory, 1991）',eng:'Industry rule number four thousand and eighty: record company people are shady.',context:'音楽業界の裏側を皮肉った言葉。Q-Tipがアーティストとレコード会社の不公平な関係を告発した一節は、HIPHOPが単なる娯楽を超えた社会批評の場であることを示した。現在も業界批判の文脈で広く引用される。'},
  {genre:'HIPHOP',q:'I like \'em brown, yellow, Puerto Rican or Haitian. Name is Phife Dawg from the Zulu Nation.',trans:'ブラウン、イエロー、プエルトリカン、ハイチアン、どれでも好きだ。俺の名はファイフ・ダウグ、ズールー・ネイションから。',source:'Phife Dawg',meta:'Phife Dawg（A Tribe Called Quest）/ Electric Relaxation（Midnight Marauders, 1993）',eng:'I like \'em brown, yellow, Puerto Rican or Haitian. Name is Phife Dawg from the Zulu Nation.',context:'トライブのFive Foot AssassinことPhife Dawgが自己紹介するアイコニックなライン。人種や出自を超えた包容力とニューヨークの多様性を体現した言葉として愛される。2016年のPhife逝去後、多くのファンがこの一節で彼を追悼した。'},
  {genre:'HIPHOP',q:'The stakes is high, keep your eyes on the prize.',trans:'賭けは高い。目標から目を離すな。',source:'De La Soul',meta:'De La Soul / Stakes Is High（Stakes Is High, 1996）',eng:'The stakes is high, keep your eyes on the prize.',context:'目標に向かって集中し続けることの重要性を語った言葉。デ・ラ・ソウルがHIPHOPの商業化への批判を込めて作ったアルバムのタイトルトラック。楽しさの中にも真剣さを忘れないというネイティブタン・コレクティブの哲学を示す。'},

,
  {genre:'文学',q:'人間は自分自身について正直でいることができない。人は自分を語るとき、必ず美化してしまう。',trans:'',source:'黒澤明',meta:'黒澤明／Donald Richie編『Rashomon』1987年 Rutgers University Press',eng:'Human beings are unable to be honest with themselves about themselves. They cannot talk about themselves without embellishing.',context:'ラショーモン撮影前に助監督たちに語った言葉。なぜ人間は同じ出来事を違う形で証言するのかを説明した際の核心的な一節。自己欺瞞こそが人間の本質だという黒澤の深い洞察。'},
  {genre:'文学',q:'人は自分自身について完全に正直には語れない。しかし他人を演じている時のほうが、むしろ真実を隠しにくい。',trans:'',source:'黒澤明',meta:'黒澤明／自伝『蝦蟇の油（Something Like an Autobiography）』1982年',eng:'Although human beings are incapable of talking about themselves with total honesty, it is much harder to avoid the truth while pretending to be other people.',context:'映画監督として自分の作品を通じてこそ真実を語れるという逆説を示した言葉。フィクションの中にこそ作者の本質が現れるという創作論の核心。'},
  {genre:'文学',q:'Poetry is an awareness of the world, a particular way of relating to reality.',trans:'詩とは世界に対する意識であり、現実と関わるための特別な方法である。',source:'アンドレイ・タルコフスキー',meta:'アンドレイ・タルコフスキー／『映像のポエジア（Sculpting in Time）』1986年',context:'映画を「時間を彫刻すること」と定義したタルコフスキーが語る詩と映像の本質。詩的な感性こそが現実を深く見つめる唯一の方法だという芸術哲学の核心。'},
  {genre:'文学',q:'Art symbolises the meaning of our existence.',trans:'芸術は、人間存在の意味を象徴する。',source:'アンドレイ・タルコフスキー',meta:'アンドレイ・タルコフスキー／『映像のポエジア（Sculpting in Time）』1986年',context:'芸術の役割を人間存在の意味の象徴化と定義した言葉。ソ連の検閲と戦いながら作品を作り続けたタルコフスキーにとって、芸術は単なる表現を超えた存在証明だった。'},
  {genre:'文学',q:'Whoever fights monsters should see to it that in the process he does not become a monster.',trans:'怪物と戦う者は、自らも怪物にならぬよう気をつけねばならない。',source:'ニーチェ',meta:'フリードリヒ・ニーチェ／『善悪の彼岸』1886年 格言146番',context:'悪と戦う者が悪の手法を取り込んでいくという人間の本質的な危うさを示した言葉。深淵をのぞき込む者は深淵にものぞき込まれるという続きの言葉とともに、現代においても政治・倫理・心理の文脈で広く引用される。'},
  {genre:'文学',q:'I have always imagined that Paradise will be a kind of library.',trans:'私はいつも、天国とは図書館のような場所だと想像している。',source:'ボルヘス',meta:'ホルヘ・ルイス・ボルヘス／講演・エッセイ集より',context:'図書館員として働きながら世界文学の迷宮を作り続けたボルヘスらしい言葉。書物こそが人類の英知の結晶であり、無限の書物が存在する図書館こそが理想郷だという文学的世界観。'},
  {genre:'文学',q:'人間が不幸なのは、自分が幸福であることを知らないからだ。ただそれだけの理由なのだ。',trans:'',source:'ドストエフスキー',meta:'フョードル・ドストエフスキー／『悪霊』1872年',eng:'Man is unhappy because he does not know that he is happy. That is the only reason.',context:'人間の不幸の根源を外部の状況ではなく内面の無知に見出した言葉。幸福は常にそこにあるのに、人はそれを認識できないでいるというドストエフスキーの逆説的な人間観。'},
  {genre:'文学',q:'美が世界を救う。',trans:'',source:'ドストエフスキー',meta:'フョードル・ドストエフスキー／『白痴』1869年',eng:'Beauty will save the world.',context:'主人公ムイシュキン公爵が語る言葉。道徳でも宗教でもなく、美こそが堕落した世界を救う力を持つというドストエフスキーの信念。現代においても芸術の社会的意義を語る際に広く引用される。'},
  {genre:'文学',q:'人間は慣れる動物だ。それが人間の最上の定義だと思う。',trans:'',source:'ドストエフスキー',meta:'フョードル・ドストエフスキー／『罪と罰』1866年',eng:'Man is a creature that can get used to anything — I think that is the best definition of him.',context:'どんな極限状態にも人間は適応してしまうという洞察。ラスコーリニコフの心理描写の中で語られる言葉で、人間の驚異的な適応力と、それゆえの倫理的な危うさを同時に示している。'},
  {genre:'文学',q:'本とは、私たちの内なる凍った海を砕く斧でなければならない。',trans:'',source:'カフカ',meta:'フランツ・カフカ／1904年、友人オスカー・ポラクへの手紙より',eng:'A book must be the axe for the frozen sea within us.',context:'読書の本質的な役割を示した言葉。心地よく読める本ではなく、凍りついた内面を揺さぶり変革をもたらす本こそが真の意味での本だというカフカの文学観。'},
